<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fff7ec">
<title>Would You Rather?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --ink: #2d2150; --p1: #6c5ce7; --p3: #ff7675;
    --p2d: #0a7a63; --p3d: #d6403e; --p4: #fdcb6e;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Nunito', sans-serif; color: var(--ink);
    background:
      radial-gradient(circle at 10% 12%, #ffe9a8 0 18px, transparent 19px),
      radial-gradient(circle at 88% 9%, #b6e3ff 0 16px, transparent 17px),
      radial-gradient(circle at 93% 82%, #ffc6d9 0 20px, transparent 21px),
      radial-gradient(circle at 5% 86%, #c5f3e0 0 16px, transparent 17px),
      linear-gradient(160deg, #fff7ec 0%, #ffeede 100%);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: clamp(12px, 2vw, 28px);
    padding-top: max(clamp(12px, 2vw, 28px), env(safe-area-inset-top));
    padding-bottom: max(clamp(12px, 2vw, 28px), env(safe-area-inset-bottom));
  }
  .stage {
    width: 100%; max-width: 1500px;
    display: flex; flex-direction: column; gap: clamp(12px, 1.8vmin, 22px);
  }
  .title {
    font-family: 'Baloo 2', cursive; font-weight: 800; text-align: center; line-height: 1;
    font-size: clamp(30px, 6vw, 56px); letter-spacing: -1px;
    color: var(--p1); text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(108,92,231,.22);
  }
  .title .q { color: var(--p3); display: inline-block; transform: rotate(8deg); }
  .card {
    background: #fff; border: 4px solid var(--ink); border-radius: 22px;
    padding: clamp(14px, 2.4vw, 26px); box-shadow: 5px 5px 0 rgba(45,33,80,.18);
    text-align: center;
  }
  #question {
    font-family: 'Baloo 2', cursive; font-weight: 700; line-height: 1.25;
    font-size: clamp(20px, 3.6vw, 40px);
  }
  #question b { color: var(--p1); }
  .cols {
    display: grid; grid-template-columns: 1fr 1fr; gap: clamp(12px, 1.6vw, 22px);
    align-items: stretch;
  }
  .opt {
    border: 4px solid var(--ink); border-radius: 22px;
    padding: clamp(14px, 2vw, 24px); background: #fffdf6;
    box-shadow: 5px 5px 0 rgba(45,33,80,.18);
    display: flex; flex-direction: column;
  }
  .opt-name {
    font-family: 'Baloo 2', cursive; font-weight: 700; text-align: center;
    font-size: clamp(19px, 2.8vw, 34px); margin-bottom: clamp(10px, 1.4vw, 16px);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .opt-name .badge { font-size: 1.1em; }
  .col-label {
    font-family: 'Baloo 2', cursive; font-weight: 700;
    font-size: clamp(15px, 1.9vw, 22px); margin: 6px 0 8px;
  }
  .for .col-label { color: var(--p2d); }
  .against .col-label { color: var(--p3d); }
  ul { list-style: none; }
  li {
    font-weight: 600; font-style: italic; line-height: 1.35;
    font-size: clamp(14px, 1.8vw, 22px);
    padding: clamp(8px, 1vw, 13px) clamp(11px, 1.2vw, 16px);
    margin-bottom: clamp(7px, 0.9vw, 10px); border-radius: 12px;
  }
  .for li { background: #d6f7ec; }
  .against li { background: #ffe3e2; }
  .spin-wrap { text-align: center; margin-top: clamp(4px, 0.6vw, 8px); }
  .spin {
    font-family: 'Baloo 2', cursive; font-weight: 800;
    font-size: clamp(18px, 2.4vw, 28px);
    background: var(--p4); color: #5a3d00; border: 4px solid var(--ink);
    border-radius: 50px; cursor: pointer; box-shadow: 5px 5px 0 rgba(45,33,80,.3);
    padding: clamp(12px, 1.6vw, 17px) clamp(28px, 4vw, 46px);
    transition: transform .12s, box-shadow .12s; touch-action: manipulation;
  }
  .spin:hover { transform: translate(-2px,-2px) rotate(-1deg); box-shadow: 7px 7px 0 rgba(45,33,80,.35); }
  .spin:active { transform: translate(4px,4px); box-shadow: 1px 1px 0 rgba(45,33,80,.3); }

  /* Phone / narrow screens: stack the two choices, allow scroll */
  @media (max-width: 720px) {
    html, body { min-height: 100dvh; }
    body { justify-content: flex-start; }
    .cols { grid-template-columns: 1fr; }
    .spin {
      position: sticky; bottom: max(10px, env(safe-area-inset-bottom)); z-index: 5;
      width: 100%; max-width: 420px; margin: 4px auto 0;
    }
  }
</style>
</head>
<body>

  <div class="stage">
    <h1 class="title">Would You Rather<span class="q">?</span></h1>
    <div class="card"><div id="question"></div></div>
    <div class="cols">
      <div class="opt" id="optA"></div>
      <div class="opt" id="optB"></div>
    </div>
    <div class="spin-wrap">
      <button class="spin" id="spin">&#127922; New question!</button>
    </div>
  </div>

<script>
const QS = [
  {a:"have a pet dinosaur", b:"have a pet dragon"},
  {a:"talk to animals", b:"fly like a bird"},
  {a:"be invisible", b:"be super fast"},
  {a:"eat pizza every day", b:"eat ice cream forever"},
  {a:"have magic powers", b:"be able to time travel"},
  {a:"swim with dolphins", b:"ride on a giant turtle"},
  {a:"have a monkey tail", b:"have elephant ears"},
  {a:"live in a treehouse", b:"live in an underwater house"},
  {a:"have laser eyes", b:"have stretchy arms"},
  {a:"be a superhero", b:"be a wizard"},
  {a:"explore space", b:"dive deep in the ocean"},
  {a:"be a pirate", b:"be an astronaut"},
  {a:"have no homework", b:"have no tests"},
  {a:"have chocolate rain", b:"have popcorn snow"},
  {a:"be super smart", b:"be super silly"},
  {a:"have a robot dog", b:"have a robot cat"},
  {a:"ride a unicorn", b:"ride a dinosaur"},
  {a:"have wings", b:"have fins"},
  {a:"control fire", b:"control water"},
  {a:"jump super high", b:"run super fast"},
  {a:"be as tiny as an ant", b:"be as big as an elephant"},
  {a:"have candy for breakfast", b:"have cookies for dinner"},
  {a:"visit the past", b:"visit the future"},
  {a:"have rainbow hair", b:"have glowing skin"},
  {a:"live in a candy land", b:"live in a LEGO world"},
  {a:"sneeze glitter", b:"burp bubbles"},
  {a:"have a flying car", b:"have a swimming car"},
  {a:"play tag forever", b:"play hide-and-seek forever"},
  {a:"be friends with aliens", b:"be friends with robots"},
  {a:"breathe underwater", b:"breathe in space"}
];

function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function starters(myChoice, otherChoice){
  return {
    good: [
      "I would rather " + myChoice + " because...",
      "The best part would be...",
      "It would be awesome since..."
    ],
    bad: [
      "I wouldn't want to " + otherChoice + " because...",
      "That choice would be tricky since...",
      "The worst part of it would be..."
    ]
  };
}

function optionBlock(name, otherName, emoji){
  var s = starters(name, otherName);
  return '<div class="opt-name"><span class="badge">'+emoji+'</span>'+cap(name)+'</div>'
    + '<div class="for"><div class="col-label">&#128077; Why I\'d pick it</div><ul>'
    + s.good.map(function(r){return '<li>'+r+'</li>';}).join('') + '</ul></div>'
    + '<div class="against"><div class="col-label">&#128078; Why not the other</div><ul>'
    + s.bad.map(function(r){return '<li>'+r+'</li>';}).join('') + '</ul></div>';
}

var last = -1;
function show(){
  var i = Math.floor(Math.random()*QS.length);
  if (QS.length > 1) { while (i === last) i = Math.floor(Math.random()*QS.length); }
  last = i;
  var q = QS[i];
  document.getElementById("question").innerHTML = "Would you rather <b>"+q.a+"</b> or <b>"+q.b+"</b>?";
  document.getElementById("optA").innerHTML = optionBlock(q.a, q.b, "\uD83C\uDD70\uFE0F");
  document.getElementById("optB").innerHTML = optionBlock(q.b, q.a, "\uD83C\uDD71\uFE0F");
}

document.getElementById("spin").onclick = show;
document.addEventListener("keydown", function(e){
  if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowRight") { e.preventDefault(); show(); }
});
show();
</script>
</body>
</html>
