<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather? — Sentence Starters</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --ink: #2d2150; --p1: #6c5ce7; --p3: #ff7675; --p2d: #0a7a63; --p3d: #d6403e; --p4: #fdcb6e; }
  html, body { height: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    background:
      radial-gradient(circle at 12% 14%, #ffe9a8 0 22px, transparent 23px),
      radial-gradient(circle at 86% 10%, #b6e3ff 0 20px, transparent 21px),
      radial-gradient(circle at 92% 78%, #ffc6d9 0 24px, transparent 25px),
      radial-gradient(circle at 6% 82%, #c5f3e0 0 20px, transparent 21px),
      linear-gradient(160deg, #fff7ec 0%, #ffeede 100%);
    min-height: 100vh; color: var(--ink);
    padding: clamp(16px, 2.5vw, 32px);
    display: flex; flex-direction: column; align-items: center;
  }
  .title {
    font-family: 'Baloo 2', cursive; font-weight: 800;
    font-size: clamp(34px, 5vw, 64px); text-align: center; line-height: 1;
    color: var(--p1); text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(108,92,231,.22);
    letter-spacing: -1px;
  }
  .title .q { color: var(--p3); display: inline-block; transform: rotate(8deg); }
  .subtitle { text-align: center; font-weight: 700; font-size: clamp(15px, 1.6vw, 22px); color: #6b5e8a; margin: 10px 0 18px; }
  .stage { width: 100%; max-width: 1500px; display: flex; flex-direction: column; flex: 1; }
  .card {
    background: #fff; border: 5px solid var(--ink); border-radius: 30px;
    padding: clamp(16px, 2vw, 28px); box-shadow: 8px 8px 0 rgba(45,33,80,.18);
    text-align: center; margin-bottom: clamp(14px, 2vw, 24px);
  }
  #question { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: clamp(24px, 3.4vw, 46px); line-height: 1.3; }
  #question b { color: var(--p1); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 2vw, 28px); flex: 1; }
  .opt {
    border: 5px solid var(--ink); border-radius: 28px; padding: clamp(16px, 1.8vw, 28px);
    box-shadow: 6px 6px 0 rgba(45,33,80,.18); background: #fffdf6;
    display: flex; flex-direction: column;
  }
  .opt-name { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: clamp(22px, 2.6vw, 38px); margin-bottom: clamp(12px,1.4vw,20px); display: flex; align-items: center; gap: 12px; justify-content: center; text-align: center; }
  .opt-name .badge { font-size: 1.15em; }
  .col-label { font-family:'Baloo 2',cursive; font-weight: 700; font-size: clamp(16px, 1.7vw, 24px); margin: 6px 0 10px; }
  .for .col-label { color: var(--p2d); }
  .against .col-label { color: var(--p3d); }
  ul { list-style: none; margin-bottom: 6px; }
  li { font-weight: 600; font-size: clamp(15px, 1.5vw, 23px); line-height: 1.45; padding: clamp(9px,1vw,14px) clamp(12px,1.2vw,18px); margin-bottom: 9px; border-radius: 14px; font-style: italic; }
  .for li { background: #d6f7ec; }
  .against li { background: #ffe3e2; }
  .spin-wrap { text-align: center; margin-top: clamp(16px, 2vw, 26px); }
  .spin {
    font-family: 'Baloo 2', cursive; font-weight: 800; font-size: clamp(20px, 2.2vw, 30px);
    background: var(--p4); color: #5a3d00; border: 5px solid var(--ink); border-radius: 50px;
    padding: clamp(12px,1.4vw,18px) clamp(28px,3vw,44px); cursor: pointer; box-shadow: 6px 6px 0 rgba(45,33,80,.3);
    transition: transform .12s, box-shadow .12s;
  }
  .spin:hover { transform: translate(-2px,-2px) rotate(-1deg); box-shadow: 8px 8px 0 rgba(45,33,80,.35); }
  .spin:active { transform: translate(4px,4px); box-shadow: 1px 1px 0 rgba(45,33,80,.3); }
  @media (max-width: 760px){ .cols { grid-template-columns: 1fr; } }
</style>
</head>
<body>

  <h1 class="title">Would You Rather<span class="q">?</span></h1>
  <p class="subtitle">Pick a side, then finish the sentence starters to say why!</p>

  <div class="stage">
    <div class="card">
      <div id="question"></div>
    </div>
    <div class="cols">
      <div class="opt" id="optA"></div>
      <div class="opt" id="optB"></div>
    </div>
    <div class="spin-wrap">
      <button class="spin" id="spin">&#127922; New question!</button>
    </div>
  </div>

<script>
const QS = [
  {a:"have a pet dinosaur", b:"have a pet dragon"},
  {a:"talk to animals", b:"fly like a bird"},
  {a:"be invisible", b:"be super fast"},
  {a:"eat pizza every day", b:"eat ice cream forever"},
  {a:"have magic powers", b:"be able to time travel"},
  {a:"swim with dolphins", b:"ride on a giant turtle"},
  {a:"have a monkey tail", b:"have elephant ears"},
  {a:"live in a treehouse", b:"live in an underwater house"},
  {a:"have laser eyes", b:"have stretchy arms"},
  {a:"be a superhero", b:"be a wizard"},
  {a:"explore space", b:"dive deep in the ocean"},
  {a:"be a pirate", b:"be an astronaut"},
  {a:"have no homework", b:"have no tests"},
  {a:"have chocolate rain", b:"have popcorn snow"},
  {a:"be super smart", b:"be super silly"},
  {a:"have a robot dog", b:"have a robot cat"},
  {a:"ride a unicorn", b:"ride a dinosaur"},
  {a:"have wings", b:"have fins"},
  {a:"control fire", b:"control water"},
  {a:"jump super high", b:"run super fast"},
  {a:"be as tiny as an ant", b:"be as big as an elephant"},
  {a:"have candy for breakfast", b:"have cookies for dinner"},
  {a:"visit the past", b:"visit the future"},
  {a:"have rainbow hair", b:"have glowing skin"},
  {a:"live in a candy land", b:"live in a LEGO world"},
  {a:"sneeze glitter", b:"burp bubbles"},
  {a:"have a flying car", b:"have a swimming car"},
  {a:"play tag forever", b:"play hide-and-seek forever"},
  {a:"be friends with aliens", b:"be friends with robots"},
  {a:"breathe underwater", b:"breathe in space"}
];

function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function starters(myChoice, otherChoice){
  return {
    good: [
      "I would rather " + myChoice + " because...",
      "The best part would be...",
      "It would be awesome since..."
    ],
    bad: [
      "I wouldn't want to " + otherChoice + " because...",
      "That choice would be tricky since...",
      "The worst part of it would be..."
    ]
  };
}

function optionBlock(name, otherName, emoji){
  var s = starters(name, otherName);
  return '<div class="opt-name"><span class="badge">'+emoji+'</span>'+cap(name)+'</div>'
    + '<div class="for"><div class="col-label">&#128077; Why I\'d pick it</div><ul>'
    + s.good.map(function(r){return '<li>'+r+'</li>';}).join('') + '</ul></div>'
    + '<div class="against"><div class="col-label">&#128078; Why not the other</div><ul>'
    + s.bad.map(function(r){return '<li>'+r+'</li>';}).join('') + '</ul></div>';
}

function show(){
  var q = QS[Math.floor(Math.random()*QS.length)];
  document.getElementById("question").innerHTML = "Would you rather <b>"+q.a+"</b> or <b>"+q.b+"</b>?";
  document.getElementById("optA").innerHTML = optionBlock(q.a, q.b, "\uD83C\uDD70\uFE0F");
  document.getElementById("optB").innerHTML = optionBlock(q.b, q.a, "\uD83C\uDD71\uFE0F");
}

document.getElementById("spin").onclick = show;
show();
</script>
</body>
</html>
