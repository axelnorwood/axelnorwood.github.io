<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Picker — Find Your Perfect Project!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #FFF3E0;
    --bg2: #FFE8F0;
    --ink: #2D2A4A;
    --ink-soft: #5B567E;
    --card: #FFFFFF;
    --shadow: rgba(45, 42, 74, 0.14);
    --display: 'Baloo 2', cursive;
    --head: 'Fredoka', sans-serif;
    --body: 'Nunito', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: var(--body);
    color: var(--ink);
    background:
      radial-gradient(circle at 12% 18%, #FFD6A5 0%, transparent 42%),
      radial-gradient(circle at 88% 12%, #C7F0FF 0%, transparent 40%),
      radial-gradient(circle at 78% 88%, #FFC8DD 0%, transparent 45%),
      radial-gradient(circle at 20% 85%, #CDFFD8 0%, transparent 42%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment: fixed;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* floating doodles */
  .doodle {
    position: fixed;
    font-size: 2.4rem;
    opacity: 0.5;
    pointer-events: none;
    animation: float 7s ease-in-out infinite;
    z-index: 0;
    filter: saturate(1.1);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-18px) rotate(8deg); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1040px;
    margin: 0 auto;
    padding: 22px 18px 80px;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    min-height: 52px;
  }
  .back-btn {
    border: none;
    background: var(--card);
    color: var(--ink);
    font-family: var(--head);
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 20px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--shadow);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform .12s ease, box-shadow .12s ease;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
  }
  .back-btn.show { opacity: 1; transform: none; pointer-events: auto; }
  .back-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--shadow); }

  .crumb {
    font-family: var(--head);
    font-weight: 500;
    color: var(--ink-soft);
    font-size: .95rem;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .crumb b { color: var(--ink); }

  /* ---------- Screen transitions ---------- */
  .screen { animation: pop .45s cubic-bezier(.2,.9,.3,1.4); }
  @keyframes pop {
    from { opacity: 0; transform: scale(.96) translateY(14px); }
    to { opacity: 1; transform: none; }
  }

  /* ---------- Hero (home) ---------- */
  .hero { text-align: center; margin-bottom: 26px; }
  .hero .mascot {
    font-size: 4.6rem;
    display: inline-block;
    animation: bounce 2.4s ease-in-out infinite;
    filter: drop-shadow(0 8px 6px rgba(0,0,0,.12));
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
  }
  .hero h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(2.1rem, 6vw, 3.4rem);
    line-height: 1.02;
    margin: 6px 0 6px;
    color: var(--ink);
    letter-spacing: -.5px;
  }
  .hero h1 .pop1 { color: #FF6B6B; }
  .hero h1 .pop2 { color: #4D96FF; }
  .hero h1 .pop3 { color: #52B788; }
  .hero p {
    font-size: clamp(1rem, 2.6vw, 1.25rem);
    color: var(--ink-soft);
    font-weight: 700;
    max-width: 560px;
    margin: 0 auto;
  }
  .big-surprise {
    margin-top: 18px;
    border: none;
    background: linear-gradient(135deg, #FF6B6B, #FF9F1C, #FFB703);
    background-size: 200% 200%;
    color: #fff;
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(1.05rem, 3vw, 1.35rem);
    padding: 16px 32px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 7px 0 rgba(190,90,30,.35);
    transition: transform .12s ease, box-shadow .12s ease;
    animation: shimmer 4s ease infinite;
  }
  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .big-surprise:hover { transform: translateY(-3px) scale(1.03); }
  .big-surprise:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(190,90,30,.35); }

  .section-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(1.4rem, 4vw, 2.1rem);
    margin: 4px 0 18px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .tag {
    font-size: 2rem;
  }
  .section-sub {
    font-weight: 700;
    color: var(--ink-soft);
    margin: -10px 0 20px;
    font-size: 1.05rem;
  }

  /* ---------- Card grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }
  .grid.two { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }

  .card {
    --c: #FF6B6B;
    position: relative;
    border: none;
    text-align: left;
    background: var(--card);
    border-radius: 22px;
    padding: 18px 16px 16px;
    cursor: pointer;
    box-shadow: 0 7px 0 var(--shadow);
    transition: transform .14s ease, box-shadow .14s ease;
    overflow: hidden;
    font-family: var(--body);
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 132px;
    animation: cardIn .5s backwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(.95); }
    to { opacity: 1; transform: none; }
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 8px;
    background: var(--c);
  }
  .card:hover { transform: translateY(-5px) rotate(-1deg); box-shadow: 0 12px 0 var(--shadow); }
  .card:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--shadow); }
  .card .ic {
    font-size: 2.5rem;
    line-height: 1;
    filter: drop-shadow(0 3px 2px rgba(0,0,0,.1));
  }
  .card .nm {
    font-family: var(--head);
    font-weight: 600;
    font-size: 1.08rem;
    color: var(--ink);
    line-height: 1.12;
  }
  .card .bl {
    font-size: .86rem;
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1.25;
  }
  .card .chev {
    margin-top: auto;
    align-self: flex-end;
    font-family: var(--head);
    font-weight: 600;
    color: var(--c);
    font-size: .9rem;
  }

  /* ---------- Detail screen ---------- */
  .detail-head {
    background: var(--card);
    border-radius: 26px;
    padding: 24px 22px;
    box-shadow: 0 8px 0 var(--shadow);
    position: relative;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .detail-head::after {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--c);
    opacity: .14;
  }
  .detail-head .big-ic {
    font-size: 3.6rem;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,.12));
  }
  .detail-head h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(1.7rem, 5vw, 2.5rem);
    margin: 6px 0 4px;
    color: var(--ink);
    line-height: 1.04;
  }
  .detail-head .tagline {
    font-family: var(--head);
    font-weight: 500;
    font-size: 1.15rem;
    color: var(--c);
  }

  .panel {
    background: var(--card);
    border-radius: 22px;
    padding: 20px 20px 22px;
    box-shadow: 0 7px 0 var(--shadow);
    margin-bottom: 20px;
  }
  .panel h3 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 1.3rem;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    color: var(--ink);
  }
  .panel h3 .e { font-size: 1.4rem; }

  .needs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .pill {
    background: var(--bg2);
    border: 2.5px dashed var(--c);
    color: var(--ink);
    font-weight: 700;
    font-size: .95rem;
    padding: 8px 14px;
    border-radius: 14px;
  }

  .steps { list-style: none; counter-reset: s; }
  .step {
    counter-increment: s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 2px dotted #EDE9F5;
    cursor: pointer;
  }
  .step:last-child { border-bottom: none; }
  .step .num {
    flex: 0 0 auto;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--c);
    color: #fff;
    font-family: var(--head);
    font-weight: 600;
    font-size: 1.15rem;
    display: grid;
    place-items: center;
    box-shadow: 0 3px 0 rgba(0,0,0,.15);
    transition: transform .15s ease;
  }
  .step .num::before { content: counter(s); }
  .step .tx {
    font-weight: 700;
    font-size: 1.08rem;
    line-height: 1.35;
    padding-top: 5px;
    color: var(--ink);
    flex: 1;
  }
  .step .check {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 9px;
    border: 3px solid #E2DEEF;
    margin-top: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 1.1rem;
    transition: all .15s ease;
  }
  .step.done .tx { color: var(--ink-soft); text-decoration: line-through; text-decoration-thickness: 2px; }
  .step.done .num { transform: scale(.9); opacity: .65; }
  .step.done .check { background: var(--c); border-color: var(--c); }
  .step.done .check::before { content: "✓"; }

  /* ---------- ATL skills ---------- */
  .atl-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 600px) {
    .atl-grid { grid-template-columns: 1fr 1fr; }
  }
  .atl {
    --ac: #9B5DE5;
    background: color-mix(in srgb, var(--ac) 10%, #fff);
    border: 3px solid color-mix(in srgb, var(--ac) 32%, #fff);
    border-radius: 18px;
    padding: 14px 16px 12px;
  }
  .atl-head {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 10px;
  }
  .atl-ic {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 13px;
    background: var(--ac);
    display: grid;
    place-items: center;
    font-size: 1.4rem;
    box-shadow: 0 4px 0 rgba(0,0,0,.12);
  }
  .atl-cat {
    font-family: var(--head);
    font-weight: 600;
    font-size: 1.12rem;
    color: var(--ink);
    line-height: 1.1;
  }
  .atl-subs {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .atl-sub {
    position: relative;
    padding-left: 22px;
    line-height: 1.3;
  }
  .atl-sub::before {
    content: "";
    position: absolute;
    left: 4px; top: 7px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--ac);
  }
  .atl-sub-name {
    display: block;
    font-family: var(--head);
    font-weight: 600;
    font-size: .98rem;
    color: var(--ink);
  }
  .atl-sub-note {
    display: block;
    font-weight: 700;
    font-size: .85rem;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  .tipbox {
    background: linear-gradient(135deg, #FFF6D6, #FFE9B8);
    border-radius: 18px;
    padding: 16px 18px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    box-shadow: 0 6px 0 rgba(214,168,40,.25);
  }
  .tipbox .bulb { font-size: 1.9rem; flex: 0 0 auto; animation: glow 1.6s ease-in-out infinite; }
  @keyframes glow { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.15) rotate(6deg);} }
  .tipbox .tiptx { font-weight: 700; font-size: 1.02rem; line-height: 1.35; }
  .tipbox .tiptx b { color: #B5710B; }

  /* progress bar on detail */
  .progress-wrap {
    margin: 18px 0 4px;
    background: #ECE8F6;
    border-radius: 999px;
    height: 16px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.08);
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--c);
    border-radius: 999px;
    transition: width .4s cubic-bezier(.2,.9,.3,1.4);
  }
  .progress-label {
    text-align: center;
    font-family: var(--head);
    font-weight: 600;
    color: var(--ink-soft);
    margin-top: 8px;
    font-size: .98rem;
  }
  .celebrate {
    text-align: center;
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.3rem;
    color: #52B788;
    margin-top: 6px;
    opacity: 0;
    transition: opacity .3s ease;
  }
  .celebrate.show { opacity: 1; animation: pop .5s; }

  .surprise-btn {
    display: block;
    margin: 22px auto 0;
    border: none;
    background: linear-gradient(135deg, #FF6B6B, #FF9F1C);
    color: #fff;
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.2rem;
    padding: 16px 30px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 7px 0 rgba(190,60,40,.35);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .surprise-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(190,60,40,.35); }

  .foot {
    text-align: center;
    color: var(--ink-soft);
    font-weight: 700;
    margin-top: 30px;
    font-size: .9rem;
    opacity: .8;
  }

  @media (max-width: 520px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .back-btn { padding: 10px 16px; font-size: .92rem; }
  }
</style>
</head>

<script>
(function () {
  const DATA = window.DATA;
  const app = document.getElementById('app');
  const backBtn = document.getElementById('backBtn');
  const crumb = document.getElementById('crumb');

  // Progress stored in memory only (no browser storage in artifacts)
  const progress = {}; // projectId -> Set of completed step indices

  // View state: {view:'home'} | {view:'category', catId} | {view:'project', catId, projId}
  let state = { view: 'home' };
  const history = [];

  function findCategory(id) { return DATA.categories.find(c => c.id === id); }
  function findProject(catId, projId) { return DATA.projects[catId].find(p => p.id === projId); }

  function go(newState, isBack) {
    if (!isBack) history.push(state);
    state = newState;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  backBtn.addEventListener('click', () => {
    if (history.length) {
      const prev = history.pop();
      state = prev;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  function render() {
    backBtn.classList.toggle('show', state.view !== 'home');
    if (state.view === 'home') renderHome();
    else if (state.view === 'category') renderCategory();
    else if (state.view === 'project') renderProject();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  /* ---------- HOME ---------- */
  function renderHome() {
    crumb.innerHTML = '';
    let html = `
      <div class="screen">
        <div class="hero">
          <div class="mascot">🚀</div>
          <h1>Find Your <span class="pop1">Perfect</span> <span class="pop2">Project!</span></h1>
          <p>Tap a box below to start. We'll help you pick something awesome and show you exactly what to do! 🌟</p>
          <button class="big-surprise" id="homeSurprise">🎲 Don't know? Surprise me!</button>
        </div>
        <div class="grid two">`;
    DATA.categories.forEach((c, i) => {
      const count = DATA.projects[c.id].length;
      html += `
        <button class="card" style="--c:${c.color}; animation-delay:${i * 0.05}s" data-cat="${c.id}">
          <div class="ic">${c.icon}</div>
          <div class="nm">${escapeHtml(c.title)}</div>
          <div class="bl">${escapeHtml(c.blurb)}</div>
          <div class="chev">${count} ideas →</div>
        </button>`;
    });
    html += `</div></div>`;
    app.innerHTML = html;
    app.querySelectorAll('[data-cat]').forEach(el => {
      el.addEventListener('click', () => go({ view: 'category', catId: el.dataset.cat }));
    });
    document.getElementById('homeSurprise').addEventListener('click', surpriseMe);
  }

  /* ---------- pick a random project from ALL categories ---------- */
  function surpriseMe() {
    // Flatten every project across all categories into one list
    const all = [];
    DATA.categories.forEach(c => {
      DATA.projects[c.id].forEach(p => all.push({ catId: c.id, projId: p.id }));
    });
    // Try to avoid repeating the last surprise so it feels fresh
    let pick;
    do {
      pick = all[Math.floor(Math.random() * all.length)];
    } while (all.length > 1 && pick.projId === lastSurprise);
    lastSurprise = pick.projId;
    burst('#FF9F1C');
    go({ view: 'project', catId: pick.catId, projId: pick.projId });
  }
  let lastSurprise = null;

  /* ---------- CATEGORY ---------- */
  function renderCategory() {
    const cat = findCategory(state.catId);
    crumb.innerHTML = `<b>${escapeHtml(cat.title)}</b>`;
    const projs = DATA.projects[cat.id];
    let html = `
      <div class="screen">
        <div class="section-title"><span class="tag">${cat.icon}</span> ${escapeHtml(cat.title)}</div>
        <div class="section-sub">Pick one to see how to make it! 👇</div>
        <div class="grid">`;
    projs.forEach((p, i) => {
      const done = progress[p.id] ? progress[p.id].size : 0;
      const total = p.steps.length;
      const doneTag = done > 0
        ? `<div class="chev">${done === total ? '✓ Done!' : done + '/' + total + ' done'}</div>`
        : `<div class="chev">Let's go →</div>`;
      html += `
        <button class="card" style="--c:${cat.color}; animation-delay:${i * 0.04}s" data-proj="${p.id}">
          <div class="ic">${p.icon}</div>
          <div class="nm">${escapeHtml(p.name)}</div>
          <div class="bl">${escapeHtml(p.blurb)}</div>
          ${doneTag}
        </button>`;
    });
    html += `</div>
      <button class="surprise-btn" id="surprise">🎲 Surprise Me!</button>
    </div>`;
    app.innerHTML = html;
    app.querySelectorAll('[data-proj]').forEach(el => {
      el.addEventListener('click', () => go({ view: 'project', catId: cat.id, projId: el.dataset.proj }));
    });
    document.getElementById('surprise').addEventListener('click', () => {
      const pick = projs[Math.floor(Math.random() * projs.length)];
      go({ view: 'project', catId: cat.id, projId: pick.id });
    });
  }

  /* ---------- PROJECT DETAIL ---------- */
  function renderProject() {
    const cat = findCategory(state.catId);
    const p = findProject(state.catId, state.projId);
    if (!progress[p.id]) progress[p.id] = new Set();
    crumb.innerHTML = `${escapeHtml(cat.title)} › <b>${escapeHtml(p.name)}</b>`;

    // ATL skill metadata: icon + color per IB category
    const ATL_META = {
      "Thinking": { icon: "🧠", color: "#FF6B6B" },
      "Social": { icon: "🤝", color: "#F15BB5" },
      "Communication": { icon: "💬", color: "#4D96FF" },
      "Self-Management": { icon: "⏰", color: "#FF9F1C" },
      "Research": { icon: "🔍", color: "#52B788" },
    };

    let needsHtml = p.need.map(n => `<div class="pill">${escapeHtml(n)}</div>`).join('');

    let atlsHtml = (p.atls || []).map(a => {
      const m = ATL_META[a.cat] || { icon: "✨", color: "#9B5DE5" };
      const subsHtml = a.subs.map(s =>
        `<li class="atl-sub"><span class="atl-sub-name">${escapeHtml(s.name)}</span><span class="atl-sub-note">${escapeHtml(s.note)}</span></li>`
      ).join('');
      return `<div class="atl" style="--ac:${m.color}">
        <div class="atl-head">
          <div class="atl-ic">${m.icon}</div>
          <div class="atl-cat">${escapeHtml(a.cat)} Skills</div>
        </div>
        <ul class="atl-subs">${subsHtml}</ul>
      </div>`;
    }).join('');
    let stepsHtml = p.steps.map((s, i) => {
      const done = progress[p.id].has(i);
      return `<li class="step ${done ? 'done' : ''}" data-step="${i}">
        <div class="num"></div>
        <div class="tx">${escapeHtml(s)}</div>
        <div class="check"></div>
      </li>`;
    }).join('');

    const html = `
      <div class="screen" style="--c:${cat.color}">
        <div class="detail-head" style="--c:${cat.color}">
          <div class="big-ic">${p.icon}</div>
          <h2>${escapeHtml(p.name)}</h2>
          <div class="tagline">${escapeHtml(p.blurb)}</div>
        </div>

        <div class="panel">
          <h3><span class="e">🧰</span> What You Need</h3>
          <div class="needs">${needsHtml}</div>
        </div>

        <div class="panel">
          <h3><span class="e">👣</span> Steps to Follow</h3>
          <ul class="steps" id="steps">${stepsHtml}</ul>
          <div class="progress-wrap"><div class="progress-bar" id="bar" style="background:${cat.color}"></div></div>
          <div class="progress-label" id="plabel"></div>
          <div class="celebrate" id="celebrate">🎉 You did it! Amazing work! 🎉</div>
        </div>

        <div class="panel">
          <h3><span class="e">🌟</span> Skills You'll Build</h3>
          <div class="atl-grid">${atlsHtml}</div>
        </div>

        <div class="panel" style="margin-bottom:8px">
          <h3><span class="e">⭐</span> Bonus Tip</h3>
          <div class="tipbox">
            <div class="bulb">💡</div>
            <div class="tiptx"><b>Try this:</b> ${escapeHtml(p.tip)}</div>
          </div>
        </div>
      </div>`;
    app.innerHTML = html;

    const steps = app.querySelectorAll('.step');
    steps.forEach(step => {
      step.addEventListener('click', () => {
        const idx = +step.dataset.step;
        if (progress[p.id].has(idx)) { progress[p.id].delete(idx); step.classList.remove('done'); }
        else { progress[p.id].add(idx); step.classList.add('done'); }
        updateProgress(p, cat);
      });
    });
    updateProgress(p, cat);
  }

  function updateProgress(p, cat) {
    const total = p.steps.length;
    const done = progress[p.id].size;
    const pct = Math.round((done / total) * 100);
    const bar = document.getElementById('bar');
    const label = document.getElementById('plabel');
    const celebrate = document.getElementById('celebrate');
    if (bar) bar.style.width = pct + '%';
    if (label) label.textContent = done === 0
      ? 'Tap a step when you finish it!'
      : `${done} of ${total} steps done`;
    if (celebrate) celebrate.classList.toggle('show', done === total);
    if (done === total && total > 0) burst(cat.color);
  }

  /* ---------- confetti burst ---------- */
  let lastBurst = 0;
  function burst(color) {
    const now = Date.now();
    if (now - lastBurst < 1500) return;
    lastBurst = now;
    const emojis = ['🎉', '⭐', '🎊', '✨', '🌟', '🥳'];
    for (let i = 0; i < 24; i++) {
      const e = document.createElement('div');
      e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      e.style.cssText = `position:fixed;left:${50 + (Math.random() * 40 - 20)}%;top:40%;font-size:${1.4 + Math.random() * 1.4}rem;z-index:99;pointer-events:none;`;
      document.body.appendChild(e);
      const dx = (Math.random() - 0.5) * 600;
      const dy = -(150 + Math.random() * 300);
      const rot = (Math.random() - 0.5) * 720;
      e.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 1, offset: 0.7 },
        { transform: `translate(${dx * 1.2}px, ${dy + 500}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: 1600 + Math.random() * 600, easing: 'cubic-bezier(.2,.7,.4,1)' }).onfinish = () => e.remove();
    }
  }

  /* ---------- background doodles ---------- */
  (function () {
    const set = ['✏️', '🎨', '📚', '⭐', '🚀', '🧩', '🌈', '✂️', '🔬', '🎭', '💡', '🏆'];
    const c = document.getElementById('doodles');
    set.forEach((emo, i) => {
      const d = document.createElement('div');
      d.className = 'doodle';
      d.textContent = emo;
      d.style.left = (5 + Math.random() * 90) + 'vw';
      d.style.top = (5 + Math.random() * 90) + 'vh';
      d.style.animationDelay = (Math.random() * 5) + 's';
      d.style.animationDuration = (6 + Math.random() * 5) + 's';
      d.style.fontSize = (1.6 + Math.random() * 1.6) + 'rem';
      c.appendChild(d);
    });
  })();

  render();
})();

</script>
</body>
</html>
