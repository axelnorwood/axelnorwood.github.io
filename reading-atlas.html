<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--serif:'Playfair Display',Georgia,'Times New Roman',serif;
--sans:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;
--stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;
--stone-800:#292524;--stone-900:#1c1917;
--amber-50:#fffbeb;--amber-200:#fde68a;--amber-400:#fbbf24;--amber-900:#78350f;
--rose-50:#fff1f2;--rose-200:#fecdd3;--rose-400:#fb7185;--rose-900:#881337;
--emerald-600:#059669;
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:var(--sans);background:var(--stone-50);color:var(--stone-800);line-height:1.5}

/* Header */
.ra-header{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:1px solid var(--stone-200)}
.ra-header .sub{font-family:var(--sans);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--stone-500);margin-bottom:.25rem}
.ra-header h1{font-family:var(--serif);font-size:2rem;font-weight:700;color:var(--stone-900);margin-bottom:.35rem}
.ra-header .desc{font-size:.875rem;color:var(--stone-500);max-width:480px;margin:0 auto}

/* Tier strip */
.tier-strip{display:flex;justify-content:center;gap:1.5rem;padding:.75rem 1rem;background:#fff;border-bottom:1px solid var(--stone-200);flex-wrap:wrap}
.tier-item{display:flex;align-items:center;gap:.5rem;font-size:.75rem}
.tier-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tier-dot.hook{background:var(--amber-400)}.tier-dot.core{background:var(--stone-400)}.tier-dot.stretch{background:var(--rose-400)}
.tier-label{font-weight:600;color:var(--stone-700)}.tier-desc{color:var(--stone-500)}

/* Guide button & panel */
.guide-btn{display:flex;align-items:center;gap:.5rem;font-size:.875rem;color:var(--stone-700);background:#fff;border:1px solid var(--stone-300);border-radius:.375rem;padding:.5rem .75rem;cursor:pointer;margin:1rem auto 0}
.guide-btn:hover{color:var(--stone-900)}
.guide-panel{max-width:640px;margin:1rem auto 0;background:#fff;border:1px solid var(--stone-200);border-radius:.5rem;padding:1.5rem;font-size:.875rem;color:var(--stone-700);line-height:1.7}
.guide-panel h3{font-family:var(--serif);font-size:1.25rem;color:var(--stone-900);margin-bottom:.75rem}
.guide-panel h4{font-weight:600;color:var(--stone-800);margin:1rem 0 .35rem}
.guide-panel p{margin-bottom:.5rem}
.guide-table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:.8rem}
.guide-table th{text-align:left;padding:.4rem .5rem;border-bottom:2px solid var(--stone-300);color:var(--stone-600);font-weight:600}
.guide-table td{padding:.4rem .5rem;border-bottom:1px solid var(--stone-100)}
.guide-table tr:last-child td{border-bottom:none}

/* Sticky filter bar */
.filter-bar{position:sticky;top:0;z-index:50;background:var(--stone-100);border-bottom:1px solid var(--stone-200);padding:.75rem 1rem}
.filter-bar-inner{max-width:800px;margin:0 auto}
.filter-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:.75rem;font-weight:600;color:var(--stone-500);min-width:45px}
.grade-btn{width:32px;height:32px;border-radius:.25rem;border:none;font-size:.875rem;font-weight:500;cursor:pointer;background:transparent;color:var(--stone-700);transition:all .15s}
.grade-btn:hover{background:#fff}
.grade-btn.active{background:var(--stone-900);color:#fff}
.type-btn{padding:.375rem .75rem;font-size:.875rem;border:none;cursor:pointer;transition:all .15s;background:#fff;color:var(--stone-700)}
.type-btn:first-of-type{border-radius:.25rem 0 0 .25rem}.type-btn:last-of-type{border-radius:0 .25rem .25rem 0}
.type-btn:hover{background:var(--stone-50)}
.type-btn.active{background:var(--stone-900);color:#fff}
.genre-btn{padding:.25rem .625rem;font-size:.75rem;border:1px solid var(--stone-300);border-radius:9999px;background:#fff;color:var(--stone-700);cursor:pointer;transition:all .15s}
.genre-btn:hover{border-color:var(--stone-500)}
.genre-btn.active{background:var(--stone-900);color:#fff;border-color:var(--stone-900)}
.clear-btn{padding:.25rem .625rem;font-size:.75rem;color:var(--stone-500);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.clear-btn:hover{color:var(--stone-900)}

/* Main content */
.main{max-width:800px;margin:0 auto;padding:1rem}
.count{font-size:.875rem;color:var(--stone-500);margin-bottom:1rem}
.empty{text-align:center;padding:3rem 1rem;color:var(--stone-400);font-size:.875rem}

/* Book card */
.book-list{display:flex;flex-direction:column;gap:.5rem}
.book-card{border:1px solid var(--stone-200);border-radius:.5rem;background:#fff;overflow:hidden;transition:border-color .15s}
.book-card:hover{border-color:var(--stone-300)}
.book-header{width:100%;text-align:left;padding:1rem;border:none;background:transparent;cursor:pointer;display:flex;align-items:flex-start;gap:.75rem;font-family:var(--sans)}
.book-title{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--stone-900)}
.book-meta{display:flex;gap:.5rem;align-items:center;margin-top:.25rem;flex-wrap:wrap}
.book-genre{font-size:.7rem;color:var(--stone-500)}
.book-tier{font-size:.65rem;font-weight:600;padding:.125rem .5rem;border-radius:9999px;border:1px solid}
.book-tier.hook{background:var(--amber-50);color:var(--amber-900);border-color:var(--amber-200)}
.book-tier.core{background:var(--stone-100);color:var(--stone-800);border-color:var(--stone-300)}
.book-tier.stretch{background:var(--rose-50);color:var(--rose-900);border-color:var(--rose-200)}
.chevron{margin-left:auto;flex-shrink:0;color:var(--stone-400);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}

/* Expanded */
.book-detail{padding:0 1rem 1rem;font-size:.875rem;color:var(--stone-700);border-top:1px solid var(--stone-100)}
.book-detail-inner{padding-top:.75rem}
.detail-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--stone-500);margin-bottom:.2rem;margin-top:.75rem}
.detail-label:first-child{margin-top:0}
.detail-text{line-height:1.6}
.similar-list{display:flex;gap:.375rem;flex-wrap:wrap;margin-top:.25rem}
.similar-tag{font-size:.7rem;background:var(--stone-100);color:var(--stone-600);padding:.2rem .5rem;border-radius:.25rem}
.book-level{font-size:.75rem;color:var(--stone-500);margin-top:.75rem;padding-top:.5rem;border-top:1px solid var(--stone-100)}
.action-row{display:flex;gap:.5rem;margin-top:.75rem}
.action-btn{display:flex;align-items:center;gap:.375rem;font-size:.75rem;padding:.375rem .75rem;border-radius:.375rem;border:1px solid var(--stone-300);background:#fff;color:var(--stone-700);cursor:pointer;transition:all .15s}
.action-btn:hover{background:var(--stone-50)}
.action-btn.saved{background:var(--stone-900);color:#fff;border-color:var(--stone-900)}
.action-btn.read{background:var(--emerald-600);color:#fff;border-color:var(--emerald-600)}

/* Status bar */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--stone-200);padding:.5rem 1rem;display:flex;justify-content:center;gap:1rem;font-size:.75rem;color:var(--stone-500);z-index:50}
.status-badge{padding:.25rem .5rem;border-radius:.25rem;background:var(--stone-100)}

/* Footer */
.ra-footer{text-align:center;padding:2rem 1rem;font-size:.75rem;color:var(--stone-400);border-top:1px solid var(--stone-100);margin-top:2rem}
</style>
</head>

function ReadingAtlas() {
  const [grade, setGrade] = useState(3);
  const [type, setType] = useState("fiction");
  const [selectedGenres, setSelectedGenres] = useState([]);
  const [expanded, setExpanded] = useState(null);
  const [bookmarks, setBookmarks] = useState(new Set());
  const [readLog, setReadLog] = useState(new Set());
  const [showGuide, setShowGuide] = useState(false);

  const pool = useMemo(() => {
    return BOOKS.filter((b) => {
      if (b.grade !== grade) return false;
      if (b.type !== type) return false;
      if (selectedGenres.length && !selectedGenres.includes(b.genre)) return false;
      return true;
    });
  }, [grade, type, selectedGenres]);

  const availableGenres = useMemo(() => {
    const set = new Set(BOOKS.filter((b) => b.grade === grade && b.type === type).map((b) => b.genre));
    return Array.from(set);
  }, [grade, type]);

  const toggleSet = (setter, current, val) => {
    const n = new Set(current);
    if (n.has(val)) n.delete(val); else n.add(val);
    setter(n);
  };

  const toggleArr = (setter, current, val) => {
    setter(current.includes(val) ? current.filter((x) => x !== val) : [...current, val]);
  };

  const fiveFingerData = [
    ["0–1", "Very easy", "Great for a quick, relaxing read or practicing speed."],
    ["2–3", "Just right", "The sweet spot. You'll learn new words but won't get stuck."],
    ["4", "Challenging", "You might need a dictionary or a partner to help you through."],
    ["5+", "Too hard", "You'll spend more time decoding words than enjoying the story."],
  ];

  return (
    <div>
      {/* HEADER */}
      <div className="ra-header">
        <div className="sub">Elementary · Grades 1–5</div>
        <h1>The Reading Atlas</h1>
        <div className="desc">A curated guide to 200 fiction and non-fiction series across five grades.</div>
      </div>

      {/* TIER STRIP */}
      <div className="tier-strip">
        <div className="tier-item"><div className="tier-dot hook"></div><span className="tier-label">Hook</span><span className="tier-desc">Graphic or visual-heavy. Use sparingly.</span></div>
        <div className="tier-item"><div className="tier-dot core"></div><span className="tier-label">Core</span><span className="tier-desc">On-grade chapter books. The main diet.</span></div>
        <div className="tier-item"><div className="tier-dot stretch"></div><span className="tier-label">Stretch</span><span className="tier-desc">Above grade. May need support.</span></div>
      </div>

      {/* GUIDE BUTTON */}
      <button className="guide-btn" onClick={() => setShowGuide(!showGuide)}>
        <HelpIcon /> How to find a good-fit book
      </button>

      {showGuide && (
        <div className="guide-panel">
          <h3>The Five-Finger Rule</h3>
          <p>The quickest way to gauge whether a book's reading level matches your current skills.</p>
          <h4>Step 1 — Pick a "test page"</h4>
          <p>Open the book to a page in the middle with a solid block of text.</p>
          <h4>Step 2 — Start reading</h4>
          <p>Read the page normally. Every time you hit a word you don't know, put up one finger.</p>
          <h4>Step 3 — Count the fingers</h4>
          <table className="guide-table">
            <thead><tr><th>Fingers</th><th>Difficulty</th><th>The verdict</th></tr></thead>
            <tbody>
              {fiveFingerData.map(([f,d,v], i) => (
                <tr key={i}><td><strong>{f}</strong></td><td>{d}</td><td>{v}</td></tr>
              ))}
            </tbody>
          </table>
          <h4>Other quick checks</h4>
          <p><strong>The movie test.</strong> After reading one page, can you picture what happened? If the screen is blank, the vocabulary might be too dense.</p>
          <p><strong>The interest test.</strong> Do you actually care what happens on the next page? Even a perfectly leveled book is a bad fit if it bores you.</p>
          <p style={{marginTop:"0.75rem",fontStyle:"italic",color:"var(--stone-500)"}}>There's no shame in putting a "5-finger" book back on the shelf for later. It's not a no — it's just a not yet.</p>
        </div>
      )}

      {/* FILTER BAR */}
      <div className="filter-bar">
        <div className="filter-bar-inner">
          <div className="filter-row">
            <span className="filter-label">Grade</span>
            {[1,2,3,4,5].map(g => (
              <button key={g} className={`grade-btn ${grade===g?'active':''}`}
                onClick={() => {setGrade(g);setSelectedGenres([]);setExpanded(null);}}>{g}</button>
            ))}
          </div>
          <div className="filter-row">
            <span className="filter-label">Type</span>
            {[{k:"fiction",l:"Fiction"},{k:"nonfiction",l:"Non-fiction"}].map(o => (
              <button key={o.k} className={`type-btn ${type===o.k?'active':''}`}
                onClick={() => {setType(o.k);setSelectedGenres([]);setExpanded(null);}}>{o.l}</button>
            ))}
          </div>
          <div className="filter-row">
            <span className="filter-label">Genre:</span>
            {selectedGenres.length > 0 && <button className="clear-btn" onClick={() => setSelectedGenres([])}>clear</button>}
            {availableGenres.map(g => (
              <button key={g} className={`genre-btn ${selectedGenres.includes(g)?'active':''}`}
                onClick={() => toggleArr(setSelectedGenres, selectedGenres, g)}>{g}</button>
            ))}
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="count">Grade {grade} · {type==="fiction"?"Fiction":"Non-fiction"} · {pool.length} series</div>

        {pool.length === 0 ? (
          <div className="empty">No series match this genre. Try clearing it.</div>
        ) : (
          <div className="book-list">
            {pool.map((b) => {
              const key = `${b.grade}-${b.type}-${b.title}`;
              const isExpanded = expanded === key;
              const isSaved = bookmarks.has(key);
              const isRead = readLog.has(key);
              return (
                <div key={key} className="book-card">
                  <button className="book-header" onClick={() => setExpanded(isExpanded ? null : key)}>
                    <div style={{flex:1}}>
                      <div className="book-title">{b.title}</div>
                      <div className="book-meta">
                        <span className="book-genre">{b.genre}</span>
                        <span className={`book-tier ${b.tier}`}>{b.tier.charAt(0).toUpperCase() + b.tier.slice(1)}</span>
                      </div>
                    </div>
                    <span className={`chevron ${isExpanded?'open':''}`}><ChevronDownIcon/></span>
                  </button>
                  {isExpanded && (
                    <div className="book-detail">
                      <div className="book-detail-inner">
                        <div className="detail-label">Why read</div>
                        <div className="detail-text">{b.why}</div>
                        <div className="detail-label">Challenges</div>
                        <div className="detail-text">{b.challenges}</div>
                        <div className="detail-label">If they liked this, try</div>
                        <div className="similar-list">
                          {b.similar.map(s => <span key={s} className="similar-tag">{s}</span>)}
                        </div>
                        <div className="book-level">Level: {b.level}</div>
                        <div className="action-row">
                          <button className={`action-btn ${isSaved?'saved':''}`}
                            onClick={(e) => {e.stopPropagation();toggleSet(setBookmarks,bookmarks,key);}}>
                            <BookmarkIcon filled={isSaved}/> {isSaved?"Saved":"Save"}
                          </button>
                          <button className={`action-btn ${isRead?'read':''}`}
                            onClick={(e) => {e.stopPropagation();toggleSet(setReadLog,readLog,key);}}>
                            <CheckIcon/> {isRead?"Read":"Mark read"}
                          </button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {(bookmarks.size > 0 || readLog.size > 0) && (
          <div className="status-bar">
            {bookmarks.size > 0 && <span className="status-badge">{bookmarks.size} saved</span>}
            {readLog.size > 0 && <span className="status-badge">{readLog.size} marked as read</span>}
          </div>
        )}
      </div>

      <div className="ra-footer">200 series across 5 grades · curated reading guide</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReadingAtlas/>);
</script>
</body>
</html>
