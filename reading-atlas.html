<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>The Reading Atlas — Find Your Next Book</title>
<link rel="icon" href="data:,"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--serif:'Fraunces',Georgia,serif;
--sans:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
--paper:#fbf7ef;--paper-2:#fffdf8;
--ink:#2a2218;--ink-soft:#5c5142;--ink-faint:#8a7d6a;
--line:#e8dfcf;--line-soft:#f0e9da;
--hook:#f0a818;--hook-bg:#fdf3dc;--hook-ink:#7a5410;
--core:#2f8f6b;--core-bg:#e3f3eb;--core-ink:#1d5d44;
--stretch:#c2563b;--stretch-bg:#fbe7e0;--stretch-ink:#8a3522;
--accent:#3a6ea5;--accent-bg:#e6eef6;
--gold:#caa75a;
--shadow:0 1px 2px rgba(60,45,20,.06),0 4px 14px rgba(60,45,20,.05);
--shadow-lift:0 8px 30px rgba(60,45,20,.12);
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:var(--sans);color:var(--ink);line-height:1.55;
background:
radial-gradient(1200px 500px at 80% -10%,#fff7e6 0%,transparent 60%),
radial-gradient(900px 500px at -10% 10%,#f3f9f4 0%,transparent 55%),
var(--paper);
background-attachment:fixed;min-height:100vh}
button{font-family:inherit}
::selection{background:var(--gold);color:#fff}

.wrap{max-width:840px;margin:0 auto;padding:0 1rem 5rem}

/* header */
.ra-header{text-align:center;padding:2.75rem 1rem 1rem;position:relative}
.eyebrow{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:.5rem}
.ra-header h1{font-family:var(--serif);font-size:clamp(2.1rem,7vw,3.1rem);font-weight:700;line-height:1.02;letter-spacing:-.02em;color:var(--ink)}
.ra-header h1 em{font-style:italic;color:var(--core)}
.ra-header .desc{font-size:.98rem;color:var(--ink-soft);max-width:440px;margin:.7rem auto 0}

/* top action row */
.top-actions{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1.15rem auto 0}
.pill-btn{display:inline-flex;align-items:center;gap:.45rem;font-size:.85rem;font-weight:800;padding:.55rem .95rem;border-radius:9999px;
border:1.5px solid var(--ink);background:var(--ink);color:var(--paper-2);cursor:pointer;transition:transform .12s,box-shadow .12s;white-space:nowrap}
.pill-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.pill-btn.ghost{background:var(--paper-2);color:var(--ink);border-color:var(--line)}
.pill-btn.ghost:hover{border-color:var(--ink)}
.pill-btn.surprise{background:var(--hook);border-color:var(--hook);color:#3a2a06}
.pill-btn .badge{background:rgba(255,255,255,.25);border-radius:9999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:.68rem;padding:0 .3rem}
.pill-btn.ghost .badge{background:var(--accent);color:#fff}

/* tiers explainer */
.tiers{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1.1rem auto 0;max-width:760px}
.tier-chip{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:700;padding:.4rem .75rem;border-radius:.7rem;border:1px solid var(--line);background:var(--paper-2)}
.tier-chip .d{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tier-chip .d.hook{background:var(--hook)}.tier-chip .d.core{background:var(--core)}.tier-chip .d.stretch{background:var(--stretch)}
.tier-chip b{color:var(--ink)}
.tier-chip span.t{color:var(--ink-faint);font-weight:600}

.helper-link{display:block;margin:.9rem auto 0;font-size:.84rem;color:var(--accent);font-weight:800;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1.5px}

/* guide panel */
.guide{background:var(--paper-2);border:1px solid var(--line);border-radius:1rem;box-shadow:var(--shadow);padding:1.5rem;margin:1rem auto 0;font-size:.9rem;color:var(--ink-soft);line-height:1.65}
.guide h3{font-family:var(--serif);font-size:1.35rem;color:var(--ink);margin-bottom:.4rem;font-weight:700}
.guide h4{font-weight:800;color:var(--ink);margin:1rem 0 .25rem;font-size:.95rem}
.guide p{margin-bottom:.4rem}
.hand{display:flex;gap:.5rem;justify-content:center;margin:1rem 0}
.finger{flex:1;max-width:130px;border-radius:.75rem;padding:.7rem .5rem;text-align:center;border:1.5px solid var(--line);background:var(--paper)}
.finger .f-n{font-family:var(--serif);font-size:1.5rem;font-weight:700;line-height:1}
.finger .f-l{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem}
.finger.ok{border-color:var(--core);background:var(--core-bg)}.finger.ok .f-n,.finger.ok .f-l{color:var(--core-ink)}
.finger.easy .f-n,.finger.easy .f-l{color:var(--ink-faint)}
.finger.hard{border-color:var(--hook);background:var(--hook-bg)}.finger.hard .f-n,.finger.hard .f-l{color:var(--hook-ink)}
.finger.no{border-color:var(--stretch);background:var(--stretch-bg)}.finger.no .f-n,.finger.no .f-l{color:var(--stretch-ink)}
.finger .f-d{font-size:.66rem;color:var(--ink-faint);margin-top:.3rem;line-height:1.3}
.guide-note{margin-top:.75rem;font-style:italic;color:var(--ink-faint)}

/* search */
.search-wrap{position:relative;margin:1.25rem auto 0}
.search-wrap .s-ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--ink-faint);pointer-events:none}
.search-input{width:100%;font-family:var(--sans);font-size:1rem;font-weight:600;color:var(--ink);
padding:.85rem 2.7rem;border:1.5px solid var(--line);border-radius:9999px;background:var(--paper-2);box-shadow:var(--shadow);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--ink-faint);font-weight:500}
.search-input:focus{border-color:var(--core)}
.search-clear{position:absolute;right:.65rem;top:50%;transform:translateY(-50%);background:var(--line);border:none;
width:26px;height:26px;border-radius:50%;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-clear:hover{background:var(--ink-faint);color:#fff}

/* filter bar */
.filter-bar{position:sticky;top:0;z-index:40;margin:1rem -1rem 0;padding:.7rem 1rem;
background:rgba(251,247,239,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.filter-bar.dim{opacity:.5;pointer-events:none}
.filter-bar-inner{max-width:840px;margin:0 auto;display:flex;flex-direction:column;gap:.5rem}
.frow{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.flabel{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin-right:.1rem}
.grade-btn{min-width:40px;height:40px;border-radius:.6rem;border:1.5px solid var(--line);font-size:1rem;font-weight:800;cursor:pointer;
background:var(--paper-2);color:var(--ink-soft);transition:all .14s}
.grade-btn:hover{border-color:var(--ink-faint)}
.grade-btn.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink);transform:translateY(-1px)}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:.6rem;overflow:hidden;background:var(--paper-2)}
.seg button{padding:.5rem 1rem;font-size:.88rem;font-weight:800;border:none;cursor:pointer;background:transparent;color:var(--ink-soft);transition:all .14s}
.seg button.active{background:var(--core);color:#fff}
.genre-btn{padding:.32rem .7rem;font-size:.78rem;font-weight:700;border:1.5px solid var(--line);border-radius:9999px;background:var(--paper-2);color:var(--ink-soft);cursor:pointer;transition:all .14s}
.genre-btn:hover{border-color:var(--ink-faint)}
.genre-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.clear-btn{font-size:.76rem;font-weight:800;color:var(--stretch);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* list */
.count-row{display:flex;align-items:baseline;justify-content:space-between;margin:1.25rem 0 .85rem;flex-wrap:wrap;gap:.5rem}
.count{font-size:.84rem;color:var(--ink-faint);font-weight:800}
.count b{color:var(--ink-soft)}
.sort-toggle{font-size:.76rem;font-weight:800;color:var(--ink-soft);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.sort-toggle:hover{color:var(--ink)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--ink-faint)}
.empty .big{font-family:var(--serif);font-size:1.3rem;color:var(--ink-soft);margin-bottom:.3rem}

.book-list{display:flex;flex-direction:column;gap:.6rem}
.book-card{border:1px solid var(--line);border-radius:.9rem;background:var(--paper-2);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s,transform .15s,border-color .15s;scroll-margin-top:140px}
.book-card:hover{box-shadow:var(--shadow-lift);transform:translateY(-1px)}
.book-card.is-read{border-color:var(--core)}
.book-card.flash{animation:flash 1.1s ease}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(47,143,107,.5)}100%{box-shadow:0 0 0 14px rgba(47,143,107,0)}}
.book-header{width:100%;text-align:left;padding:.95rem 1rem;border:none;background:transparent;cursor:pointer;display:flex;align-items:flex-start;gap:.7rem}
.spine{width:5px;align-self:stretch;border-radius:9999px;flex-shrink:0;margin:.1rem 0}
.spine.hook{background:var(--hook)}.spine.core{background:var(--core)}.spine.stretch{background:var(--stretch)}
.bh-main{flex:1;min-width:0}
.book-title{font-family:var(--serif);font-size:1.12rem;font-weight:700;color:var(--ink);line-height:1.2;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.read-check{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--core);color:#fff;flex-shrink:0}
.book-meta{display:flex;gap:.45rem;align-items:center;margin-top:.35rem;flex-wrap:wrap}
.book-genre{font-size:.72rem;color:var(--ink-faint);font-weight:800}
.book-tier{font-size:.64rem;font-weight:800;padding:.14rem .55rem;border-radius:9999px;letter-spacing:.01em;display:inline-flex;align-items:center;gap:.3rem}
.book-tier .d{width:6px;height:6px;border-radius:50%}
.book-tier.hook{background:var(--hook-bg);color:var(--hook-ink)}.book-tier.hook .d{background:var(--hook)}
.book-tier.core{background:var(--core-bg);color:var(--core-ink)}.book-tier.core .d{background:var(--core)}
.book-tier.stretch{background:var(--stretch-bg);color:var(--stretch-ink)}.book-tier.stretch .d{background:var(--stretch)}
.from-tag{font-size:.66rem;font-weight:800;color:var(--ink-faint);background:var(--line-soft);padding:.12rem .5rem;border-radius:9999px}
.mini-actions{display:flex;gap:.3rem;align-items:center;flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:.55rem;border:1.5px solid var(--line);background:var(--paper);color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s}
.icon-btn:hover{border-color:var(--ink-faint);color:var(--ink-soft)}
.icon-btn.on-save{background:var(--accent);border-color:var(--accent);color:#fff}
.icon-btn.on-read{background:var(--core);border-color:var(--core);color:#fff}
.chev{color:var(--ink-faint);transition:transform .2s;align-self:center;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

.book-detail{padding:0 1rem 1.05rem;border-top:1px dashed var(--line);margin:0 .25rem}
.book-detail-inner{padding-top:.85rem}
.dlabel{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin:.9rem 0 .25rem;display:flex;align-items:center;gap:.4rem}
.dlabel:first-child{margin-top:0}
.dlabel.good{color:var(--core-ink)}.dlabel.heads{color:var(--hook-ink)}.dlabel.try{color:var(--accent)}
.dtext{font-size:.93rem;color:var(--ink-soft);line-height:1.55}
.similar{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem}
.stag{font-size:.78rem;font-weight:700;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);padding:.3rem .65rem;border-radius:.5rem;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:.3rem}
.stag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.stag.dead{cursor:default;opacity:.85}.stag.dead:hover{border-color:var(--line);color:var(--ink-soft);background:var(--paper)}
.level-line{font-size:.8rem;color:var(--ink-faint);font-weight:800;margin-top:.9rem;padding-top:.65rem;border-top:1px solid var(--line-soft)}
.level-line b{color:var(--ink-soft)}
.detail-cta{display:flex;gap:.5rem;margin-top:.85rem;flex-wrap:wrap}
.cta{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:800;padding:.5rem .85rem;border-radius:.6rem;border:1.5px solid var(--line);background:var(--paper);color:var(--ink-soft);cursor:pointer;transition:all .14s}
.cta:hover{border-color:var(--ink-faint)}
.cta.save-on{background:var(--accent);border-color:var(--accent);color:#fff}
.cta.read-on{background:var(--core);border-color:var(--core);color:#fff}

/* sheet (Want to Read) */
.overlay{position:fixed;inset:0;background:rgba(42,34,24,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--paper);width:100%;max-width:840px;max-height:88vh;border-radius:1.25rem 1.25rem 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2);display:flex;flex-direction:column;animation:slideUp .28s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{padding:1.1rem 1.25rem .85rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--paper);border-radius:1.25rem 1.25rem 0 0}
.sheet-head h2{font-family:var(--serif);font-size:1.45rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.sheet-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--line);color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-close:hover{background:var(--ink-faint);color:#fff}
.sheet-body{overflow-y:auto;padding:1rem 1.25rem 2rem}
.sheet-tabs{display:flex;gap:.4rem;margin-bottom:.5rem}
.sheet-tab{flex:1;padding:.55rem;border:1.5px solid var(--line);background:var(--paper-2);border-radius:.6rem;font-weight:800;font-size:.85rem;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem}
.sheet-tab.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}
.sheet-tab .cnt{font-size:.72rem;opacity:.7}
.shelf-item{display:flex;align-items:center;gap:.65rem;padding:.65rem .25rem;border-bottom:1px solid var(--line-soft)}
.shelf-item .si-spine{width:4px;height:34px;border-radius:9999px;flex-shrink:0}
.shelf-item .si-main{flex:1;min-width:0}
.shelf-item .si-title{font-family:var(--serif);font-weight:600;font-size:1.02rem;color:var(--ink)}
.shelf-item .si-meta{font-size:.72rem;color:var(--ink-faint);font-weight:800;margin-top:.1rem}
.si-act{background:none;border:1.5px solid var(--line);border-radius:.5rem;width:34px;height:34px;color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.si-act:hover{border-color:var(--ink-faint);color:var(--ink-soft)}
.si-act.done{background:var(--core);border-color:var(--core);color:#fff}
.si-x{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:.3rem;flex-shrink:0}
.si-x:hover{color:var(--stretch)}
.shelf-empty{text-align:center;color:var(--ink-faint);padding:2rem 1rem}
.shelf-empty .se-big{font-family:var(--serif);font-size:1.15rem;color:var(--ink-soft);margin-bottom:.3rem}
.reset-link{font-size:.74rem;color:var(--stretch);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:1.75rem;display:block}

/* toast */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper-2);
font-size:.88rem;font-weight:800;padding:.7rem 1.15rem;border-radius:9999px;box-shadow:var(--shadow-lift);z-index:130;
display:flex;align-items:center;gap:.5rem;max-width:90vw;animation:toastIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.ra-footer{text-align:center;padding:2.5rem 1rem 1rem;font-size:.76rem;color:var(--ink-faint);font-weight:700}

@media(max-width:520px){
.finger{padding:.5rem .2rem}
.finger .f-d{display:none}
.tier-chip span.t{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

const mk = (grade, type, genre, tier, title, why, challenges, similar, level) => ({grade,type,genre,tier,title,why,challenges,similar,level});

const BOOKS = [
// GRADE 1 FICTION
mk(1,"fiction","Humor","hook","Elephant & Piggie","Two best friends talk in big speech bubbles, so you always know who's saying what.","The whole book is talking — no narrator. It takes a little practice.",["Frog and Toad","Charlie & Mouse"],"Early Reader"),
mk(1,"fiction","Humor","hook","Fly Guy","A boy and his pet fly get into silly trouble. Short and very funny.","The jokes are goofy on purpose, so don't expect everything to make sense!",["Bad Kitty","Pete the Cat"],"Early Reader"),
mk(1,"fiction","Humor","hook","Narwhal and Jelly","A happy narwhal and a grumpy jellyfish, told in comic panels.","Comics are read box-by-box — left to right, top to bottom.",["Elephant & Piggie","InvestiGators"],"Early Reader"),
mk(1,"fiction","Humor","hook","Bad Kitty (Early Readers)","A cranky cat and lots of wordplay. Great for learning new words.","The pages can get busy with stuff to look at.",["Fly Guy","Pete the Cat"],"Early Reader"),
mk(1,"fiction","Friendship","core","Frog and Toad","Two friends who care about each other. Gentle and a little bit funny.","Some of the funny parts are quiet — you have to think about them.",["Little Bear","Charlie & Mouse"],"Transitional"),
mk(1,"fiction","Friendship","core","Little Bear","Cozy stories with a sweet, slow rhythm. Perfect for bedtime.","The sentences are a bit longer than the easiest readers.",["Frog and Toad","Henry and Mudge"],"Transitional"),
mk(1,"fiction","Friendship","core","Henry and Mudge","A boy and his giant, drooly dog. Real-life stuff that happens to everyone.","There's more writing on each page than a beginner book.",["Mr. Putter & Tabby","Biscuit"],"Transitional"),
mk(1,"fiction","Friendship","core","Mr. Putter & Tabby","Quiet, kind stories about an old man and his cat.","It's calm and slow — not full of action.",["Henry and Mudge","Charlie & Mouse"],"Transitional"),
mk(1,"fiction","Friendship","core","Charlie & Mouse","Two brothers and the funny little things that happen at home.","The funny bits are gentle, not laugh-out-loud.",["Frog and Toad","Henry and Mudge"],"Transitional"),
mk(1,"fiction","Imagination","core","Pinkalicious","A girl who LOVES pink and the wild things her imagination does.","A few of the words are tricky — ask for help if you get stuck.",["Fancy Nancy","Pete the Cat"],"Transitional"),
mk(1,"fiction","Imagination","core","Fancy Nancy","Nancy teaches you fancy words as you read. You'll feel super smart.","Some words are hard on purpose — that's the whole fun.",["Pinkalicious","Pete the Cat"],"Transitional"),
mk(1,"fiction","Imagination","hook","Pete the Cat","A cool cat who keeps singing no matter what. You'll want to read along.","The big idea — staying calm — is something to think about.",["Groovy Joe","Fly Guy"],"Early Reader"),
mk(1,"fiction","Fantasy","core","Princess in Black","A princess with a secret superhero life. Action and giggles.","It's a real chapter book, so a bit longer than picture books.",["Dragon Masters","Unicorn Diaries"],"Early Chapter"),
mk(1,"fiction","Fantasy","core","Unicorn Diaries","A unicorn writes in its diary about magic and feelings.","A few new magic words to learn along the way.",["Owl Diaries","Princess in Black"],"Early Chapter"),
mk(1,"fiction","Fantasy","core","Owl Diaries","Eva the owl writes diary entries — easy to follow and sweet.","A bit more reading than the simplest readers.",["Unicorn Diaries","Princess in Black"],"Early Chapter"),
mk(1,"fiction","Mystery","core","Nate the Great","A kid detective solves little mysteries. You can solve them too!","You have to spot the clues — read carefully.",["Cam Jansen","The Critter Club"],"Early Chapter"),
mk(1,"fiction","Mystery","core","Cam Jansen","A girl with a photo-perfect memory cracks cases.","You have to remember details from earlier pages.",["Nate the Great","A to Z Mysteries"],"Early Chapter"),
mk(1,"fiction","Early Reader","hook","Biscuit","A little puppy and very few words. A great first book to read alone.","It repeats a lot, so it gets easy fast.",["Spot","Fly Guy"],"Pre-Reader"),
mk(1,"fiction","Early Reader","core","The Critter Club","Friends who run a club for animals that need help.","A little more reading than easy readers.",["Owl Diaries","Unicorn Diaries"],"Early Chapter"),
mk(1,"fiction","Friendship","core","Amelia Bedelia (I Can Read)","She does EXACTLY what you tell her — which goes hilariously wrong.","She mixes up word meanings, which can be confusing at first.",["Fancy Nancy","Pinkalicious"],"Transitional"),
// GRADE 1 NONFICTION

const TIER_INFO = {
  hook:{label:"Quick & Fun", blurb:"Lots of pictures. Great for getting hooked — mix in others too."},
  core:{label:"Just Right", blurb:"On-grade chapter books. The best place to spend most of your reading time."},
  stretch:{label:"Reach Higher", blurb:"A bit harder. Try when you're feeling brave — a buddy can help."},
};
const tierLabel = (t)=>TIER_INFO[t].label;

const I = {
  search:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  x:({s=14})=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
  bookmark:({f})=> f
    ? <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    : <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,
  check:({s=16})=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
  chev:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
  list:()=> <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>,
  dice:()=> <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="3"/><path d="M8 8h.01M16 8h.01M8 16h.01M16 16h.01M12 12h.01"/></svg>,
  good:()=> <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M7 22h10a2 2 0 0 0 1.9-1.4l2-6A2 2 0 0 0 19 12h-5.3l.9-4.3A2 2 0 0 0 11.7 5L7 11.5V22zM2 12h3v10H2z"/></svg>,
  heads:()=> <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m21.7 16.6-9-15a1 1 0 0 0-1.7 0l-9 15A1 1 0 0 0 3 18h18a1 1 0 0 0 .9-1.5z"/><path d="M12 9v4M12 17h.01"/></svg>,
  spark:()=> <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/></svg>,
};

function ReadingAtlas() {
  const [grade, setGrade] = useState(3);
  const [type, setType] = useState("fiction");
  const [selectedGenres, setSelectedGenres] = useState([]);
  const [query, setQuery] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [bookmarks, setBookmarks] = useState(new Set());
  const [readLog, setReadLog] = useState(new Set());
  const [showGuide, setShowGuide] = useState(false);
  const [showShelf, setShowShelf] = useState(false);
  const [shelfTab, setShelfTab] = useState("want");
  const [sortStretch, setSortStretch] = useState(false);
  const [toast, setToast] = useState(null);
  const [flashKey, setFlashKey] = useState(null);
  const cardRefs = useRef({});

  const keyOf = (b) => `${b.grade}-${b.type}-${b.title}`;
  const bookByKey = useMemo(() => {
    const m = {}; BOOKS.forEach(b => { m[keyOf(b)] = b; }); return m;
  }, []);
  const bookByTitle = useMemo(() => {
    const m = {}; BOOKS.forEach(b => { if(!m[b.title]) m[b.title] = b; }); return m;
  }, []);

  // load
  useEffect(() => {
    (async () => {
      try {
        const bm = await window.storage.get("atlas:wanttoread").catch(()=>null);
        const rl = await window.storage.get("atlas:finished").catch(()=>null);
        if (bm && bm.value) setBookmarks(new Set(JSON.parse(bm.value)));
        if (rl && rl.value) setReadLog(new Set(JSON.parse(rl.value)));
      } catch(e){}
    })();
  }, []);

  const persist = useCallback((skey, set) => {
    try { window.storage.set(skey, JSON.stringify(Array.from(set))); } catch(e){}
  }, []);

  const fireToast = (msg) => setToast({msg, id:Date.now()});
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2400);
    return () => clearTimeout(t);
  }, [toast]);

  const toggleWant = (b) => {
    const k = keyOf(b);
    setBookmarks(prev => {
      const n = new Set(prev);
      if (n.has(k)) { n.delete(k); fireToast("Removed from Want to Read"); }
      else { n.add(k); fireToast("Added to Want to Read!"); }
      persist("atlas:wanttoread", n);
      return n;
    });
  };
  const toggleFinished = (b) => {
    const k = keyOf(b);
    setReadLog(prev => {
      const n = new Set(prev);
      if (n.has(k)) n.delete(k);
      else { n.add(k); fireToast("Marked as finished 🎉"); }
      persist("atlas:finished", n);
      return n;
    });
  };

  const norm = (s)=>s.toLowerCase();
  const q = norm(query.trim());
  const searching = q.length > 0;

  const pool = useMemo(() => {
    let list = BOOKS.filter((b) => {
      if (searching) {
        return norm(b.title).includes(q) || norm(b.genre).includes(q) ||
               b.similar.some(s => norm(s).includes(q));
      }
      if (b.grade !== grade) return false;
      if (b.type !== type) return false;
      if (selectedGenres.length && !selectedGenres.includes(b.genre)) return false;
      return true;
    });
    if (!searching && sortStretch) {
      const rank = {hook:0, core:1, stretch:2};
      list = [...list].sort((a,b)=> rank[a.tier]-rank[b.tier]);
    }
    return list;
  }, [grade, type, selectedGenres, q, searching, sortStretch]);

  const availableGenres = useMemo(() => {
    const set = new Set(BOOKS.filter((b)=> b.grade===grade && b.type===type).map(b=>b.genre));
    return Array.from(set);
  }, [grade, type]);

  const toggleArr = (val) => setSelectedGenres(cur => cur.includes(val) ? cur.filter(x=>x!==val) : [...cur, val]);

  const flash = (k) => {
    setExpanded(k);
    setTimeout(() => {
      const el = cardRefs.current[k];
      if (el) el.scrollIntoView({behavior:"smooth", block:"center"});
      setFlashKey(k);
      setTimeout(()=>setFlashKey(null), 1100);
    }, 70);
  };

  const surprise = () => {
    if (pool.length === 0) return;
    const pick = pool[Math.floor(Math.random()*pool.length)];
    flash(keyOf(pick));
    fireToast(`How about: ${pick.title}`);
  };

  // jump from a "you might also like" tag
  const jumpToTitle = (title) => {
    const target = bookByTitle[title];
    if (!target) return; // not in our atlas — leave as plain text
    setQuery("");
    setGrade(target.grade);
    setType(target.type);
    setSelectedGenres([]);
    setShowShelf(false);
    flash(keyOf(target));
  };

  const clearAllData = () => {
    setBookmarks(new Set()); setReadLog(new Set());
    persist("atlas:wanttoread", new Set());
    persist("atlas:finished", new Set());
    fireToast("Your lists were cleared");
    setShowShelf(false);
  };

  const wantList = useMemo(()=> Array.from(bookmarks).map(k=>bookByKey[k]).filter(Boolean), [bookmarks, bookByKey]);
  const finishedList = useMemo(()=> Array.from(readLog).map(k=>bookByKey[k]).filter(Boolean), [readLog, bookByKey]);

  const renderCard = (b) => {
    const k = keyOf(b);
    const open = expanded === k;
    const want = bookmarks.has(k);
    const done = readLog.has(k);
    return (
      <div key={k} ref={el=>cardRefs.current[k]=el}
        className={`book-card ${done?'is-read':''} ${flashKey===k?'flash':''}`}>
        <button className="book-header" aria-expanded={open} onClick={()=>setExpanded(open?null:k)}>
          <span className={`spine ${b.tier}`}></span>
          <span className="bh-main">
            <span className="book-title">
              {done && <span className="read-check" title="You finished this"><I.check s={11}/></span>}
              {b.title}
            </span>
            <span className="book-meta">
              <span className="book-genre">{b.genre}</span>
              <span className={`book-tier ${b.tier}`}><span className="d"></span>{tierLabel(b.tier)}</span>
              {searching && <span className="from-tag">Grade {b.grade} · {b.type==="fiction"?"Fiction":"Non-fiction"}</span>}
            </span>
          </span>
          <span className="mini-actions">
            <span className={`icon-btn ${want?'on-save':''}`} role="button" tabIndex={0}
              title={want?"In your Want to Read list":"Add to Want to Read"}
              onClick={(e)=>{e.stopPropagation();toggleWant(b);}}
              onKeyDown={(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();toggleWant(b);}}}>
              <I.bookmark f={want}/>
            </span>
            <span className={`chev ${open?'open':''}`}><I.chev/></span>
          </span>
        </button>
        {open && (
          <div className="book-detail">
            <div className="book-detail-inner">
              <div className="dlabel good"><I.good/> Why you'll like it</div>
              <div className="dtext">{b.why}</div>
              <div className="dlabel heads"><I.heads/> Heads up</div>
              <div className="dtext">{b.challenges}</div>
              <div className="dlabel try"><I.spark/> If you like this, try</div>
              <div className="similar">
                {b.similar.map(s => {
                  const known = !!bookByTitle[s];
                  return <span key={s} className={`stag ${known?'':'dead'}`}
                    onClick={()=> known && jumpToTitle(s)}
                    title={known?`Go to ${s}`:s}>{s}{known && <I.chev/>}</span>;
                })}
              </div>
              <div className="level-line">Reading level: <b>{b.level}</b></div>
              <div className="detail-cta">
                <button className={`cta ${want?'save-on':''}`} onClick={()=>toggleWant(b)}>
                  <I.bookmark f={want}/> {want?"On your list":"Want to read"}
                </button>
                <button className={`cta ${done?'read-on':''}`} onClick={()=>toggleFinished(b)}>
                  <I.check s={14}/> {done?"Finished":"I finished this"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div className="wrap">
      <div className="ra-header">
        <div className="eyebrow">Grades 1–5 · Pick Your Next Read</div>
        <h1>The Reading <em>Atlas</em></h1>
        <div className="desc">200 awesome book series, sorted by grade and what you're in the mood for. Find one, save it, check it off when you're done.</div>
        <div className="top-actions">
          <button className="pill-btn surprise" onClick={surprise}><I.dice/> Surprise me</button>
          <button className="pill-btn ghost" onClick={()=>{setShelfTab("want");setShowShelf(true);}}>
            <I.list/> My books {(bookmarks.size+readLog.size)>0 && <span className="badge">{bookmarks.size+readLog.size}</span>}
          </button>
        </div>
        <div className="tiers">
          {Object.entries(TIER_INFO).map(([k,v]) => (
            <div key={k} className="tier-chip"><span className={`d ${k}`}></span><b>{v.label}</b><span className="t">— {v.blurb}</span></div>
          ))}
        </div>
        <button className="helper-link" onClick={()=>setShowGuide(s=>!s)}>
          {showGuide ? "Hide the tip ↑" : "How do I know if a book is right for me?"}
        </button>
      </div>

      {showGuide && (
        <div className="guide">
          <h3>The Five-Finger Trick</h3>
          <p>A fast way to check if a book is a good fit — try it right in the library or bookstore.</p>
          <h4>1. Open to a page in the middle.</h4>
          <p>Pick a page that's mostly words, not pictures.</p>
          <h4>2. Read it, and put up a finger for every word you don't know.</h4>
          <h4>3. Count your fingers when you reach the end of the page:</h4>
          <div className="hand">
            <div className="finger easy"><div className="f-n">0–1</div><div className="f-l">Easy</div><div className="f-d">Great for a relaxing read</div></div>
            <div className="finger ok"><div className="f-n">2–3</div><div className="f-l">Just right</div><div className="f-d">The sweet spot!</div></div>
            <div className="finger hard"><div className="f-n">4</div><div className="f-l">A stretch</div><div className="f-d">Maybe read with a buddy</div></div>
            <div className="finger no"><div className="f-n">5+</div><div className="f-l">Too hard</div><div className="f-d">Save it for later</div></div>
          </div>
          <h4>Two more quick checks</h4>
          <p><b>The movie test:</b> after a page, can you picture what happened in your head? If it's blank, the words might be too tricky.</p>
          <p><b>The "do I care?" test:</b> do you actually want to know what happens next? Even a perfect-level book is the wrong book if it bores you.</p>
          <p className="guide-note">Putting a too-hard book back isn't a "no" — it's just a "not yet."</p>
        </div>
      )}

      <div className="search-wrap">
        <span className="s-ico"><I.search/></span>
        <input className="search-input" type="text" value={query}
          onChange={(e)=>setQuery(e.target.value)}
          placeholder="Search a series, like 'Dog Man' or 'mystery'…" aria-label="Search books"/>
        {query && <button className="search-clear" onClick={()=>setQuery("")} aria-label="Clear search"><I.x s={13}/></button>}
      </div>

      <div className={`filter-bar ${searching?'dim':''}`}>
        <div className="filter-bar-inner">
          <div className="frow">
            <span className="flabel">Grade</span>
            {[1,2,3,4,5].map(g => (
              <button key={g} className={`grade-btn ${grade===g?'active':''}`}
                onClick={()=>{setGrade(g);setSelectedGenres([]);setExpanded(null);}}>{g}</button>
            ))}
          </div>
          <div className="frow">
            <span className="flabel">Type</span>
            <div className="seg">
              {[{k:"fiction",l:"Stories"},{k:"nonfiction",l:"True Stuff"}].map(o=>(
                <button key={o.k} className={type===o.k?'active':''}
                  onClick={()=>{setType(o.k);setSelectedGenres([]);setExpanded(null);}}>{o.l}</button>
              ))}
            </div>
          </div>
          <div className="frow">
            <span className="flabel">Mood</span>
            {selectedGenres.length>0 && <button className="clear-btn" onClick={()=>setSelectedGenres([])}>clear</button>}
            {availableGenres.map(g => (
              <button key={g} className={`genre-btn ${selectedGenres.includes(g)?'active':''}`}
                onClick={()=>toggleArr(g)}>{g}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="count-row">
        <div className="count">
          {searching
            ? <>Search results · <b>{pool.length}</b> found</>
            : <>Grade {grade} · {type==="fiction"?"Stories":"True Stuff"} · <b>{pool.length}</b> series</>}
        </div>
        {!searching && pool.length>1 &&
          <button className="sort-toggle" onClick={()=>setSortStretch(s=>!s)}>
            {sortStretch ? "Sorting: easiest first ↓" : "Sort by difficulty"}
          </button>}
      </div>

      {pool.length===0 ? (
        <div className="empty">
          <div className="big">{searching ? "No books match that search." : "Nothing here for that mood."}</div>
          <div>{searching ? "Try a shorter word, or clear the search box." : "Try clearing the mood filter."}</div>
        </div>
      ) : (
        <div className="book-list">{pool.map(renderCard)}</div>
      )}

      <div className="ra-footer">The Reading Atlas · 200 series across 5 grades · your lists are saved on this device</div>

      {showShelf && (
        <div className="overlay" onClick={()=>setShowShelf(false)}>
          <div className="sheet" onClick={(e)=>e.stopPropagation()}>
            <div className="sheet-head">
              <h2><I.list/> My Books</h2>
              <button className="sheet-close" onClick={()=>setShowShelf(false)} aria-label="Close"><I.x s={16}/></button>
            </div>
            <div className="sheet-body">
              <div className="sheet-tabs">
                <button className={`sheet-tab ${shelfTab==="want"?'active':''}`} onClick={()=>setShelfTab("want")}>
                  <I.bookmark f={shelfTab==="want"}/> Want to Read <span className="cnt">({wantList.length})</span>
                </button>
                <button className={`sheet-tab ${shelfTab==="done"?'active':''}`} onClick={()=>setShelfTab("done")}>
                  <I.check s={14}/> Finished <span className="cnt">({finishedList.length})</span>
                </button>
              </div>

              {shelfTab==="want" && (
                wantList.length===0 ? (
                  <div className="shelf-empty">
                    <div className="se-big">Your Want to Read list is empty.</div>
                    <div>Tap the ribbon on any book to save it here for later.</div>
                  </div>
                ) : wantList.map(b => {
                  const k = keyOf(b);
                  return (
                    <div key={k} className="shelf-item">
                      <span className={`si-spine ${b.tier}`}></span>
                      <span className="si-main">
                        <div className="si-title">{b.title}</div>
                        <div className="si-meta">Grade {b.grade} · {b.genre} · {tierLabel(b.tier)}</div>
                      </span>
                      <button className="si-act" title="Mark finished" onClick={()=>toggleFinished(b)}><I.check s={15}/></button>
                      <button className="si-x" title="Remove" onClick={()=>toggleWant(b)}><I.x s={15}/></button>
                    </div>
                  );
                })
              )}

              {shelfTab==="done" && (
                finishedList.length===0 ? (
                  <div className="shelf-empty">
                    <div className="se-big">No finished books yet.</div>
                    <div>When you finish a series, check it off and it'll show up here.</div>
                  </div>
                ) : finishedList.map(b => {
                  const k = keyOf(b);
                  return (
                    <div key={k} className="shelf-item">
                      <span className={`si-spine ${b.tier}`}></span>
                      <span className="si-main">
                        <div className="si-title">{b.title}</div>
                        <div className="si-meta">Grade {b.grade} · {b.genre} · {tierLabel(b.tier)}</div>
                      </span>
                      <button className="si-act done" title="Finished — tap to undo" onClick={()=>toggleFinished(b)}><I.check s={15}/></button>
                    </div>
                  );
                })
              )}

              {(wantList.length>0 || finishedList.length>0) &&
                <button className="reset-link" onClick={clearAllData}>Clear all my saved books</button>}
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast" key={toast.id}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReadingAtlas/>);
</script>
</body>
</html>
