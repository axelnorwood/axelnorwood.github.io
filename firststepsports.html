<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>First Steps — Sports Fundamentals Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1a1a17;
    --line: rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Bricolage Grotesque', 'Trebuchet MS', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  ul li::marker { color: rgba(0,0,0,0.3); }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(234,88,12,0.08), transparent),
      radial-gradient(700px 500px at -10% 30%, rgba(22,163,74,0.07), transparent);
  }
  .shell { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 0 20px 80px; }

  /* header */
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 0 18px; position: sticky; top: 0; z-index: 20;
    background: rgba(250,248,243,0.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .brand { display: flex; align-items: center; gap: 10px; background: none; border: none; padding: 0; }
  .brand-mark { display: inline-grid; place-items: center; width: 30px; height: 30px; background: var(--ink); color: var(--bg); border-radius: 8px; font-size: 12px; }
  .brand-text { font-weight: 800; letter-spacing: 0.14em; font-size: 15px; }
  .header-stats { display: flex; gap: 18px; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; }
  .stat-num { font-weight: 800; font-size: 17px; display: inline-flex; align-items: center; gap: 4px; }
  .stat-lbl { font-size: 10px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }

  /* hero */
  .hero { padding: 54px 0 30px; max-width: 640px; }
  .kicker { text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; font-weight: 700; opacity: 0.5; margin: 0; }
  .h1 { font-size: clamp(48px, 9vw, 92px); line-height: 0.92; font-weight: 800; margin: 14px 0 0; letter-spacing: -0.03em; }
  .h1-accent { background: linear-gradient(100deg,#ea580c,#db2777); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .lede { font-size: 18px; line-height: 1.6; margin-top: 22px; opacity: 0.8; font-family: Georgia, 'Times New Roman', serif; }

  /* pillars */
  .pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 16px; margin: 20px 0 56px; }
  .pillar { background: #fff; border: 1px solid rgba(0,0,0,0.07); border-radius: 18px; padding: 22px 22px 24px; box-shadow: 0 1px 0 rgba(0,0,0,0.03); opacity: 0; animation: rise .6s cubic-bezier(.2,.7,.3,1) forwards; }
  .pillar-icon { display: inline-grid; place-items: center; width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid currentColor; line-height: 0; }
  .pillar h3 { margin: 12px 0 6px; font-size: 19px; font-weight: 800; color: var(--ink); }
  .pillar p { margin: 0; font-size: 14.5px; line-height: 1.55; opacity: 0.72; }

  /* section head */
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .h2 { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
  .section-hint { font-size: 13px; opacity: 0.5; }

  /* cards grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px,1fr)); gap: 16px; }
  .card { position: relative; text-align: left; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 20px; padding: 20px 20px 22px; overflow: hidden; opacity: 0; animation: rise .55s cubic-bezier(.2,.7,.3,1) forwards; transition: transform .25s, box-shadow .25s, border-color .25s; color: var(--ink); width: 100%; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(0,0,0,0.10); }
  .card:active { transform: translateY(-1px); }
  .card-wash { position: absolute; inset: 0; opacity: 0.6; pointer-events: none; }
  .card-top { position: relative; display: flex; align-items: flex-start; justify-content: space-between; }
  .card-icon { display: grid; place-items: center; width: 52px; height: 52px; border-radius: 14px; line-height: 0; }
  .card-name { position: relative; margin: 14px 0 4px; font-size: 21px; font-weight: 800; }
  .card-tag { position: relative; margin: 0; font-size: 13.5px; opacity: 0.65; line-height: 1.4; min-height: 38px; }
  .card-go { position: relative; display: inline-block; margin-top: 12px; font-size: 13.5px; font-weight: 700; }

  /* home footer */
  .home-footer { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--line); text-align: center; }
  .foot-quote { font-family: Georgia, serif; font-style: italic; font-size: 20px; opacity: 0.7; }
  .reset-btn { margin-top: 8px; background: none; border: 1px solid rgba(0,0,0,0.15); border-radius: 99px; padding: 7px 16px; font-size: 12.5px; color: var(--ink); opacity: 0.6; }

  /* back */
  .back { background: none; border: none; font-size: 14.5px; font-weight: 600; opacity: 0.6; padding: 24px 0 8px; color: var(--ink); }

  /* sport hero */
  .sport-hero { display: flex; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid; border-radius: 24px; padding: 26px 28px; flex-wrap: wrap; }
  .sport-hero-inner { display: flex; align-items: center; gap: 18px; }
  .sport-icon { display: grid; place-items: center; width: 72px; height: 72px; border-radius: 18px; border: 1.5px solid; line-height: 0; flex-shrink: 0; background: #fff; }
  .sport-name { margin: 0; font-size: clamp(30px,5vw,46px); font-weight: 800; letter-spacing: -0.02em; }
  .sport-tag { margin: 4px 0 0; font-size: 15px; font-weight: 700; }
  .sport-ring { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .sport-ring-lbl { font-size: 10.5px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  .what-text { font-family: Georgia, serif; font-size: 18px; line-height: 1.6; opacity: 0.82; margin: 24px 2px 6px; max-width: 760px; }

  /* tabs */
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 24px 0 26px; position: sticky; top: 70px; z-index: 10; background: rgba(250,248,243,0.9); backdrop-filter: blur(8px); padding: 8px 0; }
  .tab { background: #fff; border: 1px solid rgba(0,0,0,0.12); border-radius: 99px; padding: 9px 16px; font-size: 13.5px; font-weight: 700; color: var(--ink); transition: all .2s; }

  .tab-intro { font-size: 15px; opacity: 0.7; line-height: 1.55; margin: 0 0 22px; max-width: 680px; }

  /* skills */
  .skill { background: #fff; border: 1.5px solid; border-radius: 18px; padding: 18px 20px 16px; margin-bottom: 14px; transition: border-color .3s; }
  .skill-head { display: flex; align-items: center; gap: 12px; }
  .skill-num { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 8px; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .skill-name { margin: 0; font-size: 19px; font-weight: 800; flex: 1; }
  .skill-points { margin: 12px 0 14px; padding-left: 20px; line-height: 1.7; font-size: 14.5px; opacity: 0.82; }
  .cue { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; font-size: 15px; font-weight: 700; font-style: italic; }
  .cue-lbl { font-style: normal; font-size: 10px; font-weight: 800; letter-spacing: 0.12em; opacity: 0.7; padding: 2px 6px; border: 1px solid currentColor; border-radius: 5px; }

  .check { width: 28px; height: 28px; border-radius: 9px; border: 2px solid rgba(0,0,0,0.18); background: #fff; flex-shrink: 0; display: grid; place-items: center; font-size: 15px; font-weight: 800; transition: all .2s; padding: 0; }

  /* drills */
  .drill { display: flex; gap: 14px; align-items: flex-start; width: 100%; text-align: left; border: 1.5px solid; border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; transition: all .25s; background: #fff; color: var(--ink); }
  .drill-body { flex: 1; }
  .drill-name { margin: 0; font-size: 17px; font-weight: 800; }
  .drill-desc { margin: 4px 0 8px; font-size: 14.5px; opacity: 0.78; line-height: 1.5; }
  .drill-purpose { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

  /* info */
  .info-block { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 18px; padding: 20px 22px; margin-bottom: 14px; }
  .info-h { display: flex; align-items: center; gap: 9px; margin: 0 0 12px; font-size: 18px; font-weight: 800; }
  .info-glyph { display: inline-grid; place-items: center; line-height: 0; }
  .info-list { margin: 0; padding-left: 20px; line-height: 1.8; font-size: 15px; opacity: 0.82; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 13px; border-radius: 99px; font-size: 13.5px; font-weight: 700; }
  .chip-plain { padding: 7px 13px; border-radius: 99px; font-size: 13.5px; font-weight: 600; background: #f1ede4; color: var(--ink); }
  .flow { margin: 0; padding-left: 20px; line-height: 1.9; font-size: 15px; opacity: 0.85; }

  /* toast */
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 13px 22px; border-radius: 99px; font-size: 14.5px; font-weight: 600; box-shadow: 0 12px 40px rgba(0,0,0,0.25); z-index: 100; display: flex; align-items: center; gap: 9px; max-width: 90vw; animation: toastin .35s cubic-bezier(.2,.7,.3,1) both; }
  .toast-dot { color: #fbbf24; }

  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fade .4s ease both; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .tab-in { animation: tabin .35s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes tabin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastin { from { opacity: 0; transform: translate(-50%, 14px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="shell" id="app"></div>
<div id="toast-root"></div>

<script>
"use strict";

/* ============================================================
   FIRST STEPS — A sports fundamentals trainer for beginners
   Philosophy: nobody starts great. Baby steps. Honest effort.
   Consistency makes champions.
   ============================================================ */

// ---------- SPORT ICONS (custom line SVGs, not emoji) ----------
function sportIcon(id, size, color, stroke) {

      '<g ' + P + '>' +

      '<path d="M7.4 8.2l1.1.5M7 10.6l1.2.3M7.1 13.2l1.2-.1M16.6 8.2l-1.1.5M17 10.6l-1.2.3M16.9 13.2l-1.2-.1" stroke-width="' + (stroke * 0.7) + '" />' +
      '</g>',
    hockey:
      '<g ' + P + '>' +
      '<path d="M5 4v9a5 5 0 0 0 5 5h7" />' +
      '<circle cx="18.5" cy="18" r="1.6" fill="' + color + '" stroke="none" />' +
      '</g>',
    rugby:
      '<g ' + P + '>' +
      '<ellipse cx="12" cy="12" rx="9" ry="5.5" transform="rotate(-40 12 12)" />' +
      '<path d="M9 15l6-6M10.5 13.2l1.2 1.2M13.2 10.5l1.2 1.2M8.6 11.2l1.2 1.2M11.4 8.4l1.2 1.2" stroke-width="' + (stroke * 0.85) + '" />' +
      '</g>',
    basketball:

    badminton:
      '<g ' + P + '>' +

      '<path d="M5 19l3.5-3.5" />' +

      '</g>',
    golf:
      '<g ' + P + '>' +
      '<path d="M12 3v13" />' +
      '<path d="M12 3l6 2.5L12 8" fill="' + color + '" stroke="none" />' +
      '<path d="M12 3l6 2.5L12 8" />' +
      '<circle cx="9" cy="19" r="1.4" fill="' + color + '" stroke="none" />' +
      '<path d="M7 20.5c1.5-1 8-1 10 0" />' +
      '</g>',
    tennis:
      '<g ' + P + '>' +
      '<circle cx="12" cy="12" r="9" />' +
      '<path d="M4.5 6C8 9 8 15 4.5 18M19.5 6C16 9 16 15 19.5 18" />' +
      '</g>',
    dance:
      '<g ' + P + '>' +
      '<circle cx="12" cy="4.5" r="1.8" />' +

      '</g>'
  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" style="display:block">' + (icons[id] || icons.soccer) + '</svg>';
}

// ---------- UI GLYPHS ----------
function glyph(name, size, color, stroke) {
  size = size || 22; color = color || "currentColor"; stroke = stroke || 1.9;
  var P = 'fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-linejoin="round"';
  var g = {
    steps: '<g ' + P + '><path d="M4 19h4v-4h4v-4h4V7h4" /><circle cx="20" cy="6" r="1.3" fill="' + color + '" stroke="none" /></g>',
    effort: '<g ' + P + '><path d="M12 21s-7-4.5-7-9.5A3.5 3.5 0 0 1 12 8a3.5 3.5 0 0 1 7 3.5C19 16.5 12 21 12 21z" /></g>',
    repeat: '<g ' + P + '><path d="M4 12a8 8 0 0 1 13.6-5.7L20 8" /><path d="M20 4v4h-4" /><path d="M20 12a8 8 0 0 1-13.6 5.7L4 16" /><path d="M4 20v-4h4" /></g>',
    gear: '<g ' + P + '><path d="M6 8h12l-1 12H7z" /><path d="M9 8V6a3 3 0 0 1 6 0v2" /></g>',
    move: '<g ' + P + '><circle cx="13" cy="5" r="1.6" /><path d="M13 7v4l3 2M13 9l-4 1-2 4M9 14l1 5M9 14l-2 2" /></g>',
    clock: '<g ' + P + '><circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3 2" /></g>',
    strength: '<g ' + P + '><path d="M5 9v6M19 9v6M7 8v8M17 8v8M9 12h6" /><path d="M3 11v2M21 11v2" /></g>',
    flame: '<g ' + P + '><path d="M12 21c3.3 0 5.5-2.2 5.5-5.2 0-3.2-2.5-5-3.5-8.3-1.8 1.3-2 3-2 3S10 8 9 6.5C7.8 8.4 6.5 10 6.5 13.3 6.5 17.4 9 21 12 21z" /></g>'
  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" style="display:block">' + (g[name] || g.steps) + '</svg>';
}

// ---------- PROGRESS RING ----------
function progressRing(pct, accent, size) {
  size = size || 56;
  var r = (size - 8) / 2;
  var c = 2 * Math.PI * r;
  var off = c - (pct / 100) * c;
  var cx = size / 2;
  return '<svg width="' + size + '" height="' + size + '" style="display:block">' +
    '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="6" />' +
    '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + accent + '" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 ' + cx + ' ' + cx + ')" style="transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)" />' +
    '<text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-size="' + (size * 0.26) + '" font-weight="800" fill="' + accent + '" font-family="inherit">' + Math.round(pct) + '</text>' +
    '</svg>';
}

// escape helper for text
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

var PILLARS = [
  { icon: "steps", title: "Baby steps", body: "Slow \u2192 smooth \u2192 faster. Master one tiny piece before adding the next. Small touches beat big leaps." },
  { icon: "effort", title: "Honest effort", body: "You don't have to be good. You have to try, fail, and try again with your full focus. That's the whole secret." },
  { icon: "repeat", title: "Consistency", body: "10\u201320 minutes a day beats two hours once a month. Champions are just beginners who refused to quit." }
];

var CHEERS = [
  "That's a rep nobody can take from you.",
  "See? You're already better than five minutes ago.",
  "Beginners do this. Champions just did it more times.",
  "Honest effort, logged. Keep stacking them.",
  "Slow is smooth. Smooth becomes fast.",
  "Every pro was once exactly where you are.",
  "Progress, not perfection. Nicely done.",
  "You showed up. That's the hardest part, beaten."
];

// ---------- DATA ----------
const SPORTS = [
  {
    id: "soccer",
    name: "Soccer",
    tag: "Rhythm, movement & decision making",
    accent: "#16a34a",
    accentSoft: "#dcfce7",

      { name: "Trapping / Receiving", cue: "Soft foot", points: ["Use inside of foot", "Cushion the ball gently"] },
      { name: "Passing", cue: "Point your toes where you want the ball to go", points: ["Plant non-kicking foot beside ball", "Use inside of foot", "Follow through to target"] },
      { name: "Shooting", cue: "Laces, lean, low", points: ["Strike with laces", "Lean slightly forward", "Aim low for accuracy"] },
    ],

      ["Inside-Outside Dribble", "Tap with inside then outside of same foot", "Ball control, agility"],
      ["Wall Passes", "Pass to a wall and trap the rebound", "Passing accuracy, first touch"],
      ["Figure-8 Dribble", "Dribble around two cones in a figure 8", "Turning, balance"],
      ["Juggling (beginner)", "Drop → kick once → catch", "Timing, foot-eye coordination"],
    ],
    partner: [
      ["Passing Gates", "Pass through a small gate", "Accuracy, communication"],
      ["Keep Away (3v1)", "Simple possession game", "Spacing, decisions"],
      ["Moving Pass & Follow", "Pass then run to partner's spot", "Movement after passing"],
      ["1v1 Dribble Challenge", "Beat a defender in a small area", "Creativity, confidence"],
    ],
    games: [
      ["3-Goal Game", "Three small goals, score in any", "Finding space"],

  },
  {
    id: "baseball",
    name: "Baseball",
    tag: "Timing, coordination & teamwork",
    accent: "#dc2626",
    accentSoft: "#fee2e2",
    what:
      "A bat-and-ball sport where teams take turns hitting, running, fielding, and throwing. Hit the ball, run the bases, and score runs before the other team gets you out.",
    movement: ["Throwing accurately", "Catching with soft hands", "Striking with timing", "Running bases", "Balance & stance", "Hand-eye coordination"],
    equipment: ["A baseball or soft practice ball", "A glove (optional early on)", "A bat (plastic, foam, or light)", "Cones for bases", "A small open space"],
    skills: [

// ---------- STATE & STORAGE ----------
var STORE_KEY = "first-steps-progress-v1";
var state = { done: {}, streak: 0, lastDay: null, sessions: 0 };
var view = "home";   // home | sport
var activeId = null;
var tab = "learn";

function todayKey() { return new Date().toISOString().slice(0, 10); }

function loadProgress() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* storage unavailable — fall through */ }
  return { done: {}, streak: 0, lastDay: null, sessions: 0 };
}
function saveProgress() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch (e) { /* ignore */ }
}

// ---------- DERIVED ----------
function itemKeys(sport) {
  var ks = [];
  sport.skills.forEach(function (_, i) { ks.push(sport.id + ":skill:" + i); });
  sport.solo.forEach(function (_, i) { ks.push(sport.id + ":solo:" + i); });
  sport.partner.forEach(function (_, i) { ks.push(sport.id + ":partner:" + i); });
  sport.games.forEach(function (_, i) { ks.push(sport.id + ":game:" + i); });
  return ks;
}
function sportPct(sport) {
  var ks = itemKeys(sport);
  var d = ks.filter(function (k) { return state.done[k]; }).length;
  return ks.length ? (d / ks.length) * 100 : 0;
}
function totalDone() {
  return Object.keys(state.done).filter(function (k) { return state.done[k]; }).length;
}

// ---------- TOAST ----------
var toastTimer = null;
function showCheer() {
  var msg = CHEERS[Math.floor(Math.random() * CHEERS.length)];
  var root = document.getElementById("toast-root");
  root.innerHTML = '<div class="toast"><span class="toast-dot">\u2726</span> ' + esc(msg) + '</div>';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { root.innerHTML = ""; }, 2600);
}

// ---------- ACTIONS ----------
function toggle(key) {
  var willBeDone = !state.done[key];
  state.done[key] = willBeDone;
  if (willBeDone) { state.sessions = (state.sessions || 0) + 1; showCheer(); }
  state.lastDay = todayKey();
  saveProgress();
  render();
}
function resetAll() {
  state.done = {};
  state.sessions = 0;
  saveProgress();
  render();
}
function goHome() { view = "home"; activeId = null; window.scrollTo(0, 0); render(); }
function openSport(id) { activeId = id; view = "sport"; tab = "learn"; window.scrollTo(0, 0); render(); }
function setTab(t) { tab = t; render(); }

// expose for inline handlers
window.FS = { toggle: toggle, resetAll: resetAll, goHome: goHome, openSport: openSport, setTab: setTab };

// ---------- RENDER ----------
function headerHTML() {
  return '' +
    '<header class="app">' +
      '<button class="brand" onclick="FS.goHome()">' +
        '<span class="brand-mark">\u25B2</span>' +
        '<span class="brand-text">FIRST&nbsp;STEPS</span>' +
      '</button>' +
      '<div class="header-stats">' +
        '<div class="stat"><span class="stat-num">' + (state.streak || 0) + glyph("flame", 16, "#ea580c", 2) + '</span><span class="stat-lbl">day streak</span></div>' +
        '<div class="stat"><span class="stat-num">' + totalDone() + '</span><span class="stat-lbl">reps logged</span></div>' +
      '</div>' +
    '</header>';
}

function homeHTML() {
  var pillarColors = ["#ea580c", "#db2777", "#16a34a"];
  var pillars = PILLARS.map(function (p, i) {
    return '<div class="pillar" style="animation-delay:' + (0.1 + i * 0.08) + 's">' +
      '<div class="pillar-icon" style="color:' + pillarColors[i] + '">' + glyph(p.icon, 26, pillarColors[i], 2) + '</div>' +
      '<h3>' + esc(p.title) + '</h3>' +
      '<p>' + esc(p.body) + '</p>' +
    '</div>';
  }).join("");

  var cards = SPORTS.map(function (s, i) {
    var pct = sportPct(s);
    return '<button class="card" style="animation-delay:' + (0.05 * i) + 's" onclick="FS.openSport(\'' + s.id + '\')">' +
      '<div class="card-wash" style="background:linear-gradient(135deg,' + s.accentSoft + ',transparent)"></div>' +
      '<div class="card-top">' +
        '<span class="card-icon" style="background:' + s.accentSoft + ';color:' + s.accent + '">' + sportIcon(s.id, 28, s.accent, 2) + '</span>' +
        (pct > 0 ? progressRing(pct, s.accent, 46) : '') +
      '</div>' +
      '<h3 class="card-name">' + esc(s.name) + '</h3>' +
      '<p class="card-tag">' + esc(s.tag) + '</p>' +
      '<span class="card-go" style="color:' + s.accent + '">Start training \u2192</span>' +
    '</button>';
  }).join("");

  var resetBtn = totalDone() > 0 ? '<button class="reset-btn" onclick="FS.resetAll()">Reset all progress</button>' : '';

  return '<main class="fade-in">' +
    '<section class="hero">' +
      '<p class="kicker">A beginner\'s training ground for 9 sports</p>' +
      '<h1 class="h1">Nobody starts<br><span class="h1-accent">great.</span></h1>' +
      '<p class="lede">Not the player you admire. Not your coach. Not anyone. They all began clumsy, unsure, and dropping the ball \u2014 <em>literally</em>. The only thing that turned beginners into champions was showing up again. Pick a sport, take one small step, and log it. That\'s how it starts.</p>' +
    '</section>' +
    '<section class="pillars">' + pillars + '</section>' +
    '<section>' +
      '<div class="section-head"><h2 class="h2">Choose your sport</h2><span class="section-hint">' + SPORTS.length + ' guides \u00B7 tap any to begin</span></div>' +
      '<div class="grid">' + cards + '</div>' +
    '</section>' +
    '<footer class="home-footer">' +
      '<p class="foot-quote">"Champions are just beginners who refused to quit."</p>' +
      resetBtn +
    '</footer>' +
  '</main>';
}

function sportHTML() {
  var s = SPORTS.filter(function (x) { return x.id === activeId; })[0];
  if (!s) return homeHTML();

  var tabs = [
    ["learn", "Skills & Cues"],
    ["solo", "Solo Drills"],
    ["partner", "Partner"],
    ["games", "Mini Games"],
    ["info", "Gear & Flow"]
  ].map(function (t) {
    var active = tab === t[0];
    var style = active ? ' style="background:' + s.accent + ';color:#fff;border-color:' + s.accent + '"' : '';
    return '<button class="tab"' + style + ' onclick="FS.setTab(\'' + t[0] + '\')">' + t[1] + '</button>';
  }).join("");

  var body = "";

  if (tab === "learn") {
    var skills = s.skills.map(function (sk, i) {
      var key = s.id + ":skill:" + i;
      var done = !!state.done[key];
      var points = sk.points.map(function (p) { return '<li>' + esc(p) + '</li>'; }).join("");
      var checkStyle = done ? ' style="background:' + s.accent + ';border-color:' + s.accent + ';color:#fff"' : '';
      return '<div class="skill" style="border-color:' + (done ? s.accent : "rgba(0,0,0,0.08)") + '">' +
        '<div class="skill-head">' +
          '<span class="skill-num" style="background:' + s.accentSoft + ';color:' + s.accent + '">' + (i + 1) + '</span>' +
          '<h3 class="skill-name">' + esc(sk.name) + '</h3>' +
          '<button class="check"' + checkStyle + ' onclick="FS.toggle(\'' + key + '\')" aria-label="mark practiced">' + (done ? "\u2713" : "") + '</button>' +
        '</div>' +
        '<ul class="skill-points">' + points + '</ul>' +
        '<div class="cue" style="background:' + s.accentSoft + ';color:' + s.accent + '"><span class="cue-lbl">CUE</span> "' + esc(sk.cue) + '"</div>' +
      '</div>';
    }).join("");
    body = '<div class="tab-in"><p class="tab-intro">The first skills every beginner learns. Don\'t rush \u2014 repeat each one until it feels natural, then move on.</p>' + skills + '</div>';
  } else if (tab === "info") {
    var equip = s.equipment.map(function (e) { return '<li>' + esc(e) + '</li>'; }).join("");
    var move = s.movement.map(function (m) { return '<span class="chip" style="background:' + s.accentSoft + ';color:' + s.accent + '">' + esc(m) + '</span>'; }).join("");
    var str = s.strength.map(function (m) { return '<span class="chip-plain">' + esc(m) + '</span>'; }).join("");
    function ig(n) { return '<span class="info-glyph" style="color:' + s.accent + '">' + glyph(n, 18, s.accent) + '</span>'; }
    body = '<div class="tab-in">' +
      '<div class="info-block"><h3 class="info-h">' + ig("gear") + 'What you need</h3><ul class="info-list">' + equip + '</ul></div>' +
      '<div class="info-block"><h3 class="info-h">' + ig("move") + 'Movement skills it builds</h3><div class="chips">' + move + '</div></div>' +
      '<div class="info-block"><h3 class="info-h">' + ig("clock") + 'A 10\u201320 min session</h3><ol class="flow">' +
        '<li>Warm up movement (skips, shuffles, light reps)</li>' +
        '<li>One skill focus</li>' +
        '<li>One drill</li>' +
        '<li>One mini game</li>' +
        '<li>Cool-down reflection: "What did I improve today?"</li>' +
      '</ol></div>' +
      '<div class="info-block"><h3 class="info-h">' + ig("strength") + 'Strength that supports it</h3><div class="chips">' + str + '</div></div>' +
    '</div>';
  } else {
    var list = tab === "solo" ? s.solo : tab === "partner" ? s.partner : s.games;
    var type = tab === "games" ? "game" : tab;
    var intro = tab === "solo" ? "Practice alone \u2014 no partner needed. These build fluency and confidence one rep at a time."
      : tab === "partner" ? "Once you're comfortable solo, add a partner. Communication and timing grow here."
      : "Mini games make the real sport simple and fun. Learn the big ideas with zero pressure.";
    var drills = list.map(function (d, i) {
      var key = s.id + ":" + type + ":" + i;
      var done = !!state.done[key];
      var rowStyle = 'border-color:' + (done ? s.accent : "rgba(0,0,0,0.08)") + ';background:' + (done ? s.accentSoft + "66" : "#fff");
      var checkStyle = done ? 'background:' + s.accent + ';border-color:' + s.accent + ';color:#fff;margin-top:2px' : 'margin-top:2px';
      return '<button class="drill" style="' + rowStyle + '" onclick="FS.toggle(\'' + key + '\')">' +
        '<div class="check" style="' + checkStyle + '">' + (done ? "\u2713" : "") + '</div>' +
        '<div class="drill-body">' +
          '<h4 class="drill-name">' + esc(d[0]) + '</h4>' +
          '<p class="drill-desc">' + esc(d[1]) + '</p>' +
          '<span class="drill-purpose" style="color:' + s.accent + '">Builds: ' + esc(d[2]) + '</span>' +
        '</div>' +
      '</button>';
    }).join("");
    body = '<div class="tab-in"><p class="tab-intro">' + intro + '</p>' + drills + '</div>';
  }

  return '<main class="fade-in">' +
    '<button class="back" onclick="FS.goHome()">\u2190 All sports</button>' +
    '<section class="sport-hero" style="background:linear-gradient(135deg,' + s.accentSoft + ',transparent);border-color:' + s.accent + '33">' +
      '<div class="sport-hero-inner">' +
        '<span class="sport-icon" style="color:' + s.accent + ';border-color:' + s.accent + '33">' + sportIcon(s.id, 40, s.accent, 1.9) + '</span>' +
        '<div><h1 class="sport-name">' + esc(s.name) + '</h1><p class="sport-tag" style="color:' + s.accent + '">' + esc(s.tag) + '</p></div>' +
      '</div>' +
      '<div class="sport-ring">' + progressRing(sportPct(s), s.accent, 68) + '<span class="sport-ring-lbl">complete</span></div>' +
    '</section>' +
    '<p class="what-text">' + esc(s.what) + '</p>' +
    '<nav class="tabs">' + tabs + '</nav>' +
    body +
  '</main>';
}

function render() {
  var app = document.getElementById("app");
  app.innerHTML = headerHTML() + (view === "home" ? homeHTML() : sportHTML());
}

// ---------- INIT ----------
(function init() {
  state = loadProgress();
  var today = todayKey();
  if (state.lastDay !== today) {
    var y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    state.streak = state.lastDay === y ? (state.streak || 0) + 1 : 1;
    state.lastDay = today;
    saveProgress();
  }
  render();
})();
</script>
</body>
</html>
