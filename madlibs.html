```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Goat Bridge Mad Lib</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px; }
    h1 { text-align: center; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    button { margin-top: 16px; padding: 8px 14px; font-size: 15px; }
    #story { margin-top: 20px; padding: 15px; background: #f0f8ff; border-radius: 8px; white-space: pre-line; }
  </style>
</head>
<body>

<h1>Goat Bridge Mad Lib</h1>
<p>Fill in the boxes, then click <b>Make Story</b>.</p>

<label>Adjective (describing word):</label>
<input id="adj">

<label>Plural animal (e.g. goats, cats):</label>
<input id="plural">

<label>Noun (thing):</label>
<input id="noun">

<label>Place (e.g. river, playground):</label>
<input id="place">

<label>Another noun (thing):</label>
<input id="noun2">

<label>Feeling (e.g. angry, scared):</label>
<input id="feeling">

<label>Scary creature (e.g. troll, dragon):</label>
<input id="creature">

<label>Action verb (e.g. eat, chase):</label>
<input id="verb">

<button onclick="makeStory()">Make Story</button>
<button onclick="clearStory()">Clear</button>

<div id="story"></div>

<script>
  const template = `
Once upon a time, three ADJ PLURAL lived on a NOUN hillside. There was hardly any NOUN left for them to eat. Across a PLACE, however, was a meadow full of ADJ NOUN2.

The only way to reach it was by crossing an old ADJ bridge.

But under the bridge lived a FEELING CREATURE.

The smallest PLURAL went first.

“WHO’S THAT NOUN OVER MY bridge?” shouted the CREATURE, climbing up from below.

“It’s only me, the little PLURAL,” said the smallest one. “I’m going to the PLACE to VERB some NOUN2.”

“I’m going to VERB you!” yelled the CREATURE.

“Oh, please don’t,” said the little one. “My big sibling is coming soon. They are much ADJ than me.”

The CREATURE thought about a bigger meal and said, “Fine. Go ahead.”

Next came the middle PLURAL.

“WHO’S THAT NOUN OVER MY bridge?” yelled the CREATURE again.

“It’s the middle PLURAL,” said the goat.

“I’m going to VERB you!” growled the CREATURE.

“Better wait for my older sibling,” said the goat. “They’re the ADJ one of all.”

The CREATURE licked its lips. “Fine. Go on.”

Then came the biggest PLURAL.

The whole bridge NOUN‑ed.

“WHO’S THAT NOUN OVER MY bridge?” roared the CREATURE.

“It’s the BIG PLURAL,” said the goat loudly.

“And I’m going to VERB you!” screamed the CREATURE, jumping onto the bridge.

But the big goat lowered its NOUN, charged forward, and VERB‑ed the CREATURE so hard that it flew off the bridge and into the PLACE below.

The CREATURE was never seen again.

After that, all three PLURAL crossed the bridge whenever they wanted and ate ADJ NOUN2 in the sunny PLACE for the rest of the season.
`;

  function makeStory() {
    const adj = document.getElementById('adj').value || 'brave';
    const plural = document.getElementById('plural').value || 'goats';
    const noun = document.getElementById('noun').value || 'rocky';
    const place = document.getElementById('place').value || 'river';
    const noun2 = document.getElementById('noun2').value || 'grass';
    const feeling = document.getElementById('feeling').value || 'angry';
    const creature = document.getElementById('creature').value || 'troll';
    const verb = document.getElementById('verb').value || 'eat';

    let story = template
      .replace(/ADJ/g, adj)
      .replace(/PLURAL/g, plural)
      .replace(/NOUN2/g, noun2)
      .replace(/NOUN/g, noun)
      .replace(/PLACE/g, place)
      .replace(/FEELING/g, feeling)
      .replace(/CREATURE/g, creature)
      .replace(/VERB/g, verb)
      .replace(/BIG/g, adj.toUpperCase());

    document.getElementById('story').innerText = story.trim();
  }

  function clearStory() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    document.getElementById('story').innerText = '';
  }
</script>

</body>
</html>
```
