<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Guides — Hanami Education</title>
<link rel="icon" href="data:,"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;
  --surface:#ffffff;
  --text:#1a1a18;
  --text-secondary:#6b6b64;
  --text-tertiary:#9c9c94;
  --border:#e8e7e3;
  --accent:#c45d3e;
  --accent-light:#fdf0ec;
  --accent-dark:#a34830;
  --petal:#f5e6e0;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Subtle petal pattern background */
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background:
    radial-gradient(ellipse 120px 80px at 10% 15%, var(--petal) 0%, transparent 70%),
    radial-gradient(ellipse 80px 120px at 85% 8%, var(--petal) 0%, transparent 70%),
    radial-gradient(ellipse 100px 60px at 70% 90%, var(--petal) 0%, transparent 70%),
    radial-gradient(ellipse 60px 100px at 20% 85%, var(--petal) 0%, transparent 70%);
  opacity:0.5;
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Header */
.site-header{
  padding:2rem 2rem 0;
  max-width:900px;margin:0 auto;
  animation:fadeUp .6s ease both;
}
.header-nav{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
.back-link{font-size:.85rem;color:var(--text-secondary);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--accent)}
.logo-row{display:flex;align-items:center;gap:.75rem;flex:1}
.logo-mark{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--serif);font-size:1.1rem;line-height:1;
}
.logo-text{font-family:var(--serif);font-size:1.35rem;color:var(--text);letter-spacing:-.01em}

/* Hero */
.hero{
  max-width:900px;margin:0 auto;
  padding:3rem 2rem 2rem;
  animation:fadeUp .6s ease .1s both;
}
.hero h1{
  font-family:var(--serif);
  font-size:clamp(2rem, 5vw, 2.75rem);
  font-weight:400;
  line-height:1.15;
  color:var(--text);
  margin-bottom:.75rem;
  max-width:600px;
}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero .tagline{
  font-size:1rem;font-weight:300;
  color:var(--text-secondary);
  max-width:500px;
  line-height:1.5;
}

/* Divider */
.divider{
  max-width:900px;margin:0 auto;padding:0 2rem;
  animation:fadeIn .6s ease .2s both;
}
.divider-line{
  height:1px;
  background:linear-gradient(to right, var(--border), transparent);
}

/* Content Section */
.content-section{
  max-width:900px;margin:0 auto;
  padding:2.5rem 2rem 4rem;
}
.section-label{
  font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--text-tertiary);font-weight:600;
  margin-bottom:1.25rem;
  animation:fadeUp .6s ease .25s both;
}

/* Guide Grid */
.guides-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:1rem;
}

/* Guide Card */
.guide-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:.75rem;
  overflow:hidden;
  transition:all .25s ease;
  animation:fadeUp .5s ease both;
  display:flex;
  flex-direction:column;
}
.guide-card:nth-child(1){animation-delay:.3s}
.guide-card:nth-child(2){animation-delay:.4s}
.guide-card:nth-child(3){animation-delay:.5s}
.guide-card:nth-child(4){animation-delay:.6s}
.guide-card:nth-child(5){animation-delay:.7s}
.guide-card:nth-child(6){animation-delay:.8s}

.guide-card:hover{
  border-color:var(--accent);
  box-shadow:0 4px 24px rgba(196,93,62,.08);
  transform:translateY(-2px);
}
.guide-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--accent);
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.guide-card:hover::after{transform:scaleX(1)}

.guide-header{
  padding:1.5rem;
  cursor:pointer;
  user-select:none;
  display:flex;
  align-items:center;
  gap:.75rem;
  border-bottom:1px solid var(--border);
  transition:background .2s ease;
  position:relative;
}
.guide-card:hover .guide-header{background:#fafaf8}
.guide-icon{
  width:40px;height:40px;border-radius:.5rem;
  background:var(--accent-light);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
  flex-shrink:0;
  font-size:1.25rem;
}
.guide-title-wrap{flex:1;min-width:0}
.guide-title{font-family:var(--serif);font-size:1.05rem;color:var(--text);margin-bottom:.25rem}
.guide-subtitle{font-size:.8rem;color:var(--text-tertiary)}
.guide-chevron{
  font-size:.8rem;color:var(--text-secondary);
  transition:transform .3s ease;
  flex-shrink:0;
}
.guide-card.open .guide-chevron{transform:rotate(90deg)}

.guide-body{
  display:none;
  padding:0;
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease,padding .3s ease;
}
.guide-card.open .guide-body{
  display:block;
  max-height:1000px;
  padding:1.5rem;
}

.guide-content{font-size:.9rem;line-height:1.7;color:var(--text-secondary)}
.guide-content p{margin-bottom:1rem}
.guide-content p:last-child{margin-bottom:0}
.guide-content strong{color:var(--text)}

/* Footer */
.site-footer{
  max-width:900px;margin:0 auto;
  padding:2rem;
  border-top:1px solid var(--border);
  text-align:center;
  font-size:.75rem;color:var(--text-tertiary);
  animation:fadeIn .6s ease .5s both;
}

/* Mobile */
@media(max-width:600px){
  .hero{padding:2rem 1.5rem 1.5rem}
  .content-section{padding:2rem 1.5rem 3rem}
  .site-header{padding:1.5rem 1.5rem 0}
  .guides-grid{grid-template-columns:1fr}
  .header-nav{flex-direction:column;gap:.5rem;align-items:flex-start}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-nav">
    <a href="index.html" class="back-link">← Back</a>
  </div>
  <div class="logo-row">
    <div class="logo-mark">H</div>
    <div class="logo-text">Hanami Education</div>
  </div>
</header>

<section class="hero">
  <h1>Writing <em>Guides</em></h1>
  <p class="tagline">Comprehensive resources for developing writers across grades 1–5.</p>
</section>

<div class="divider"><div class="divider-line"></div></div>

<section class="content-section">
  <div class="section-label">Guides & Resources</div>
  <div class="guides-grid" id="guides-container"></div>
</section>

<footer class="site-footer">
  © 2026 Hanami Education
</footer>

<script>
const GUIDES_DATA = [
  {
    grade: 1,
    genre: "Story / Narrative",
    icon: "📖",
    description: "Narrative writing for beginning writers"
  },
  {
    grade: 2,
    genre: "Informational Text",
    icon: "📘",
    description: "Non-fiction and informational writing"
  },
  {
    grade: 3,
    genre: "Procedural Writing",
    icon: "🧃",
    description: "How-to and procedural writing"
  },
  {
    grade: 4,
    genre: "Persuasive Writing",
    icon: "🗣️",
    description: "Persuasion and argumentative writing"
  },
  {
    grade: 5,
    genre: "Advanced Narrative",
    icon: "📝",
    description: "Complex storytelling and writing"
  },
  {
    title: "Poetry Across Grades",
    icon: "✍️",
    description: "Grade-by-grade poetry expectations"
  },
  {
    title: "Grammar Essentials",
    icon: "📐",
    description: "Essential grammar by grade level"
  },
  {
    title: "Teaching Best Practices",
    icon: "🎯",
    description: "Strategies for writing instruction"
  }
];

function createGuideCard(data) {
  const card = document.createElement('div');
  card.className = 'guide-card';
  
  const title = data.grade ? `Grade ${data.grade} — ${data.genre}` : data.title;
  
  card.innerHTML = `
    <div class="guide-header" onclick="toggleGuide(this)">
      <div class="guide-icon">${data.icon}</div>
      <div class="guide-title-wrap">
        <div class="guide-title">${title}</div>
        <div class="guide-subtitle">${data.description}</div>
      </div>
      <div class="guide-chevron">▶</div>
    </div>
    <div class="guide-body">
      <div class="guide-content">
        <p><strong>Coming Soon</strong> — Detailed content for ${title} will be available here.</p>
      </div>
    </div>
  `;
  
  return card;
}

function toggleGuide(header) {
  const card = header.closest('.guide-card');
  card.classList.toggle('open');
}

// Initialize guides
const container = document.getElementById('guides-container');
GUIDES_DATA.forEach(guide => {
  container.appendChild(createGuideCard(guide));
});
</script>
</body>
</html>
