", "text": "Reflexive: myself, herself, themselves"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing dialogue"}, {"type": "bullet", "text": "Maintaining perspective in narratives"}, {"type": "bullet", "text": "Showing ownership clearly"}]}, {"name": "Verbs", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Verbs show action or state of being."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Action: explore, whisper, design"}, {"type": "bullet", "text": "Being: am, is, are, was, were"}, {"type": "bullet", "text": "Helping: will, can, might, should"}, {"type": "bullet", "text": "Linking: become, seem, appear"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing stronger narrative action"}, {"type": "bullet", "text": "Using helping verbs to show possibility or intention"}, {"type": "bullet", "text": "Using linking verbs to describe states (“She became nervous.”)"}]}, {"name": "Tenses", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Verbs change to show time."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Past: climbed, wrote, saw"}, {"type": "bullet", "text": "Present: climb, write, see"}, {"type": "bullet", "text": "Future: will climb, will write"}, {"type": "bullet", "text": "Present perfect: have seen, has finished"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Keeping tense consistent in stories"}, {"type": "bullet", "text": "Writing reflections (“I have learned…”)"}, {"type": "bullet", "text": "Writing procedural steps"}, {"type": "text", "text": "5⃣ Irregular Verbs (expanded set)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "These verbs don’t follow the “ed” rule."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "swim → swam break → broke choose → chose write → wrote"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Narrative writing"}, {"type": "bullet", "text": "Editing for correct tense"}, {"type": "bullet", "text": "Reading comprehension"}]}, {"name": "Adjectives", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Adjectives describe nouns. Grade 4 adds comparison."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Expanded: the tall, ancient stone tower"}, {"type": "bullet", "text": "Comparative: taller, braver, more careful"}, {"type": "bullet", "text": "Superlative: tallest, bravest, most careful"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Describing settings and characters"}, {"type": "bullet", "text": "Comparing ideas in informational writing"}, {"type": "bullet", "text": "Improving sentence detail"}]}, {"name": "Adverbs", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Adverbs describe verbs, adjectives, or other adverbs."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "quickly, silently, yesterday, nearby, almost, very"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Adding detail to actions"}, {"type": "bullet", "text": "Writing procedural steps"}, {"type": "bullet", "text": "Improving sentence fluency"}]}, {"name": "Prepositions", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Prepositions show where, when, or how something happens."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "beneath, beyond, during, throughout, beside"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Describing settings"}, {"type": "bullet", "text": "Giving directions"}, {"type": "bullet", "text": "Writing informational text"}]}, {"name": "Conjunctions", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Conjunctions join ideas."}, {"type": "text", "text": "Coordinating: and, but, or, so, yet"}, {"type": "text", "text": "Subordinating: although, since, unless, whenever, because"}, {"type": "text", "text": "Correlative (intro): either/or, neither/nor"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing complex sentences"}, {"type": "bullet", "text": "Adding reasons and contrasts"}, {"type": "bullet", "text": "Improving transitions"}, {"type": "text", "text": "🔟 Simple, Compound, and Complex Sentences"}, {"type": "heading", "text": "What it means:"}, {"type": "bullet", "text": "Simple: one idea"}, {"type": "bullet", "text": "Compound: two ideas joined with and/but/so/yet"}, {"type": "bullet", "text": "Complex: one main idea + one extra idea (using because/although/when)"}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Simple: The lantern glowed."}, {"type": "bullet", "text": "Compound: The lantern glowed, and the room brightened."}, {"type": "bullet", "text": "Complex: The lantern glowed because Leo touched it."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Improving sentence fluency"}, {"type": "bullet", "text": "Meeting Grade 4 writing expectations"}, {"type": "bullet", "text": "Adding depth to narratives and reports"}, {"type": "text", "text": "1⃣1⃣ Dialogue (quotation marks, commas, paragraphing)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Dialogue shows what someone says."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "“Let’s explore,” whispered Lena. “I’m not sure,” he replied, “but we can try.”"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Narrative writing"}, {"type": "bullet", "text": "Separating dialogue into new lines"}, {"type": "bullet", "text": "Using commas correctly with speech"}, {"type": "text", "text": "1⃣2⃣ Capitalization Rules (expanded)"}, {"type": "text", "text": "Used for:"}, {"type": "bullet", "text": "Start of sentences"}, {"type": "bullet", "text": "Names"}, {"type": "bullet", "text": "Days, months, holidays"}, {"type": "bullet", "text": "Places"}, {"type": "bullet", "text": "Titles of books, movies, and stories"}, {"type": "bullet", "text": "Proper adjectives (Japanese food, French artist)"}, {"type": "text", "text": "1⃣3⃣ Punctuation (more advanced set)"}, {"type": "text", "text": "Includes:"}, {"type": "bullet", "text": "Periods"}, {"type": "bullet", "text": "Question marks"}, {"type": "bullet", "text": "Exclamation marks"}, {"type": "bullet", "text": "Commas in a list"}, {"type": "bullet", "text": "Commas after transitions (“After that, we continued.”)"}, {"type": "bullet", "text": "Commas in dialogue"}, {"type": "bullet", "text": "Apostrophes for possession"}, {"type": "bullet", "text": "Apostrophes in contractions"}, {"type": "text", "text": "1⃣4⃣ Apostrophes (contractions + singular/plural possession)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Apostrophes show missing letters or ownership."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Contractions: don’t, won’t, I’ll"}, {"type": "bullet", "text": "Singular possession: the fox’s tail"}, {"type": "bullet", "text": "Plural possession: the students’ desks"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing dialogue"}, {"type": "bullet", "text": "Showing ownership in stories and reports"}, {"type": "text", "text": "1⃣5⃣ Subject–Verb Agreement (more complex)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "The subject and verb must match in number."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "The team is ready. The players are excited."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Editing writing"}, {"type": "bullet", "text": "Writing presenttense informational text"}, {"type": "text", "text": "1⃣6⃣ Paragraphing (clear structure)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "A paragraph groups related ideas."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Beginning/middle/end in narratives"}, {"type": "bullet", "text": "Topic sentences in informational writing"}, {"type": "bullet", "text": "Separating dialogue and events"}, {"type": "text", "text": "1⃣7⃣ Transition Words (narrative + informational)"}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Narrative: suddenly, meanwhile, later, eventually"}, {"type": "bullet", "text": "Informational: for example, in addition, however, therefore"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Improving flow"}, {"type": "bullet", "text": "Connecting ideas"}, {"type": "bullet", "text": "Meeting rubric expectations"}]}]}, {"grade": 5, "points": [{"name": "Nouns", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "A noun names a person, place, thing, animal, or idea. Grade 5 uses more abstract and collective nouns and introduces proper adjectives."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Abstract: determination, curiosity, freedom"}, {"type": "bullet", "text": "Collective: committee, swarm, orchestra"}, {"type": "bullet", "text": "Proper adjectives: Japanese food, Egyptian pyramid"}, {"type": "text", "text": "Most common Grade 5 usage:"}, {"type": "bullet", "text": "Adding theme and emotion to narratives"}, {"type": "bullet", "text": "Writing formal informational reports"}, {"type": "bullet", "text": "Using precise vocabulary in persuasive writing"}]}, {"name": "Pronouns", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Pronouns replace nouns and help avoid repetition."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Reflexive: myself, yourself, themselves"}, {"type": "bullet", "text": "Relative: who, which, that"}, {"type": "bullet", "text": "Possessive: mine, yours, theirs"}, {"type": "bullet", "text": "Demonstrative: this, that, these, those"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing smoother sentences"}, {"type": "bullet", "text": "Adding detail with relative clauses (“the book that I borrowed…”)"}, {"type": "bullet", "text": "Maintaining perspective in narratives"}]}, {"name": "Verbs", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Verbs show action or state of being. Grade 5 adds modal verbs to show possibility, ability, or obligation."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Action: investigate, examine, sprint"}, {"type": "bullet", "text": "Linking: seem, appear, become"}, {"type": "bullet", "text": "Helping: have, has, will, might"}, {"type": "bullet", "text": "Modal: could, should, must, might"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing persuasive arguments (“We should reduce waste.”)"}, {"type": "bullet", "text": "Showing character motivation in narratives"}, {"type": "bullet", "text": "Writing scientific explanations"}, {"type": "text", "text": "4⃣ Perfect Tenses (present, past, future)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Perfect tenses show actions that are completed or connected to another time."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Present perfect: I have finished my project."}, {"type": "bullet", "text": "Past perfect: She had left before the storm started."}, {"type": "bullet", "text": "Future perfect: They will have completed the test by noon."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing reflections"}, {"type": "bullet", "text": "Showing sequence in narratives"}, {"type": "bullet", "text": "Explaining scientific processes"}, {"type": "text", "text": "5⃣ Irregular Verbs (advanced set)"}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "begin → began rise → rose teach → taught freeze → froze"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Editing narrative writing"}, {"type": "bullet", "text": "Maintaining tense consistency"}, {"type": "bullet", "text": "Reading comprehension"}]}, {"name": "Adjectives", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Adjectives describe nouns. Grade 5 focuses on precision."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "fragile, ancient, vibrant, cautious more powerful, most impressive"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Creating vivid settings"}, {"type": "bullet", "text": "Writing persuasive descriptions"}, {"type": "bullet", "text": "Adding clarity to informational text"}]}, {"name": "Adverbs", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Adverbs describe verbs, adjectives, or other adverbs."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "rarely, completely, gently, eventually"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Improving sentence fluency"}, {"type": "bullet", "text": "Adding detail to procedural steps"}, {"type": "bullet", "text": "Showing character behaviour"}]}, {"name": "Prepositions", "content": [{"type": "heading", "text": "Examples:"}, {"type": "text", "text": "beyond, throughout, despite, according to, within"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing formal explanations"}, {"type": "bullet", "text": "Describing complex settings"}, {"type": "bullet", "text": "Adding clarity to instructions"}]}, {"name": "Conjunctions", "content": [{"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Conjunctions join ideas and create complex sentences."}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Coordinating: for, and, nor, but, or, yet, so"}, {"type": "bullet", "text": "Subordinating: although, unless, whenever, since, whereas"}, {"type": "bullet", "text": "Correlative: either/or, neither/nor, both/and"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing complex arguments"}, {"type": "bullet", "text": "Adding contrast and cause"}, {"type": "bullet", "text": "Improving transitions"}, {"type": "text", "text": "🔟 Complex Sentences (multiclause)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "A complex sentence has a main idea and one or more extra ideas."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "Although the storm was strong, the lighthouse remained steady. The students celebrated because they had completed their project."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Meeting Grade 5 writing expectations"}, {"type": "bullet", "text": "Adding depth to narratives"}, {"type": "bullet", "text": "Explaining cause and effect"}, {"type": "text", "text": "1⃣1⃣ Relative Clauses (who, which, that)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "A relative clause adds extra information about a noun."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "The scientist who discovered the fossil shared her findings. The book that I borrowed was exciting."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Adding detail to informational writing"}, {"type": "bullet", "text": "Describing characters"}, {"type": "bullet", "text": "Writing more mature sentences"}, {"type": "text", "text": "1⃣2⃣ Dialogue (advanced punctuation + paragraphing)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Dialogue shows what someone says and must be punctuated correctly."}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "“Are you sure?” Maya asked, raising an eyebrow. “I’m ready,” he said, “but I’m still nervous.”"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Narrative writing"}, {"type": "bullet", "text": "Showing character emotion"}, {"type": "bullet", "text": "Using commas, quotation marks, and paragraph breaks correctly"}, {"type": "text", "text": "1⃣3⃣ Punctuation (advanced)"}, {"type": "text", "text": "Includes:"}, {"type": "bullet", "text": "Commas in complex sentences"}, {"type": "bullet", "text": "Commas to set off clauses"}, {"type": "bullet", "text": "Apostrophes for plural possession"}, {"type": "bullet", "text": "Quotation marks for dialogue"}, {"type": "bullet", "text": "Colons for lists"}, {"type": "bullet", "text": "Dashes for emphasis"}, {"type": "bullet", "text": "Parentheses for extra information"}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "The experiment, which took two days, was successful. Bring the following items: goggles, gloves, and a notebook. He hesitated—just for a moment—before answering."}, {"type": "text", "text": "1⃣4⃣ Apostrophes (singular + plural possession)"}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "the teacher’s desk (one teacher) the teachers’ lounge (many teachers)"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Writing reports"}, {"type": "bullet", "text": "Editing narrative writing"}, {"type": "text", "text": "1⃣5⃣ Subject–Verb Agreement (more complex)"}, {"type": "heading", "text": "Examples:"}, {"type": "text", "text": "The group is ready. The students are excited. Neither of the answers is correct."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Editing informational writing"}, {"type": "bullet", "text": "Writing formal explanations"}, {"type": "text", "text": "1⃣6⃣ Paragraphing (clear structure + transitions)"}, {"type": "heading", "text": "What it means:"}, {"type": "text", "text": "Paragraphs group related ideas and support clarity."}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Narrative: beginning, rising action, climax, resolution"}, {"type": "bullet", "text": "Informational: topic sentence + supporting details"}, {"type": "bullet", "text": "Persuasive: reason + explanation + example"}, {"type": "text", "text": "1⃣7⃣ Transition Words (advanced)"}, {"type": "heading", "text": "Examples:"}, {"type": "bullet", "text": "Narrative: eventually, meanwhile, suddenly, afterwards"}, {"type": "bullet", "text": "Informational: for instance, in contrast, therefore, as a result"}, {"type": "bullet", "text": "Persuasive: clearly, undoubtedly, furthermore, nevertheless"}, {"type": "text", "text": "Most common usage:"}, {"type": "bullet", "text": "Improving flow"}, {"type": "bullet", "text": "Strengthening arguments"}, {"type": "bullet", "text": "Organizing explanations"}, {"type": "text", "text": "ACROSTIC POETRY EXAMPLE (Universal for Grades 1–5)"}, {"type": "text", "text": "Using the word SMILE:"}, {"type": "text", "text": "Sunlight warms my face My heart feels bright Inside, a happy spark grows Laughter dances around me Every moment feels lighter"}, {"type": "text", "text": "Short, clear, and flexible enough for any grade."}]}]}], "poetry": [{"title": "Acrostic Poetry", "grades": []}, {"title": "Haiku", "grades": []}, {"title": "Limerick", "grades": []}, {"title": "Quatrain", "grades": []}, {"title": "Diamante", "grades": []}], "teaching": [{"title": "2. EDITING STRIPS (G1–G5)", "content": [{"type": "text", "text": "Editing strips are small, focused tools students place beside their writing."}, {"type": "text", "text": "Examples"}, {"type": "bullet", "text": "Capital letters"}, {"type": "bullet", "text": "End punctuation"}, {"type": "bullet", "text": "Finger spaces (G1–2)"}, {"type": "bullet", "text": "Dialogue punctuation (G3–5)"}, {"type": "bullet", "text": "Paragraphing (G4–5)"}, {"type": "bullet", "text": "Strong verbs (G3–5)"}, {"type": "text", "text": "Why they work"}, {"type": "bullet", "text": "They reduce overwhelm."}, {"type": "bullet", "text": "They target one skill at a time."}, {"type": "bullet", "text": "They make editing visible and manageable."}, {"type": "text", "text": "📊 3. REFLECTING WITH RUBRICS (G1–G5)"}, {"type": "text", "text": "Rubrics help students understand expectations and track growth."}, {"type": "text", "text": "Best practices"}, {"type": "bullet", "text": "Use studentfriendly language (“I can…” statements)."}, {"type": "bullet", "text": "Highlight one strength and one next step."}, {"type": "bullet", "text": "Let students colorcode their evidence in their writing."}, {"type": "bullet", "text": "Use rubrics before, during, and after writing."}, {"type": "text", "text": "Grade adaptations"}, {"type": "text", "text": "Grade 1–2"}, {"type": "bullet", "text": "Use smiley faces, traffic lights, or 3level rubrics."}, {"type": "bullet", "text": "Keep criteria simple: ideas, capitals, punctuation, neatness."}, {"type": "text", "text": "Grade 3–5"}, {"type": "bullet", "text": "Use 4level rubrics aligned to traits: ideas, organization, voice, word choice, fluency, conventions."}, {"type": "bullet", "text": "Students write reflection sentences:"}, {"type": "bullet", "text": "“I improved by…”"}, {"type": "bullet", "text": "“Next time I will…”"}, {"type": "text", "text": "👥 4. GROUP CONFERENCING (G1–G5)"}, {"type": "text", "text": "Smallgroup conferences save time and build community."}, {"type": "text", "text": "How to run them"}, {"type": "bullet", "text": "Gather 3–5 students with a shared need."}, {"type": "bullet", "text": "Teach one microskill (e.g., adding detail, using transitions)."}, {"type": "bullet", "text": "Model with a short example."}, {"type": "bullet", "text": "Students try it immediately in their own writing."}, {"type": "bullet", "text": "Quick shareback."}, {"type": "text", "text": "Grade adaptations"}, {"type": "bullet", "text": "G1–2: Focus on basics (spacing, capitals, adding one more sentence)."}, {"type": "bullet", "text": "G3–5: Focus on craft (hooks, transitions, elaboration, paragraphing)."}]}, {"title": "5. GOAL SETTING (G1–G5)", "content": [{"type": "text", "text": "Goals make writing purposeful and help students track progress."}, {"type": "text", "text": "Best practices"}, {"type": "bullet", "text": "Keep goals visible (goal cards, bookmarks, sticky notes)."}, {"type": "bullet", "text": "Goals should be specific and actionable."}, {"type": "bullet", "text": "Students revisit goals during conferences."}, {"type": "text", "text": "Examples"}, {"type": "text", "text": "Grade 1–2"}, {"type": "bullet", "text": "“I will use finger spaces.”"}, {"type": "bullet", "text": "“I will add one describing word.”"}, {"type": "bullet", "text": "“I will start my sentences with a capital.”"}, {"type": "text", "text": "Grade 3–5"}, {"type": "bullet", "text": "“I will use transitions between paragraphs.”"}, {"type": "bullet", "text": "“I will revise for clarity by adding examples.”"}, {"type": "bullet", "text": "“I will check dialogue punctuation.”"}, {"type": "text", "text": "📌 6. SHORTHAND GUIDES (G1–G5)"}, {"type": "text", "text": "These are quick reference tools students keep in notebooks or folders."}, {"type": "text", "text": "Examples"}, {"type": "bullet", "text": "COPS (Capitals, Organization, Punctuation, Spelling) — G1–3"}, {"type": "bullet", "text": "ARMS (Add, Remove, Move, Substitute) — G3–5"}, {"type": "bullet", "text": "SWAG (Start with a Grabber) — G3–5"}, {"type": "bullet", "text": "Said is Dead word lists — G2–5"}, {"type": "bullet", "text": "Transition word menus — G3–5"}, {"type": "bullet", "text": "Genrespecific checklists — all grades"}, {"type": "text", "text": "Why they work"}, {"type": "bullet", "text": "They reduce cognitive load."}, {"type": "bullet", "text": "They help students work independently."}, {"type": "bullet", "text": "They support consistent expectations across the year."}, {"type": "text", "text": "🔄 7. KEEPING STUDENTS ENGAGED WHILE REFLECTING ON FEEDBACK"}, {"type": "text", "text": "This is where the magic happens — students stay motivated and improve."}, {"type": "text", "text": "Strategies that work across G1–G5"}, {"type": "text", "text": "1. Glow & Grow"}, {"type": "bullet", "text": "Students highlight one “glow” (strength) and one “grow” (next step)."}, {"type": "bullet", "text": "Works beautifully with colorcoding."}]}, {"title": "2. Feedback Bingo", "content": [{"type": "bullet", "text": "Students complete squares like:"}, {"type": "bullet", "text": "“Add a stronger verb.”"}, {"type": "bullet", "text": "“Fix a punctuation error.”"}, {"type": "bullet", "text": "“Add a detail to your ending.”"}, {"type": "text", "text": "3. Partner Feedback Ladders"}, {"type": "bullet", "text": "“I noticed…”"}, {"type": "bullet", "text": "“I wondered…”"}, {"type": "bullet", "text": "“Have you considered…?”"}, {"type": "bullet", "text": "“One thing you did well was…”"}, {"type": "bullet", "text": "“One thing to try next is…”"}, {"type": "text", "text": "4. Revision Stations"}, {"type": "text", "text": "Rotate through stations such as:"}, {"type": "bullet", "text": "Add detail"}, {"type": "bullet", "text": "Check capitals"}, {"type": "bullet", "text": "Improve verbs"}, {"type": "bullet", "text": "Add transitions"}, {"type": "bullet", "text": "Read aloud for flow"}, {"type": "text", "text": "5. Timed Revision Bursts"}, {"type": "bullet", "text": "3–5 minutes per microskill."}, {"type": "bullet", "text": "Keeps energy high and avoids overwhelm."}, {"type": "text", "text": "6. TeacherCreated Mentor Snippets"}, {"type": "bullet", "text": "Short, 1–2 sentence models students imitate."}, {"type": "bullet", "text": "Perfect for G1–5."}, {"type": "text", "text": "7. “Before & After” Portfolios"}, {"type": "bullet", "text": "Students keep drafts to see growth over time."}, {"type": "bullet", "text": "Builds pride and intrinsic motivation."}, {"type": "text", "text": "🌈 PUTTING IT ALL TOGETH // ── Build sidebar nav ──────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  const grades = [1,2,3,4,5];

  // Genre packages by grade
  grades.forEach(g => {
    const pkgs = DATA.packages.filter(p => p.grade === g);
    const el = document.createElement('div');
    el.className = 'nav-grade';
    el.innerHTML = `
      <div class="nav-grade-header" onclick="toggleGrade(this)">
        <span class="grade-dot" style="background:${GRADE_COLORS[g]}"></span>
        <span style="color:${GRADE_COLORS[g]}">Grade ${g}</span>
        <span class="grade-chevron">▶</span>
      </div>
      <div class="nav-genres">
        <div class="nav-section-title">Genre Packages</div>
        ${pkgs.map((p,i) => `
          <div class="nav-item" onclick="showPackage(${DATA.packages.indexOf(p)})" id="nav-pkg-${DATA.packages.indexOf(p)}">
            <span class="nav-icon">${GENRE_ICONS[p.genre]||'📝'}</span>
            <span>${p.genre}</span>
          </div>`).join('')}
        <div class="nav-section-title">Grammar</div>
        <div class="nav-item" onclick="showGrammar(${g})" id="nav-gram-${g}">
          <span class="nav-icon">📐</span><span>Essential Grammar</span>
        </div>
      </div>`;
    nav.appendChild(el);
  });

  // Poetry
  const poetryEl = document.createElement('div');
  poetryEl.className = 'nav-grade';
  poetryEl.innerHTML = `
    <div class="nav-grade-header" onclick="toggleGrade(this)">
      <span class="grade-dot" style="background:#7D3C98"></span>
      <span style="color:#7D3C98">Poetry</span>
      <span class="grade-chevron">▶</span>
    </div>
    <div class="nav-genres">
      ${DATA.poetry.map((p,i) => `
        <div class="nav-item" onclick="showPoetry(${i})" id="nav-poetry-${i}">
          <span class="nav-icon">✍️</span><span>${p.title}</span>
        </div>`).join('')}
    </div>`;
  nav.appendChild(poetryEl);

  // Teaching
  const teachEl = document.createElement('div');
  teachEl.className = 'nav-grade';
  teachEl.innerHTML = `
    <div class="nav-grade-header" onclick="toggleGrade(this)">
      <span class="grade-dot" style="background:#0F6E56"></span>
      <span style="color:#0F6E56">Teaching</span>
      <span class="grade-chevron">▶</span>
    </div>
    <div class="nav-genres">
      <div class="nav-item" onclick="showTeaching()" id="nav-teaching">
        <span class="nav-icon">🎯</span><span>Best Practices</span>
      </div>
    </div>`;
  nav.appendChild(teachEl);

  // Quick chips
  const chips = document.getElementById('quick-chips');
  ['Grade 1 Story','Grade 3 Narrative','Grade 5 Persuasive','Grade 2 Grammar','Haiku Poetry','Teaching Practices'].forEach(label => {
    const chip = document.createElement('div');
    chip.className = 'welcome-chip';
    chip.textContent = label;
    chip.onclick = () => {
      if (label.includes('Story')) showPackage(0);
      else if (label.includes('Narrative')) showPackage(11);
      else if (label.includes('Persuasive')) showPackage(27);
      else if (label.includes('Grammar')) showGrammar(2);
      else if (label.includes('Haiku')) showPoetry(1);
      else showTeaching();
    };
    chips.appendChild(chip);
  });
}

function toggleGrade(header) {
  const grade = header.parentElement;
  grade.classList.toggle('open');
}

// ── Active nav state ───────────────────────────────────────────
function clearActive() {
  document.querySelectorAll('.nav-item.active').forEach(el => el.classList.remove('active'));
}

// ── PACKAGE VIEW ──────────────────────────────────────────────
function showPackage(idx) {
  clearActive();
  const el = document.getElementById('nav-pkg-' + idx);
  if (el) { el.classList.add('active'); el.closest('.nav-grade').classList.add('open'); }

  const pkg = DATA.packages[idx];
  const gc = GRADE_COLORS[pkg.grade];
  const gbg = GRADE_BG[pkg.grade];
  document.getElementById('toolbar-title').textContent = `Grade ${pkg.grade} — ${pkg.genre}`;

  let html = `<div class="page">
    <div class="package-title" style="background:${gc}">
      <div style="font-size:22px;font-weight:700">Grade ${pkg.grade} — ${pkg.genre}</div>
      <div class="package-subtitle">Six Traits Package · Exemplar · Formatting Guide</div>
    </div>`;

  // A) Exemplar
  html += `<div class="section-card">
    <div class="section-header open" onclick="toggleSection(this)">
      <span class="section-badge" style="background:${gbg};color:${gc}">A</span>
      <span class="section-title-text">Exemplar — Mentor Text (Meeting–Exceeding)</span>
      <span class="section-chevron">▶</span>
    </div>
    <div class="section-body open">
      <div class="exemplar-box">${pkg.exemplar.map(l => `<p style="margin-bottom:6px">${escHtml(l)}</p>`).join('')}</div>
    </div>
  </div>`;

  // B) Six Traits
  html += `<div class="section-card">
    <div class="section-header open" onclick="toggleSection(this)">
      <span class="section-badge" style="background:${gbg};color:${gc}">B</span>
      <span class="section-title-text">Six Traits Stem Sentences</span>
      <span class="section-chevron">▶</span>
    </div>
    <div class="section-body open">
      <div class="traits-grid">
        ${pkg.traits.map(t => `
          <div class="trait-card">
            <div class="trait-header" onclick="toggleTrait(this)">
              <div class="trait-num" style="background:${gc}">${t.num}</div>
              <div>
                <div class="trait-name">${escHtml(t.name)}</div>
                <div class="trait-goal">${escHtml(t.goal)}</div>
              </div>
              <span class="trait-chev">▶</span>
            </div>
            <div class="trait-body">
              ${t.stems.length ? `<div class="trait-section-label">Sentence Stems</div>
              <ul class="stem-list">${t.stems.map(s => `<li class="stem-item">${escHtml(s)}</li>`).join('')}</ul>` : ''}
              ${t.checklist.length ? `<div class="trait-section-label">Mini Checklist</div>
              ${t.checklist.map(c => `<div class="check-item"><span class="check-icon">✓</span><span>${escHtml(c)}</span></div>`).join('')}` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  // C) Formatting
  const fmtLines = pkg.formatting;
  let fmtHtml = '';
  let currentSection = null;
  let currentItems = [];
  
  const flushSection = () => {
    if (currentSection) {
      fmtHtml += `<div class="format-section">
        <div class="format-section-title">${escHtml(currentSection)}</div>
        ${currentItems.map(i => `<div class="format-bullet">${escHtml(i)}</div>`).join('')}
      </div>`;
      currentSection = null; currentItems = [];
    }
  };

  fmtLines.forEach(line => {
    if (line.startsWith('- ')) {
      currentItems.push(line.slice(2));
    } else {
      flushSection();
      currentSection = line;
    }
  });
  flushSection();

  html += `<div class="section-card">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-badge" style="background:${gbg};color:${gc}">C</span>
      <span class="section-title-text">Formatting Guide</span>
      <span class="section-chevron">▶</span>
    </div>
    <div class="section-body">
      <div class="format-content">${fmtHtml}</div>
    </div>
  </div>`;

  html += '</div>';
  setContent(html);
}

  let html = `<div class="page">
    <div class="package-title" style="background:${gc}">
      <div style="font-size:22px;font-weight:700">Grade ${grade} — Essential Grammar</div>
      <div class="package-subtitle">Grade-level grammar reference with examples</div>

function setContent(html) {
  const c = document.getElementById('content');
  c.innerHTML = html;
  c.scrollTop = 0;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SEARCH ────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (q.length < 2) { document.getElementById('search-overlay').classList.remove('active'); return; }
  searchTimeout = setTimeout(() => doSearch(q), 200);
});

document.getElementById('close-search').addEventListener('click', () => {
  document.getElementById('search-overlay').classList.remove('active');
  document.getElementById('search').value = '';
});

function highlight(text, q) {
  if (!text) return '';
  const safe = escHtml(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function doSearch(q) {
  const ql = q.toLowerCase();
  const results = [];

  // Search packages
  DATA.packages.forEach((pkg, idx) => {
    // Search exemplar
    pkg.exemplar.forEach(line => {
      if (line.toLowerCase().includes(ql)) {
        results.push({type:'exemplar', idx, pkg, snippet: line, label:`Grade ${pkg.grade} ${pkg.genre} — Exemplar`});
      }
    });
    // Search traits
    pkg.traits.forEach(t => {
      const tStr = t.name + ' ' + t.goal;
      if (tStr.toLowerCase().includes(ql)) {
        results.push({type:'trait', idx, pkg, snippet:`${t.num}. ${t.name}: ${t.goal}`, label:`Grade ${pkg.grade} ${pkg.genre} — Trait`});
      }
      t.stems.forEach(s => {
        if (s.toLowerCase().includes(ql)) {
          results.push({type:'stem', idx, pkg, snippet:s, label:`Grade ${pkg.grade} ${pkg.genre} — ${t.name} Stem`});
        }
      });
      t.checklist.forEach(c => {
        if (c.toLowerCase().includes(ql)) {
          results.push({type:'check', idx, pkg, snippet:c, label:`Grade ${pkg.grade} ${pkg.genre} — ${t.name} Checklist`});
        }
      });
    });
    // Search formatting
    pkg.formatting.forEach(line => {
      if (line.toLowerCase().includes(ql)) {
        results.push({type:'format', idx, pkg, snippet:line, label:`Grade ${pkg.grade} ${pkg.genre} — Formatting`});
      }
    });
  });

  // Search grammar
  DATA.grammar.forEach(gd => {
    gd.points.forEach(pt => {
      if (pt.name.toLowerCase().includes(ql)) {
        results.push({type:'grammar', grade:gd.grade, snippet:pt.name, label:`Grade ${gd.grade} Grammar — ${pt.name}`});
      }
      pt.content.forEach(c => {
        if (c.text && c.text.toLowerCase().includes(ql)) {
          results.push({type:'grammar', grade:gd.grade, snippet:c.text, label:`Grade ${gd.grade} Grammar — ${pt.name}`});
        }
      });
    });
  });

  // Search poetry
  DATA.poetry.forEach((ps, pidx) => {
    ps.grades.forEach(g => {
      g.tips.forEach(tip => {
        if (tip.toLowerCase().includes(ql)) {
          results.push({type:'poetry', pidx, snippet:tip, label:`Poetry — ${ps.title} Grade ${g.grade}`});
        }
      });
    });
  });

  const overlay = document.getElementById('search-overlay');
  const resultDiv = document.getElementById('search-results');
  const countEl = document.getElementById('search-count');
  
  const shown = results.slice(0, 50);
  countEl.textContent = results.length === 0 ? 'No results' : `${results.length} result${results.length===1?'':'s'} for "${q}"`;
  
  resultDiv.innerHTML = shown.map(r => `
    <div class="search-result" onclick="goResult(${JSON.stringify(JSON.stringify(r)).slice(1,-1)})">
      <div class="search-result-title">${escHtml(r.label)}</div>
      <div class="search-result-snippet">${highlight(r.snippet.slice(0,120), q)}</div>
    </div>`).join('') || '<div style="padding:24px;text-align:center;color:#999">No results found</div>';

  overlay.classList.add('active');
}

function goResult(rStr) {
  const r = JSON.parse(rStr);
  document.getElementById('search-overlay').classList.remove('active');
  if (r.type === 'grammar') showGrammar(r.grade);
  else if (r.type === 'poetry') showPoetry(r.pidx);
  else if (r.type === 'teaching') showTeaching();
  else showPackage(r.idx);
}

// Init
buildNav();
// Open Grade 1 by default
document.querySelector('.nav-grade').classList.add('open');
</script>
</body>
</html>
