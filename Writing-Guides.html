<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Continuum — Grades 1–5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--teal:#0F6E56;--amber:#854F0B;--red:#922B21;--purple:#6C3483;
  --g1:#2980B9;--g2:#1E8449;--g3:#B7950B;--g4:#A93226;--g5:#7D3C98;
  --g1bg:#EBF5FB;--g2bg:#EAFAF1;--g3bg:#FEF9E7;--g4bg:#FDEDEC;--g5bg:#F5EEF8;
  --bg:#F4F6F8;--card:#fff;--border:#E0E0E0;--text:#1a1a1a;--muted:#666;
  --sidebar:260px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
#sidebar-header{padding:14px 16px;background:var(--navy);color:#fff;flex-shrink:0}
#sidebar-header h1{font-size:15px;font-weight:600;line-height:1.3}
#sidebar-header p{font-size:11px;opacity:.75;margin-top:2px}
#search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#F8F9FA}
#search:focus{border-color:var(--navy)}
#nav{flex:1;overflow-y:auto;padding:6px 0}
#nav::-webkit-scrollbar{width:4px}
#nav::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* nav items */
.nav-grade{margin-bottom:4px}
.nav-grade-header{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--border)}
.nav-grade-header:hover{background:#F8F9FA}
.grade-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grade-chevron{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--muted)}
.nav-grade.open .grade-chevron{transform:rotate(90deg)}
.nav-genres{display:none;padding:2px 0}
.nav-grade.open .nav-genres{display:block}

.nav-section-title{padding:6px 14px 2px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 22px;cursor:pointer;font-size:13px;color:var(--text);border-radius:0;transition:background .15s}
.nav-item:hover{background:#F0F4FF}
.nav-item.active{background:#EBF3FF;color:var(--navy);font-weight:500;border-left:3px solid var(--navy)}
.nav-item.active{padding-left:19px}
.nav-icon{font-size:13px;flex-shrink:0}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#toolbar h2{font-size:16px;font-weight:600;flex:1;color:var(--navy)}
#content{flex:1;overflow-y:auto;padding:0}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ── CARDS ── */
.page{padding:24px;max-width:900px;margin:0 auto}
.package-title{font-size:24px;font-weight:700;color:#fff;padding:18px 24px;border-radius:10px 10px 0 0;margin:-24px -24px 0;margin-bottom:0}
.package-subtitle{font-size:13px;opacity:.85;margin-top:3px}

.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:16px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s}
.section-header:hover{background:#FAFBFC}
.section-header.open{border-bottom-color:var(--border)}
.section-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.3px}
.section-title-text{font-size:15px;font-weight:600;flex:1}
.section-chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.section-header.open .section-chevron{transform:rotate(90deg)}
.section-body{display:none;padding:18px}
.section-body.open{display:block}

/* exemplar */
.exemplar-box{background:#F0F9F6;border:1.5px solid #0F6E56;border-radius:8px;padding:16px 20px;font-style:italic;line-height:1.8;color:#1a3a2e;font-size:14px}
.exemplar-purpose{color:var(--teal);font-size:13px;margin-bottom:12px;font-style:italic}

/* traits */
.traits-grid{display:flex;flex-direction:column;gap:12px}
.trait-card{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.trait-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#F8FAFE;transition:background .15s}
.trait-header:hover{background:#EDF3FF}
.trait-num{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trait-name{font-weight:600;font-size:13px;flex:1}
.trait-goal{font-size:12px;color:var(--muted);font-style:italic}
.trait-chev{font-size:11px;color:var(--muted);transition:transform .2s}
.trait-header.open .trait-chev{transform:rotate(90deg)}
.trait-body{display:none;padding:14px;border-top:1px solid var(--border)}
.trait-body.open{display:block}
.trait-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);margin:12px 0 6px;padding-top:12px;border-top:1px dashed #ddd}
.trait-section-label:first-child{margin-top:0;padding-top:0;border-top:none}
.stem-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.stem-item{background:#F0F9F6;border-radius:6px;padding:7px 12px;font-size:13px;line-height:1.5;border-left:3px solid var(--teal)}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;line-height:1.5}
.check-icon{color:var(--teal);font-size:14px;flex-shrink:0;margin-top:1px}

/* formatting */
.format-content{font-size:13px;line-height:1.8;color:var(--text)}
.format-section{margin-bottom:14px}
.format-section-title{font-weight:600;font-size:13px;color:var(--navy);margin-bottom:5px;border-left:3px solid var(--navy);padding-left:8px}
.format-bullet{display:flex;gap:6px;padding:2px 0;padding-left:8px}
.format-bullet::before{content:"•";color:var(--teal);flex-shrink:0}

/* grammar */
.grammar-grid{display:flex;flex-direction:column;gap:10px}
.grammar-point{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.grammar-point-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#F8FAFE;font-weight:600;font-size:13px}
.grammar-point-header:hover{background:#EDF3FF}
.grammar-point-chev{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s}
.grammar-point-header.open .grammar-point-chev{transform:rotate(90deg)}
.grammar-point-body{display:none;padding:14px;border-top:1px solid var(--border);font-size:13px;line-height:1.7}
.grammar-point-body.open{display:block}
.grammar-sub-head{font-weight:600;color:var(--teal);margin:10px 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.grammar-bullet{display:flex;gap:6px;padding:2px 0}
.grammar-bullet::before{content:"•";color:var(--amber);flex-shrink:0}

/* poetry */
.poetry-intro{color:var(--muted);font-size:13px;margin-bottom:12px;font-style:italic}
.poetry-grade-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.poetry-tab{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;transition:all .15s}
.poetry-tab.active,.poetry-tab:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.poetry-grade-content{display:none}
.poetry-grade-content.active{display:block}
.poetry-goal{background:#EBF5FB;border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:10px;font-style:italic;color:#1B3A6B;border-left:3px solid var(--navy)}
.poetry-tip{display:flex;gap:6px;padding:4px 0;font-size:13px;line-height:1.5}
.poetry-tip::before{content:"✦";color:var(--purple);flex-shrink:0}

/* teaching */
.teaching-section{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.teaching-header{padding:13px 16px;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;background:#F9F9F9}
.teaching-header:hover{background:#F0F0F0}
.teaching-chev{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s}
.teaching-header.open .teaching-chev{transform:rotate(90deg)}
.teaching-body{display:none;padding:14px 16px;border-top:1px solid var(--border);font-size:13px;line-height:1.8}
.teaching-body.open{display:block}
.teaching-bullet{display:flex;gap:6px;padding:2px 0}
.teaching-bullet::before{content:"→";color:var(--teal);flex-shrink:0}

/* search results */
.search-result{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.search-result:hover{background:#F0F4FF}
.search-result-title{font-weight:600;font-size:13px;color:var(--navy)}
.search-result-sub{font-size:12px;color:var(--muted);margin-top:2px}
.search-result-snippet{font-size:12px;color:var(--text);margin-top:4px;line-height:1.5}
.search-result mark{background:#FFF3CD;padding:0 2px;border-radius:2px}
#search-overlay{display:none;position:fixed;top:0;left:var(--sidebar);right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto}
#search-overlay.active{display:block}
.search-overlay-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
#close-search{cursor:pointer;font-size:20px;color:var(--muted)}

/* welcome */
.welcome{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:var(--muted);text-align:center;padding:40px}
.welcome-icon{font-size:48px}
.welcome h2{color:var(--navy);font-size:22px}
.welcome p{font-size:14px;max-width:400px;line-height:1.6}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.welcome-chip{padding:6px 14px;background:#EBF5FB;color:var(--navy);border-radius:99px;font-size:13px;cursor:pointer;font-weight:500}
.welcome-chip:hover{background:#D6EAF8}

/* grade colors applied via JS */
.g1{--gc:var(--g1);--gcbg:var(--g1bg)}
.g2{--gc:var(--g2);--gcbg:var(--g2bg)}
.g3{--gc:var(--g3);--gcbg:var(--g3bg)}
.g4{--gc:var(--g4);--gcbg:var(--g4bg)}
.g5{--gc:var(--g5);--gcbg:var(--g5bg)}
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>Writing Continuum</h1>
    <p>Grades 1–5 · All Genres</p>
  </div>
  <div id="search-wrap">
    <input type="text" id="search" placeholder="Search anything..." autocomplete="off">
  </div>
  <div id="nav"></div>
</nav>

<div id="main">
  <div id="toolbar">
    <h2 id="toolbar-title">Writing Continuum</h2>
  </div>
  <div id="content">
    <div class="welcome">
      <div class="welcome-icon">📚</div>
      <h2>Writing Continuum Guide</h2>
      <p>Select a grade and genre from the sidebar, or search for any topic, trait, or stem sentence.</p>
      <div class="welcome-chips" id="quick-chips"></div>
    </div>
  </div>
</div>

<div id="search-overlay">
  <div class="search-overlay-header">
    <span id="search-count">Search results</span>
    <span id="close-search">×</span>
  </div>
  <div id="search-results"></div>
</div>

ip", "- Add a “special trick” or “helpful hint”", "- Add a labelled diagram"]}, {"grade": 1, "genre": "Journal", "exemplar": ["January 28", "Today was a fun day at school. In the morning, we had P.E., and I learned how to dribble a basketball. At first it was hard, but then I got better. I felt proud of myself.", "After lunch, I worked with my group to build a paper bridge. Our bridge was strong, and it held three toy cars. We cheered when it didn’t fall down.", "I had a good day because I tried something new and worked well with my friends."], "traits": [{"num": "1", "name": "IDEAS", "goal": "Share a clear event with simple details.", "stems": ["Today I ________.", "One thing that happened was ________.", "Another thing I did was ________.", "I want to remember that ________."], "checklist": ["I wrote about one day or one event.", "I added 2–3 details.", "My ideas make sense."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Beginning → what happened → ending reflection.", "stems": ["Beginning: Today… / This morning… / After lunch…", "Middle: Then… After that…", "Ending: I felt ________ because ________."], "checklist": ["My ideas are in order.", "I wrote a beginning, middle, and ending.", "My ending tells how I felt."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "Show feelings and personal thoughts.", "stems": ["I felt ________ when ________.", "I was thinking ________.", "It was so ________!", "I liked ________ because ________."], "checklist": ["I showed feelings.", "I used simple strategies like ! or bold words (optional).", "My journal sounds like me."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Use simple but descriptive words.", "stems": ["The best part was ________.", "It was ________ (adjective).", "The place looked ________.", "The activity was ________."], "checklist": ["I used adjectives.", "My words help the reader imagine.", "I didn’t repeat the same words too much."], "_mode": "check"}, {"num": "5 e blue marble across the carpet. “Oh! I didn’t mean to take it forever,” the fairy said. “I just wanted to see how fast it could go.”", "Leo laughed. “It’s okay. You can try it on my track instead.” The fairy’s eyes lit up. Together, they raced the marble again and again. It zoomed so fast that both of them cheered.", "At the end of the day, the fairy returned the marble and promised to visit again. Leo felt proud that he solved the mystery—and happy to have a magical new friend."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear story idea with supporting details and a sense of audience.", "stems": ["My story is about ________ who wants ________.", "The problem in my story is ________.", "The character feels ________ because ________.", "Important details are ________ and ________.", "My story will entertain the reader by ________."], "checklist": ["My idea is clear and stays on topic.", "I added supporting details.", "My story is written to entertain."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Clear beginning, middle, and end with simple paragraphs.", "stems": ["Beginning: One day… / At the start… / My character was…", "Middle: Then… After that… Suddenly…", "End: Finally… In the end… The problem was solved when…"], "checklist": ["I used paragraphs (Beginning / Middle / End).", "My events are in logical order.", "My ending matches the problem."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A consistent personal style and appropriate tone for storytelling.", "stems": ["My character felt ________ when ________.", "“________!” the character shouted/whispered/sighed.", "I want the reader to feel ________ during this part.", "I chose this detail because ________."], "checklist": ["My voice is consistent.", "My tone matches a fiction story.", "I used dialogue or feelings to show personality."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Deliberate vocabulary that adds detail and depth.", "stems": ["The tions correctly (under, behind, inside, across)", "Challenge Yourself (for high flyers)", "- Add a second character with a different personality", "- Add a twist in the middle", "- Add a simile (“as fast as a rocket”)", "- Use a complex conjunction (when, if, because)"]}, {"grade": 2, "genre": "Letter Writing", "exemplar": ["Dear Ms. Tanaka,", "I hope you are having a wonderful week. I am writing to tell you about our class science experiment on plants because I think you would enjoy hearing about it.", "Yesterday, we planted three different seeds: a bean, a sunflower seed, and a mystery seed. First, we put soil into small pots. Then we placed each seed inside and watered them carefully. I liked the bean seed the most because it was smooth and shiny.", "Today, when I checked my pot, I saw a tiny green sprout! I felt excited because it means my plant is starting to grow. I wonder how tall it will get. I will water it every day and make sure it gets enough sunlight.", "Thank you for reading my letter. I hope I can show you my plant when it gets bigger.", "Sincerely, Mina"], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear purpose with supporting details and awareness of audience.", "stems": ["I am writing to tell you about ________.", "I chose this topic because ________.", "One important detail is ________.", "Another thing I want you to know is ________.", "I think you will enjoy hearing about ________."], "checklist": ["My letter stays on topic.", "I added supporting details.", "I wrote with my reader in mind."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Clear greeting, body paragraphs, closing, and signature.", "stems": ["Greeting: Dear ________,", "Opening: I am writing to ________.", "Body Paragraph 1: First… / Yesterday… / At school…", "Body Paragraph 2: Today… / Another thing… / I also want to tell you…", "Closing: Thank you for… / I hope… / I look forward to…", "Signoff: Sincerely, / From,"], "checklist": ["I used paragraphs.", ture", "- Clear purpose and details", "Paragraph Expectations", "- Paragraph 1: Why you are writing + first details", "- Paragraph 2: More details + feelings or thoughts", "- Closing: Wrap up politely", "Writing Moves for Grade 2", "- Use time words (yesterday, today, later)", "- Use strong verbs (noticed, wondered, explained)", "- Use adjectives (tiny sprout, shiny seed)", "- Use prepositions correctly (inside, behind, across)", "- Use quotation marks if including dialogue", "Challenge Yourself (for high flyers)", "- Add a question for the reader", "- Add a second paragraph with a new but related detail", "- Add a simile (“as bright as the sun”)", "- Use a complex conjunction (when, if, because)"]}, {"grade": 2, "genre": "Informational Text", "exemplar": ["All About Sea Turtles", "Sea turtles are amazing reptiles that live in warm oceans around the world. They have strong flippers that help them swim long distances. Their shells protect them from predators like sharks. Sea turtles can hold their breath for a very long time, which helps them stay underwater.", "Sea turtles eat different foods depending on their species. Some sea turtles eat seaweed and seagrass, while others eat jellyfish, crabs, or small fish. Their sharp beaks help them bite and tear their food. Green sea turtles mostly eat plants, which is why their fat looks green.", "Baby sea turtles have a difficult start to life. They hatch from eggs buried in the sand. When they crawl out of the nest, they must quickly reach the ocean before birds or crabs catch them. Only a few baby turtles survive to become adults.", "Sea turtles are interesting animals because they travel far, live long lives, and help keep the ocean healthy."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear topic with supporting facts and awareness of audience.", "stems": ["My topic is ________.", "________ are ________ because ________.", "One important fact is ________.", "Another fact is ________.", "Readers will learn about ________."], "checklist": ["My writing stays on topic.", "I added supporting facts.", "I wrote to teach the reader."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Clear introduction, grouped facts, and a conclusion.", "stems": ["Introduction: ________ are… / This text will teach you about…", "Body Paragraph 1: First, I will explain…", "Body Paragraph 2: Another important part is…", "Conclusion: Now you know… / ________ are important because…"], "checklist": ["I used paragraphs.", "My facts are grouped by idea.", "My ending wraps up the topic."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A clear, knowledgeable tone that fits informational writing.", "stems": ["You might not know that ________.", "It is interesting that ________.", "Scientists believe ________.", "I want readers to understand ________."], "checklist": ["My tone is informative.", "My voice is consistent.", "I sound like I know my topic."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Accurate vocabulary and descriptive details that deepen understanding.", "stems": ["A key word for this topic is ________.", "________ means ________.", "They have ________ (body part) that helps them ________.", "They live in ________ (habitat).", "A strong verb I used is ________."], "checklist": ["I used topic-specific vocabulary.", "I used adjectives and precise nouns.", "My words help the reader learn."], "_mode": "check"}, {"num": "5", "name": "SENTENCE FLUENCY", "goal": "Varied sentence beginnings and patterns; smooth rhythm.", "stems": ["________ can…", "They also…", "Another fact is…", "Because…", "When…"], "checklist": ["My sentences have variety.", "My writing is easy to read aloud.", "I used different lengths and patterns."], "_mode": "check"}, {"num": "6", "name": "CONVENTIONS", "goal": "", "stems": ["I used a/an/the correctly.", "I checked my verbs:", "Past: lived, grew, ate", "Present: live, grow, eat", "Future: will live, will grow, will eat", "I used commas in a list: ________, ________, and ________.", "I capitalized all proper nouns."], "checklist": ["Capital letters and end punctuation are correct.", "Commas used accurately in lists.", "Spelling of simple and some complex words is correct.", "Handwriting is neat and spaced."], "_mode": "check"}], "formatting": ["What my informational text should look like", "- Title at the top", "- Three paragraphs (Introduction / Facts / More Facts / Conclusion)", "- Topic-specific vocabulary", "- Clear, grouped ideas", "Paragraph Expectations", "- Introduction: Introduce the topic", "- Body Paragraphs: Group facts by idea (habitat, diet, life cycle, etc.)", "- Conclusion: Wrap up with an interesting or important idea", "Writing Moves for Grade 2", "- Use topic words (habitat, diet, features)", "- Use strong verbs (crawl, glide, protect)", "- Use adjectives (smooth shell, warm ocean)", "- Use prepositions correctly (in, under, across)", "- Use complex conjunctions (when, if, because)", "Challenge Yourself (for high flyers)", "- Add a labelled diagram", "- Add a comparison sentence (“They are similar to…”)", "- Add a fun fact paragraph"]}, {"grade": 2, "genre": "Procedural Writing", "exemplar": ["How to Make a Paper Helicopter", "Making a paper helicopter is fun and easy. You only need a few materials, and you can watch it spin through the air when you drop it.", "You will need:", "- 1 sheet of paper", "- Scissors", "- A paper clip", "- Markers (optional)", "Steps:", "- First, cut your paper into a long rectangle.", "- Next, cut a straight line down the top half of the rectangle to make two wings.", "- Then, fold the bottom part of the paper up to make a small base.", "- After that, fold each wing in opposite directions.", "- Finally, clip a paper clip to the bottom so the helicopter spins better.", "Now your paper helicopter is ready. Hold it up high and let it go. Watch how it twirls as it falls."], "traits": [{"num": "1", "name": "IDEAS", "goal": "Explain how to do somet oved visiting her grandfather’s tiny clock shop at the end of Maple Street. Every shelf was filled with ticking clocks—tall ones, tiny ones, golden ones, and even one shaped like a cat. Mira’s favourite was the old wooden cuckoo clock that never worked. “One day,” her grandfather always said, “you’ll be the one to fix it.”", "One rainy afternoon, Mira decided to try. She carefully opened the back of the clock and discovered a small silver key hidden inside. “That’s strange,” she whispered. She had never seen it before. When she turned the key, the entire shop began to shimmer. The clocks ticked faster and faster until—WHOOSH!—a bright flash filled the room.", "Suddenly, Mira found herself standing in a forest where giant gears turned like trees. A tiny mechanical bird fluttered toward her. “You must help us,” it chirped. “The Time Tree has stopped, and our world is slowing down.” Mira felt nervous, but she knew she had to try.", "She followed the bird to a tall tree made of spinning wheels and glowing numbers. At the very top, a golden gear was missing. Mira reached into her pocket and felt the silver key. “Maybe this will work,” she said. She climbed carefully, slipped the key into the empty space, and turned it.", "The Time Tree began to glow. The gears spun smoothly again. “You fixed it!” the bird cheered.", "In another flash, Mira was back in the shop. The cuckoo clock chimed loudly for the first time in years. Her grandfather smiled. “I knew you could do it.”", "Mira grinned, wondering if the magical world had been real—or if the clock was simply full of surprises."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused main idea with depth and development.", "stems": ["My story is about ________ who must ________.", "The main problem is ________, and it matters because ________.", "A key moment in my story is when ________.", "I developed my idea by adding details about ________.", "My story will entertain the reader by ________."], "checklist": n small actions—like reducing plastic waste—can help keep reefs healthy.", "Coral reefs are beautiful, complex, and essential. By learning about them, we can understand why they must be protected for the future."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused topic with rich development and accurate details.", "stems": ["My topic is ________, and it is important because ________.", "One key idea readers should know is ________.", "This detail shows ________ because ________.", "Another important fact is ________.", "This information helps the reader understand ________."], "checklist": ["My main idea is clear and focused.", "I added rich, accurate supporting details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Logical paragraphs, clear sections, and advanced transitions.", "stems": ["Introduction: ________ are… / This text will explain…", "Body Paragraphs:", "To begin with…", "Another important part is…", "Meanwhile…", "In addition…", "Conclusion: In conclusion… / This matters because…"], "checklist": ["I used indented paragraphs.", "My ideas are logically grouped.", "I used transitions like meanwhile, although, however, in addition."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A consistent, knowledgeable, informative tone.", "stems": ["Scientists believe ________.", "You might be surprised to learn that ________.", "It is interesting that ________.", "I want readers to understand ________."], "checklist": ["My tone is informative and appropriate.", "My voice is consistent.", "I sound like I understand my topic."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Rich, precise vocabulary that adds depth and clarity.", "stems": ["A topicspecific word I used is ________, which means ________.", "A vivid verb I used is ________.", "A descriptive phrase I added is ________.", "This detail helps the reader visualize ________."], "checklist": ["I used speci imilar to…”)", "- Add a causeandeffect explanation", "- Add a labelled diagram or glossary", "- Use perfect tense accurately (“Scientists have discovered…”)"]}, {"grade": 3, "genre": "Procedural Writing", "exemplar": ["How to Build a Mini Volcano", "Creating a mini volcano is an exciting science activity that shows how chemical reactions work. Before you begin, make sure you have all the materials ready so the experiment runs smoothly.", "You will need:", "- A small plastic bottle", "- Baking soda", "- Vinegar", "- Dish soap", "- Red food colouring", "- A tray", "- A funnel", "Steps:", "- First, place the plastic bottle in the centre of the tray. This will help catch the “lava” when it erupts.", "- Next, use the funnel to pour two spoonfuls of baking soda into the bottle.", "- After that, add a small squeeze of dish soap and a few drops of red food colouring. These ingredients make the eruption look foamy and bright.", "- Then, slowly pour vinegar into the bottle.", "- Finally, step back and watch as the mixture bubbles up and spills over the sides like real lava.", "Safety Tip: Although this experiment is safe, make sure to do it in a place where spills are easy to clean.", "Now your volcano is complete. You can repeat the eruption by adding more baking soda and vinegar."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused procedure with rich development and accurate steps.", "stems": ["This procedure will teach you how to ________.", "The purpose of this activity is to ________.", "One important step is ________ because ________.", "Another detail readers need to know is ________.", "This helps the reader understand ________."], "checklist": ["My purpose is clear and focused.", "I added rich, accurate details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Logical paragraphs, clear sections, and advanced transitions.", "stems": ["Introduction: Today I will explain how to…", "Materials: Y nts only read because it is assigned. Meanwhile, others want more time to read books they love. A weekly reading session would give everyone the chance to choose books that interest them—mysteries, comics, science books, or even poetry. When students enjoy reading, they are more likely to read at home too.", "Finally, Reading Afternoon would build a stronger school community. Teachers could recommend books, students could share their favourites, and classes could celebrate reading together. This would create a positive atmosphere where reading feels exciting instead of rushed.", "For these reasons, I believe our school should start a weekly Reading Afternoon. It would help us focus, enjoy reading more, and grow as a community of readers."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused opinion with rich development and accurate support.", "stems": ["I strongly believe ________ because ________.", "My opinion is ________, and it matters because ________.", "One important reason is ________.", "Another reason is ________.", "This detail shows ________ because ________."], "checklist": ["My opinion is clear and focused.", "I added rich, relevant reasons.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Logical paragraphs, transitions, and a clear persuasive structure.", "stems": ["Introduction: I believe… / In my opinion…", "Reason Paragraphs:", "To begin with…", "Another important reason is…", "Meanwhile…", "Because of this…", "Conclusion: For these reasons… / This is why…"], "checklist": ["I used indented paragraphs.", "My reasons are in logical order.", "I used transitions like meanwhile, although, however, in addition."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A confident, consistent, persuasive tone.", "stems": ["I want the reader to understand that ________.", "It is important because ________.", "You might be surprised to learn that ________.", "I chose this exampl ails", "- Paragraph 4: Third reason or community impact", "- Paragraph 5: Conclusion", "Writing Moves for Grade 3", "- Use advanced transitions (meanwhile, although, however, in addition)", "- Use complex sentences", "- Use precise verbs (improve, encourage, support)", "- Use persuasive vocabulary (essential, beneficial, strongly believe)", "- Use examples, comparisons, and explanations", "Challenge Yourself (for high flyers)", "- Add a counterargument (“Some people think…, however…”)", "- Add a realworld example", "- Add a rhetorical question"]}, {"grade": 3, "genre": "Journal", "exemplar": ["March 12", "Today was one of the most memorable days we’ve had in class this term. In the morning, our teacher surprised us with a “mystery challenge.” We had to work in groups to build the tallest tower using only paper, tape, and straws. At first, our tower kept falling over, which was frustrating. However, we noticed that folding the paper made it stronger, so we rebuilt the base. This time, it stood tall and steady.", "After lunch, we presented our towers to the class. Some groups made wide, sturdy towers, while others built tall, thin ones. When it was our turn, I explained how we changed our design after it collapsed. I felt nervous speaking in front of everyone, but my group encouraged me. When our tower stayed standing during the “shake test,” we all cheered.", "At the end of the day, I felt proud and more confident. I learned that mistakes can help you improve if you pay attention to them. I also realized how important teamwork is. I hope we do another challenge soon because it helped me grow as a learner."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused event with rich development and reflection.", "stems": ["Today I experienced ________, which was important because ________.", "One key moment was when ________.", "This mattered to me because ________.", "Another detail that stood out was ________.", "I learned that ________."], "checklist": ["My used commas after transitions:", "After lunch, we presented our towers.", "I used apostrophes for possession:", "the group’s design", "I checked my verb tenses:", "present, past, future, progressive, perfect", "I used quotation marks correctly if I included dialogue."], "checklist": ["Grammar is accurate and varied.", "Punctuation is consistently correct.", "Spelling of common and complex words is accurate."], "_mode": "check"}], "formatting": ["What my journal should look like", "- Date", "- Three or more paragraphs", "- Clear beginning, middle, and end", "- Reflection at the end", "Paragraph Expectations", "- Paragraph 1: What happened first", "- Paragraph 2: What happened next", "- Paragraph 3: Reflection—how you felt, what you learned", "Writing Moves for Grade 3", "- Use advanced transitions (meanwhile, although, however)", "- Use complex sentences", "- Use precise verbs (observed, constructed, realized)", "- Use descriptive vocabulary", "- Use reflection to show growth", "Challenge Yourself (for high flyers)", "- Add a short dialogue line", "- Add a comparison (“It felt like…”)", "- Add a reflection about how this connects to another experience", "- Use perfect tense accurately (“I have learned…”)"]}, {"grade": 4, "genre": "Fictional Narrative", "exemplar": ["The Lantern in the Attic", "Lena had explored every corner of her grandmother’s house—except the attic. It was the only place she wasn’t allowed to enter. “Too dusty,” her grandmother always said. But Lena suspected there was another reason. One stormy afternoon, when the wind rattled the windows and her grandmother was napping, Lena noticed the attic door was slightly open.", "Curiosity tugged at her like an invisible string. She climbed the narrow staircase, each step creaking beneath her feet. The attic smelled of old books and cedar wood. Sunlight slipped through the small window, landing on a single object in the centre of the room: a silver lantern covered in swirling patterns.", "“Hello?” Lena whispered, even though she knew no one was there.", "As she reached for the lantern, it flickered to life. A soft blue glow filled the attic. Suddenly, the floorboards shimmered, and the room transformed. Instead of dusty boxes, Lena found herself standing in a forest of glowing trees. Their leaves sparkled like tiny stars. A fox with shimmering fur stepped forward.", "“You’ve awakened the Lantern of Paths,” the fox said calmly. “It reveals the place you need most.”", "Lena’s heart pounded. “Why did it bring me here?”", "The fox tilted its head. “Because you’ve been feeling lost. This forest shows you the courage you already have.”", "Before Lena could reply, the lantern’s glow brightened. The forest dissolved, and she was back in the attic, holding the nowdim lantern. She heard her grandmother calling her name.", "Lena hurried downstairs, the lantern’s warmth still lingering in her hands. She didn’t tell her grandmother what happened—not yet. But she knew she would return to the attic again, when she was ready to discover more."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused main idea with rich development and depth.", "stems": ["My story is about ________, who must ________.", "The central problem is ________, and it matters because ________.", "A key moment that develops the story is when ________.", "This detail adds depth because ________.", "I want the reader to understand that ________."], "checklist": ["My idea is clear, focused, and developed.", "I added rich, relevant details.", "My story is clearly written to entertain."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, challenging transitions, and purposeful stylistic devices.", "stems": ["Beginning: Long ago… / On a stormy afternoon… / Although everything seemed normal…", "Middle: Meanwhile… / Despite this… / As the tension grew…", "Climax: Suddenly… / At that moment…", "Ending: In the end… / After everything that happened…", "“________,” she sai iners.", "After gathering the data, we designed a plan to reduce plastic waste. We created posters encouraging students to bring reusable bottles, and we presented our findings during assembly. Meanwhile, another group worked with the office staff to introduce a “refill station” near the gym. When we checked the bins again a week later, the amount of plastic had already decreased.", "This project taught me a lot about teamwork and responsibility. I realized that even small changes can make a big difference when everyone participates. Thank you for inspiring us to take action and care for our environment. I hope we can share our final report with you soon.", "Sincerely, Aria"], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused purpose with rich development and depth.", "stems": ["I am writing to ________ because ________.", "One important detail I want to share is ________.", "This matters because ________.", "Another key point is ________.", "This example shows ________ because ________."], "checklist": ["My purpose is clear and focused.", "I added rich, relevant details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, challenging transitions, and purposeful stylistic devices.", "stems": ["Opening: I hope you are doing well. I am writing to…", "Body Paragraph 1: To begin with… / Although… / At first…", "Body Paragraph 2: Meanwhile… / In addition… / Despite this…", "Closing: In the end… / This experience taught me… / Thank you for…"], "checklist": ["I used structured, indented paragraphs.", "My ideas are logically sequenced.", "I used transitions like meanwhile, nevertheless, despite.", "I used stylistic devices (hook, emphasis, layout) to guide the reader."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A consistent, appropriate tone with a clearly maintained perspective.", "stems": ["I felt ________ when ________.", "I want you to understand that _______  Paragraph 1: Purpose + context", "- Paragraph 2: First main detail", "- Paragraph 3: Second main detail", "- Paragraph 4: Reflection or closing", "Writing Moves for Grade 4", "- Use challenging transitions (nevertheless, despite, meanwhile)", "- Use complex sentences", "- Use precise verbs (investigated, encouraged, reduced)", "- Use figurative language when appropriate", "- Use stylistic devices (hooks, emphasis, layout)", "Challenge Yourself (for high flyers)", "- Add a short anecdote or ministory", "- Add a comparison (“It reminded me of…”)", "- Add a rhetorical question", "- Use perfect tense accurately (“We have learned…”)", "- Use purposeful passive voice"]}, {"grade": 4, "genre": "Informational Text", "exemplar": ["The Hidden Life of Honeybees", "Honeybees are some of the most important insects on our planet, even though many people only notice them when they buzz past. A honeybee colony works like a wellorganized city. Each bee has a specific job, and the survival of the hive depends on cooperation. Although bees are tiny, their impact on the environment is enormous.", "Inside the hive, honeybees follow a strict system of roles. The queen bee lays thousands of eggs and keeps the colony growing. Worker bees, which are all female, clean the hive, feed the larvae, collect nectar, and protect the entrance. Meanwhile, drone bees have only one job: to mate with a queen. This division of labour allows the hive to function smoothly, even during difficult seasons.", "Honeybees also play a crucial role in pollination. As bees travel from flower to flower collecting nectar, pollen sticks to their bodies. When they land on the next flower, some of the pollen rubs off, helping plants produce fruits and seeds. Without bees, many crops—such as apples, almonds, and strawberries—would struggle to grow. Therefore, bees are essential to global food production.", "Unfortunately, honeybee populations are declining. Pesticides, habitat loss, and climate change all threaten their survival. In addition, diseases like varroa mites weaken entire colonies. Despite these challenges, scientists and communities are working together to protect bees by planting wildflowers, reducing pesticide use, and creating safe habitats.", "Honeybees may be small, but their importance is enormous. By understanding how they live and why they matter, we can help protect them for the future."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused topic with rich development and depth.", "stems": ["My topic is ________, and it is important because ________.", "One key idea readers should understand is ________.", "This detail adds depth because ________.", "Another important fact is ________.", "This information helps explain ________."], "checklist": ["My main idea is clear and focused.", "I added rich, accurate supporting details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, challenging transitions, and purposeful organizational devices.", "stems": ["Introduction: ________ are… / This text will explain…", "Body Paragraphs:", "To begin with…", "Meanwhile…", "In addition…", "Despite this…", "Conclusion: In conclusion… / This matters because…"], "checklist": ["I used structured, indented paragraphs.", "My ideas are logically grouped.", "I used transitions like meanwhile, nevertheless, despite, in addition.", "I used stylistic devices (headings, hooks, emphasis) to guide the reader."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A consistent, knowledgeable, informative tone with a clearly maintained perspective.", "stems": ["Scientists believe ________.", "You might be surprised to learn that ________.", "It is important to understand that ________.", "This detail shows ________ because ________."], "checklist": ["My tone is informative and appropriate.", "My perspective is clearly maintained.", "I took creative risks with voice when appropriate."], "_mode earning Space", "I strongly believe our school should build an outdoor learning space because it would improve student wellbeing, strengthen our learning, and help us care for the environment. Although we already have a playground and a field, we do not have a dedicated area designed for outdoor lessons. Creating one would benefit every student in meaningful ways.", "To begin with, learning outdoors helps students focus and feel calmer. Studies show that spending time in nature reduces stress and improves concentration. When we learn inside all day, the classroom can feel crowded and noisy. However, an outdoor learning space—with benches, plants, and shade—would give us a peaceful environment where we can think more clearly. Even a short lesson outside could make a big difference in our mood and energy.", "Another important reason is that outdoor learning makes lessons more engaging. In science, for example, we could observe insects, measure shadows, or study plant growth directly instead of only reading about it. Meanwhile, in art, we could sketch natural textures or practise photography. These handson experiences would help us understand concepts more deeply and remember them for longer.", "Finally, an outdoor learning space would encourage our school community to care for the environment. We could plant native flowers, create a small vegetable garden, or build habitats for insects. As a result, students would learn responsibility and teamwork while helping local wildlife. This space could even become a place where families volunteer together.", "For these reasons, I strongly believe our school should build an outdoor learning space. It would support our wellbeing, make learning more meaningful, and help us protect the world around us."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused opinion with rich development and depth.", "stems": ["I strongly believe ________ because ________.", "My opinion is ________, and it matters because ________.", . We had to design a bridge using only paper, tape, and string. At first, our group struggled to agree on a design. Although everyone had strong ideas, we kept interrupting each other, and the bridge looked more like a crumpled pile of paper than a structure.", "After a short break, we tried again with a different approach. This time, we assigned roles: one person measured, another folded, and I was responsible for testing the strength. Meanwhile, we reminded each other to listen before speaking. As a result, our bridge slowly began to take shape. When we placed the final weight on top and it didn’t collapse, we all cheered.", "At the end of the day, I realized how much teamwork depends on patience and communication. Even though the challenge was frustrating at first, it helped me understand that listening is just as important as sharing ideas. I hope we do another project like this soon because I want to keep improving the way I work with others."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused event with rich development and depth.", "stems": ["Today I experienced ________, which was important because ________.", "One key moment was when ________.", "This mattered to me because ________.", "Another detail that stood out was ________.", "I learned that ________."], "checklist": ["My main idea is clear and focused.", "I added rich, relevant details.", "I stayed linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, challenging transitions, and purposeful stylistic devices.", "stems": ["Beginning: At the start of the day… / Although the morning seemed normal…", "Middle: Meanwhile… / Despite this… / As the activity continued…", "End: In the end… / I realized… / This experience taught me…"], "checklist": ["I used structured, indented paragraphs.", "My ideas are logically sequenced.", "I used transitions like meanwhile, nevertheless, despite.", "I used stylistic devices (hooks, emphasis, layout eck"}], "formatting": ["What my journal should look like", "- Date", "- 3–5 structured paragraphs", "- Clear beginning, middle, and end", "- Reflection at the end", "Paragraph Expectations", "- Paragraph 1: What happened first", "- Paragraph 2: What happened next", "- Paragraph 3: Reflection—how you felt, what you learned", "- Paragraph 4 (optional): Additional insight or connection", "Writing Moves for Grade 4", "- Use challenging transitions (nevertheless, despite, meanwhile)", "- Use complex sentences", "- Use precise verbs (constructed, adjusted, realized)", "- Use descriptive vocabulary", "- Use reflection to show growth", "Challenge Yourself (for high flyers)", "- Add a short dialogue line", "- Add a comparison (“It felt like…”)", "- Add a connection to a past experience", "- Use perfect tense accurately", "- Use purposeful passive voice"]}, {"grade": 5, "genre": "Fictional Narrative", "exemplar": ["The Echo in the Library", "The first time Leo heard the whisper, he thought it was just the old library settling into the night. The building was famous for its creaking floors and dusty corners, but tonight felt different. The air was unusually still, as if the books themselves were holding their breath.", "Leo had volunteered to help the librarian close up, even though he usually avoided staying late. However, his curiosity had grown ever since he discovered a hidden staircase behind the history section the week before. Tonight, he planned to explore it—carefully, quietly, and without drawing attention.", "As he dusted the last shelf, the whisper returned. “Find the forgotten one…”", "Leo froze. “Hello?” he called, though his voice sounded small in the cavernous room.", "Despite his racing heartbeat, he followed the sound toward the back of the library. The hidden staircase waited in the shadows. He took a deep breath and stepped down. The air grew cooler, and the walls glowed faintly with golden symbols that pulsed like slow heartbeats.", "At the bottom, he found a circular room filled with ancient books chained to stone pedestals. One book, however, lay open on a table, its pages fluttering even though there was no breeze.", "“You came,” a voice murmured.", "Leo spun around. A figure made of swirling ink stood behind him, its shape shifting like smoke. “Who… what are you?” Leo whispered.", "“I am the Echo,” it replied. “A memory of every story ever forgotten.”", "Although Leo wanted to run, something about the Echo felt familiar—almost comforting. The creature gestured to the open book. “This story is fading. If no one reads it, it will disappear forever.”", "Leo stepped closer. The book told the tale of a young inventor who built a machine to capture dreams. The illustrations shimmered with colour, as if alive.", "“What do I have to do?” Leo asked.", "“Read,” the Echo said simply.", "So Leo read—slowly at first, then with growing confidence. As he spoke the final line, the room brightened. The chains around the other books loosened, and the Echo’s form steadied.", "“You have saved it,” the Echo said. “And now you understand: stories live only when someone cares enough to remember them.”", "Before Leo could respond, the room dissolved into swirling light. He found himself back in the library, the staircase gone, the shelves silent.", "But the open book lay on the table beside him.", "Leo smiled. He knew he would return tomorrow—because some stories deserved to be remembered."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused main idea with rich development and depth.", "stems": ["My story explores ________ and shows that ________.", "The central conflict is ________, which matters because ________.", "A key turning point occurs when ________.", "This detail adds depth because ________.", "I want the reader to understand that ________."], "checklist": ["My idea is clear, focused, and developed with depth.", "I added rich, relevant supporting details.", "My story is clearly written to entertain."], "_mode hangemakers Project” because your lessons on leadership inspired many of the choices we made.", "To begin with, our group focused on improving the school’s recycling system. Although recycling bins already existed, we noticed that students often threw trash into the wrong containers. As a result, much of the recyclable material was being wasted. To understand the problem better, we conducted a weeklong audit and discovered that nearly half of the items in the recycling bins were contaminated with food or plastic wrappers.", "After gathering this information, we designed a plan to make recycling clearer and more effective. We created colourcoded posters, added simple illustrations, and placed them above each bin. Meanwhile, we worked with the student council to introduce a short announcement during morning homeroom. Surprisingly, after only three days, the amount of contamination dropped significantly. Students told us the posters made the system easier to understand.", "This project taught me more than just environmental responsibility. I learned how powerful teamwork can be when everyone contributes their strengths. I also realized that leadership isn’t always about being in charge—it’s about noticing a problem and taking action, even when the solution seems small. Thank you for encouraging us to think like leaders and to believe that our ideas can make a difference.", "Sincerely, Maya"], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused purpose with rich development and depth.", "stems": ["I am writing to ________ because ________.", "One significant detail I want to share is ________.", "This matters because ________.", "Another key point is ________.", "This example adds depth because ________."], "checklist": ["My purpose is clear and focused.", "I added rich, relevant supporting details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, effective transitions, and TIONS", "goal": "", "stems": ["I used commas to set off phrases:", "The posters, bright and clear, helped students sort their waste.", "I used apostrophes for possession:", "the project’s impact", "I used perfect tense when needed:", "We had collected enough data to see a pattern.", "I used active/passive forms accurately:", "The bins were reorganized by our group.", "I used semicolons or dashes when appropriate:", "We were nervous at first; however, the results surprised us."], "checklist": ["Grammar is accurate and varied.", "Punctuation is controlled and purposeful.", "Spelling of complex patterns is accurate."], "_mode": "check"}], "formatting": ["What my letter should look like", "- Date (optional)", "- Greeting", "- 3–5 structured paragraphs", "- Clear purpose", "- Detailed body", "- Polite closing and signature", "Paragraph Expectations", "- Paragraph 1: Purpose + context", "- Paragraph 2: First main detail", "- Paragraph 3: Second main detail", "- Paragraph 4: Reflection or closing", "Writing Moves for Grade 5", "- Use challenging transitions (nevertheless, despite, meanwhile)", "- Use complex sentences", "- Use precise verbs (investigated, collaborated, implemented)", "- Use figurative language when appropriate", "- Use stylistic devices (hooks, emphasis, layout)", "Challenge Yourself (for high flyers)", "- Add a short anecdote or ministory", "- Add a comparison (“It reminded me of…”)", "- Add a rhetorical question", "- Use perfect tense accurately", "- Use purposeful passive voice"]}, {"grade": 5, "genre": "Informational Text", "exemplar": ["The Science Behind Earthquakes", "Earthquakes are powerful natural events that occur when the Earth’s crust suddenly shifts, releasing energy that travels through the ground. Although earthquakes can feel unpredictable, scientists have discovered clear patterns in how and why they happen. Understanding these patterns helps communities prepare for emergencies and reduce damage.", "To begin with, earthquakes are caused by the movement of tectonic plates. These massive slabs of rock fit together like a giant jigsaw puzzle beneath the Earth’s surface. However, the plates do not move smoothly. Instead, they grind, collide, or slide past one another. When pressure builds up along the boundaries—called faults—it is eventually released as seismic waves. These waves shake the ground, sometimes gently and sometimes with destructive force.", "The strength of an earthquake depends on several factors. Scientists measure magnitude using the Moment Magnitude Scale, which calculates how much energy is released. Meanwhile, the intensity of shaking in a specific location depends on the depth of the earthquake, the type of ground, and the distance from the epicenter. For example, soft soil can amplify shaking, while solid rock can reduce it. Therefore, two places experiencing the same earthquake may feel it very differently.", "Earthquakes can cause a wide range of effects. Buildings may crack or collapse, roads can split open, and landslides may occur in mountainous areas. In coastal regions, underwater earthquakes can trigger tsunamis—massive waves that travel across the ocean. Despite these dangers, engineers have developed earthquakeresistant structures, such as flexible foundations and shock absorbers, to help protect communities.", "Although earthquakes cannot be prevented, preparation can save lives. Scientists use seismographs to monitor ground movement and identify patterns. Communities practise emergency drills, create evacuation plans, and secure heavy furniture to prevent injuries. By understanding the science behind earthquakes, people can respond more safely when the ground begins to shake.", "Earthquakes remind us that the Earth is constantly changing. With knowledge and preparation, we can reduce risks and protect the places we call home."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused topic with rich development and depth.", "stems": ["My topic is ________, and it is important because ________.", "One key idea readers must understand is ________.", "This detail adds depth because ________.", "Another significant fact is ________.", "This information helps explain ________."], "checklist": ["My main idea is clear and focused.", "I added rich, accurate supporting details.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, effective transitions, and purposeful organizational devices.", "stems": ["Introduction: ________ are… / This text will explain…", "Body Paragraphs:", "To begin with…", "Meanwhile…", "In addition…", "Despite this…", "As a result…", "Conclusion: In conclusion… / This matters because…"], "checklist": ["I used structured, indented paragraphs.", "My ideas are logically grouped.", "I used transitions like nevertheless, despite, meanwhile, in addition.", "I used stylistic devices (headings, hooks, emphasis) to guide the reader."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A consistent, knowledgeable, informative tone with a clearly maintained perspective.", "stems": ["Scientists have discovered that ________.", "You might be surprised to learn that ________.", "It is important to understand that ________.", "This detail shows ________ because ________."], "checklist": ["My tone is informative and appropriate.", "My perspective is clearly maintained.", "I took creative risks with voice when appropriate."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Rich, precise vocabulary and effective figurative language when appropriate.", "stems": ["A topicspecific word I used is ________, which means ________.", "A vivid verb I used is ________.", "A descriptive phrase I added is ________.", "This figurative language adds meaning because ________."], "checklist": ["I used specific nouns, strong verbs, precise adjectives, and academic vocabulary.", "I used figurative language effectively when appropriate.", "M )", "- Add a comparison (“Earthquakes are similar to…”)", "- Add a causeandeffect explanation", "- Add a labelled diagram or glossary", "- Use perfect tense accurately", "- Use purposeful passive voice"]}, {"grade": 5, "genre": "Procedural Writing", "exemplar": ["How to Build a Working MiniParachute", "Designing a miniparachute is an exciting way to explore air resistance and engineering principles. Although the materials are simple, the success of your parachute depends on careful construction and thoughtful testing.", "Materials", "- A plastic bag or light fabric", "- Scissors", "- Four pieces of string (equal length)", "- Tape", "- A small object (toy figure, paper clip, or eraser)", "- A ruler", "- A stopwatch (optional)", "Steps", "- First, create the canopy. Cut a square from the plastic bag or fabric, measuring approximately 20 cm on each side. A larger canopy increases air resistance, so ensure the shape is even.", "- Next, attach the strings. Tape one end of each string securely to the four corners of the canopy. Meanwhile, check that all strings are the same length; uneven strings can cause the parachute to tilt during descent.", "- After that, connect the load. Tie the loose ends of the strings together and attach them to your small object. Make sure the knot is tight so the object does not detach midair.", "- Then, prepare for testing. Stand on a chair or balcony (with adult permission) and hold the parachute by the canopy. Release it gently, allowing the air to fill the canopy.", "- Finally, observe and adjust. Watch how the parachute falls. If it drops too quickly, increase the canopy size. If it spins, adjust the string lengths. As a final step, record your results and repeat the test to improve accuracy.", "Helpful Tip", "For more accurate results, drop the parachute from the same height each time and use a stopwatch to measure descent speed."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused procedure with rich development and dep tense accurately", "- Use purposeful passive voice"]}, {"grade": 5, "genre": "Persuasive Writing", "exemplar": ["Why Every School Should Have a Student Innovation Lab", "I strongly believe every school should have a Student Innovation Lab because it encourages creativity, strengthens problemsolving skills, and prepares students for the future. Although classrooms already provide opportunities to learn, an Innovation Lab offers a unique space where students can design, experiment, and build ideas that matter to them.", "To begin with, an Innovation Lab inspires creativity in ways traditional lessons cannot. When students have access to tools like simple robotics kits, recycled materials, and digital design apps, they can transform their ideas into real prototypes. Meanwhile, the freedom to experiment—without worrying about grades—helps students take risks and explore new possibilities. Creativity grows when students feel safe to try, fail, and try again.", "Another important reason is that Innovation Labs strengthen problemsolving skills. In these spaces, students often work on realworld challenges, such as reducing waste or improving playground safety. As a result, they learn to test solutions, gather feedback, and revise their designs. This process mirrors the way engineers and scientists work, giving students valuable experience that goes beyond textbooks.", "Finally, Innovation Labs prepare students for the future. Technology is changing rapidly, and students need opportunities to practise collaboration, communication, and critical thinking. By working together on meaningful projects, students develop confidence and independence. These skills will help them succeed not only in school but also in future careers.", "For these reasons, I strongly believe every school should create a Student Innovation Lab. It would inspire creativity, strengthen problemsolving skills, and help students build a brighter future."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused opinion with rich development and depth.", "stems": ["I strongly believe ________ because ________.", "My opinion is ________, and it matters because ________.", "One significant reason is ________.", "Another key point is ________.", "This example adds depth because ________."], "checklist": ["My opinion is clear and focused.", "I added rich, relevant reasons.", "My writing stays linked to the task."], "_mode": "check"}, {"num": "2", "name": "ORGANIZATION", "goal": "Structured paragraphs, effective transitions, and purposeful stylistic devices.", "stems": ["Introduction: I believe… / In my opinion…", "Reason Paragraphs:", "To begin with…", "Meanwhile…", "Despite this…", "As a result…", "Conclusion: For these reasons… / This is why…"], "checklist": ["I used structured, indented paragraphs.", "My reasons are in logical order.", "I used transitions like nevertheless, despite, meanwhile, in addition.", "I used stylistic devices (hooks, emphasis, layout) to guide the reader."], "_mode": "check"}, {"num": "3", "name": "VOICE", "goal": "A confident, consistent persuasive voice with a clearly maintained perspective.", "stems": ["I want the reader to understand that ________.", "This detail shows my perspective because ________.", "My tone is ________ (confident, respectful, passionate).", "I chose this example because ________."], "checklist": ["My voice is confident and consistent.", "My perspective is clearly maintained.", "I took creative risks with voice or tone."], "_mode": "check"}, {"num": "4", "name": "WORD CHOICE", "goal": "Rich, precise vocabulary and effective figurative language.", "stems": ["A strong verb I used is ________.", "A persuasive phrase I added is ________.", "This figurative language adds meaning because ________.", "This word choice creates emotion because ________."], "checklist": ["I used specific nouns, strong verbs, and precise adjectives.", "I used figurative language effectively.", "My words help convince the reader."], "_mode" d example", "- Add a rhetorical question", "- Use perfect tense accurately", "- Use purposeful passive voice"]}, {"grade": 5, "genre": "Journal", "exemplar": ["November 3", "Today turned out to be far more meaningful than I expected, even though it began like any ordinary Thursday. In the morning, our class visited the science lab to begin our “Ecosystems in a Jar” project. At first, I felt unsure about how to design a balanced ecosystem. Although I had read the instructions carefully, the idea of creating a tiny world that could survive on its own felt overwhelming.", "As we started gathering materials, something shifted. My group discussed which plants would work best and how much water the soil needed. Meanwhile, I noticed how each person contributed a different strength—one classmate measured precisely, another sketched a layout, and I focused on arranging the layers of soil, gravel, and moss. As a result, our jar slowly transformed from a pile of materials into a miniature forest floor. Watching the condensation form on the glass felt strangely satisfying, like the ecosystem was already beginning to breathe.", "The most memorable moment happened during cleanup. Our teacher dimmed the lights and asked us to place our jars on the windowsill. The sunlight hit the glass at just the right angle, and for a moment, the jars glowed. It reminded me that even small creations can feel powerful when you’ve put genuine effort into them.", "At the end of the day, I realized how much I enjoy handson learning. This project taught me that patience and careful observation matter just as much as creativity. I also learned that working with others can make a task feel less intimidating and far more rewarding. I hope we get to check on our ecosystems again soon because I want to see how they change over time."], "traits": [{"num": "1", "name": "IDEAS", "goal": "A clear, focused event with rich development and depth.", "stems": ["Today I experienced ________, which was meaningful be
