<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spelling Wordle</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; background:#f5f5f5; }
    h1 { margin-top: 20px; }
    #grid { display: grid; gap: 4px; justify-content: center; margin: 20px auto; }
    .tile {
      width: 40px; height: 40px;
      border: 2px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; text-transform: uppercase;
      background: #fff;
    }
    .correct { background:#6aaa64; color:#fff; border-color:#6aaa64; }
    .present { background:#c9b458; color:#fff; border-color:#c9b458; }
    .absent  { background:#787c7e; color:#fff; border-color:#787c7e; }
    #controls { margin-top: 10px; }
    input[type="text"] {
      padding: 6px 8px; font-size: 16px; width: 200px; text-transform: lowercase;
    }
    button { padding: 6px 10px; font-size: 14px; margin: 4px; }
    #message { margin-top: 10px; min-height: 1.2em; }
    #lengthButtons { margin-top: 15px; }
    .lenBtn {
      padding: 6px 10px;
      margin: 3px;
      border: 1px solid #333;
      background: #fff;
      cursor: pointer;
    }
    .lenBtn.active {
      background: #333;
      color: #fff;
    }
    #wordBank {
      margin-top: 20px;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<h1>Spelling Wordle</h1>
<p><small>Select a word length, then guess the word.</small></p>

<div id="lengthButtons"></div>

<div id="grid"></div>

<div id="controls">
  <input id="guessInput" type="text" autocomplete="off" />
  <button id="guessBtn">Guess</button>
  <button id="newBtn">New Word</button>
</div>

<div id="message"></div>

<h3>Word Bank</h3>
<div id="wordBank">(select a length to see words)</div>

<script>
  // All words from your spelling lists (lowercase)
  const WORDS = [
    "black","egg","sink","frog","lump","name","seen","high","stone","cute",
    "character","narrative","fable","moral","dialogue",
    "shrug","throw","shrunk","throne","shred","thrash","shrimp","thread","shrapnel","through",
    "script","voice","illustration","perspective","storytelling",
    "secret","submit","carrot","target","pocket","quite","quiet","planet","rabbit","jacket",
    "diet","summit","poet","maggot","budget",
    "boy","soil","avoid","toy","enjoy","annoy","coin","foyer","choice","destroy","voyage",
    "poison","employ","anoint",
    "itch","catch","bench","match","switch","watch","sketch","witch","patch","different",
    "hatchet","kitchen","launch","stretch","blotchy",
    "steer","chair","repair","cheer","stair","peer","dairy","pair","fairy","jeer",
    "staircase","volunteer","despair","eerie","pioneer",
    "skills","wishes","birds","mixes","packets","tomatoes","punches","buses","few","houses",
    "pianos","coaches","crosses","superheroes",
    "could","hour","talk","walk","half","honest","should","climb","would","bomb",
    "integrity","inspiration","empathy","influence","responsibility",
    "selling","asking","eating","moving","dreaming","smiling","carrying","painting",
    "trying","whining","equality","diversity","courage","resilience",
    "sigh","light","right","fight","night","flight","alright","knight","mighty",
    "firelight","eyesight","fortnight","midnight","copyright",
    "winning","hopping","rotting","grabbing","shutting","swimming","beginning",
    "splitting","dropping","clapping","programming","permitting","wrapping",
    "regretting","scrapping",
    "grey","they","eight","obey","weight","eighty","eighteen","weighed","survey",
    "neighbor","lightweight","feint","weightlifter","freight",
    "apple","angle","local","final","equal","people","bottle","angel","table","travel",
    "example","marvel","struggle","channel","trouble",
    "liked","asked","kicked","washed","hoped","pleased","cared","cooked","poured",
    "helped","remembered","praised","frightened","order",
    "by","buy","for","four","plain","not","knot","heal","he'll",
    "electricity","circuit","purpose","design","invention",
    "sign","sword","wrong","write","know","knock","wreck","knife","knowledge","written",
    "function","current","conductor","insulator","creativity",
    "teacher","editor","worker","driver","darker","builder","collector","painter",
    "supporter","climber","commander","manager","elevator","attacker","educator",
    "why","photo","what","phone","when","graph","which","ghost","where","wheat",
    "whisper","phase","wheel","photograph","physical",
    "tried","copies","worried","cried","flies","studied","bullies","marries","replied",
    "empties","satisfied","supplies","identified","occupies","purified",
    "laugh","enough","caught","bought","cough","thought","rough","daughter","naughty",
    "throughout","thorough","distraught","draught",
    "gym","rice","orange","pencil","circle","large","danger","city","huge","since",
    "garbage","sentence","general","emergency","cylinder",
    "wrote","slept","began","broke","told","thrown","knew","learnt","found","heard",
    "forgave","built","understood","withdrew","forbade",
    "diary","summary","memory","library","factory","delivery","grocery","glossary",
    "necessary","vocabulary","navigation","culture","global","heritage",
    "painful","helpful","careless","skillful","endless","thankful","powerful",
    "forgetful","successful","homeless","landmark","geography","location",
    "compass","symbol",
    "listen","often","guard","build","castle","fasten","guest","autumn","guess",
    "wrestle","column","whistle","disguise","hustle",
    "homework","afternoon","rainbow","airport","baseball","footprint","eyesight",
    "grandmother","toothbrush","shoelace","somewhere","supermarket","everyone",
    "lifeguard","skateboard",
    "school","sphere","square","squat","squad","sphinx","squeeze","squirrel","scheme",
    "squeaky","scholar","atmosphere","hemisphere","squeamish","spherical",
    "easy","funny","scary","spicy","sleepy","cloudy","smoky","healthy","tricky",
    "stormy","sustainability","agriculture","resources","ecosystem","material",
    "don’t","can’t","i’m","it’s","i’ll","should’ve","they’re","o’clock","they’ll",
    "doesn’t","recycling","alternative","development","natural","biodegradable",
    "children","bread","women","mice","lives","leaves","wolves","music","chefs",
    "trousers","beliefs","equipment","furniture","shelves","knives",
    "slowly","happily","perfectly","exactly","properly","extremely","quickly",
    "busily","surely","angrily","definitely","regularly","certainly","immediately",
    "successfully",
    "year","fear","gear","clear","dear","earth","learn","swear","heart","search",
    "heard","beard","appear","nearby",
    "disagree","dislike","uncover","unable","unfair","unhealthy","unhappy",
    "disappear","misbehave","unpleasant","dishonest","disapprove","unnecessary",
    "unfamiliar","misunderstanding",
    "once","does","minute","clothes","friends","really","darkness",
    "greatness","forgiveness","beautiful","island","because","surprise","loneliness"
  ].map(w => w.toLowerCase());

  // Group words by length
  const groups = {};
  WORDS.forEach(w => {
    const len = w.length;
    if (!groups[len]) groups[len] = [];
    groups[len].push(w);
  });

  let currentLength = null;
  let answer = "";
  let maxRows = 6;
  let currentRow = 0;
  let gameOver = false;

  const grid = document.getElementById("grid");
  const guessInput = document.getElementById("guessInput");
  const guessBtn = document.getElementById("guessBtn");
  const newBtn = document.getElementById("newBtn");
  const message = document.getElementById("message");
  const lengthButtons = document.getElementById("lengthButtons");
  const wordBank = document.getElementById("wordBank");

  // Create toggle buttons for each available word length
  Object.keys(groups).sort((a,b)=>a-b).forEach(len => {
    const btn = document.createElement("button");
    btn.textContent = len + " letters";
    btn.className = "lenBtn";
    btn.onclick = () => selectLength(len, btn);
    lengthButtons.appendChild(btn);
  });

  function selectLength(len, btn) {
    currentLength = Number(len);
    document.querySelectorAll(".lenBtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    updateWordBank();
    pickNewWord();
  }

  function updateWordBank() {
    if (!currentLength) return;
    const list = groups[currentLength];
    wordBank.innerHTML = list.join(", ");
  }

  function pickNewWord() {
    if (!currentLength) return;
    const list = groups[currentLength];
    answer = list[Math.floor(Math.random() * list.length)];
    currentRow = 0;
    gameOver = false;
    message.textContent = "";
    buildEmptyGrid();
    guessInput.value = "";
    guessInput.placeholder = `Type a ${answer.length}-letter word`;
  }

  function buildEmptyGrid() {
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = `repeat(${answer.length}, 40px)`;
    for (let r = 0; r < maxRows; r++) {
      for (let c = 0; c < answer.length; c++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.dataset.row = r;
        tile.dataset.col = c;
        grid.appendChild(tile);
      }
    }
  }

  function setMessage(text, color = "#333") {
    message.textContent = text;
    message.style.color = color;
  }

  function handleGuess() {
    if (gameOver || !currentLength) return;
    let guess = guessInput.value.trim().toLowerCase();

    if (guess.length !== answer.length) {
      setMessage(`This word has ${answer.length} letters.`);
      return;
    }
    if (!groups[currentLength].includes(guess)) {
      setMessage("That word is not in this list.");
      return;
    }

    for (let i = 0; i < answer.length; i++) {
      const tile = [...grid.children].find(
        t => Number(t.dataset.row) === currentRow && Number(t.dataset.col) === i
      );
      tile.textContent = guess[i].toUpperCase();
      tile.classList.remove("correct","present","absent");

      if (guess[i] === answer[i]) tile.classList.add("correct");
      else if (answer.includes(guess[i])) tile.classList.add("present");
      else tile.classList.add("absent");
    }

    if (guess === answer) {
      setMessage(`Nice! The word was "${answer.toUpperCase()}".`, "#2e7d32");
      gameOver = true;
      return;
    }

    currentRow++;
    if (currentRow >= maxRows) {
      setMessage(`Out of guesses! The word was "${answer.toUpperCase()}".`, "#b71c1c");
      gameOver = true;
    } else {
      setMessage(`${maxRows - currentRow} guesses left.`);
    }

    guessInput.value = "";
    guessInput.focus();
  }

  guessBtn.addEventListener("click", handleGuess);
  newBtn.addEventListener("click", pickNewWord);
  guessInput.addEventListener("keydown", e => {
    if (e.key === "Enter") handleGuess();
  });
</script>

</body>
</html>
